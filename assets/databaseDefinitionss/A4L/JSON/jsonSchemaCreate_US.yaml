  # /////////////////////////////////////////////////////////////
  xEducationStaffClassification:
    type: string
    title: Education Staff Classification
    description: >-
      
      <ul>
        <li>'Administrative Support Staff' - Staff members who provide direct support to administrators, business office support, data processing, or support of the teaching and administrative duties of the office of the principal or department chairpersons, including clerical staff and secretaries.</li>
        <li>'Administrators' - Executive officers or managers of education agencies or institutions, including superintendents, deputies, and assistant superintendents; other persons with district-wide responsibilities: e.g., business managers, administrative assistants, and professional instructional support staff. In addition, staff members whose activities are concerned with directing and managing the operation of a particular school including principals, assistant principals, and other assistants; persons who supervise school operations, assign duties to staff members, supervise and maintain the records of the school, and coordinate school instructional activities with those of the education agency, including department chairpersons.</li>
        <li>'All Other Support Staff' - Support staff not reported in instructional or student support. Other support staff includes employees such as data processing, health, plant and equipment maintenance, bus drivers, security, and food service workers.</li>
        <li>'Behavioral Specialists' - Behavioral Specialists</li>
        <li>'Early Learning Assistant Teachers' - Assistant Teachers of general level instruction and/or services delivery classified by state and local practice from birth to Kindergarten.</li>
        <li>'Early Learning Teachers' - Teachers of general level instruction and/or service delivery classified by state and local practice from birth to Kindergarten.</li>
        <li>'Elementary Teachers' - Teachers of general level instruction classified by state and local practice as elementary and composed of any span of grades not above grade 8.</li>
        <li>'Family Service Workers' - Professional staff members assigned specific duties related to staff providing in-home and other services (including needs assessment, development of service plans, family advocacy, and coordination of service delivery) to families of children participating in early care and education programs.</li>
        <li>'Health Specialists' - Professional staff members or supervisors assigned specific duties related to providing any Health services that are not specific to mental health.</li>
        <li>'Home Visitors' - Professional staff members assigned specific duties related to visiting a child or pregnant woman's home for the purpose of assisting parents in fostering the growth and development of their child.</li>
        <li>'Instructional Coordinators' - Staff supervising instructional programs including professional staff members or supervisors in an early learning program assigned specific duties related to instruction , or supervisors at a school district or sub-district level including curriculum coordinators or supervisors; in-service training staff; Title I supervisors; home economics supervisors; educational television staff; coordinators and supervisors of audiovisual services; and staff engaged in development of computer-assisted instruction.</li>
        <li>'Kindergarten Teachers' - Teachers of a group or class that is part of a public school program and is taught during the year preceding the first grade.</li>
      </ul>
      plus 14 more value(s) at <a href="http://specification.sifassociation.org/Implementation/US/4.3/CodeSets.html#xEducationStaffClassificationType">xEducationStaffClassificationType<a>
    oneOf:
    - const: "Administrative Support Staff"
      title: Staff members who provide direct support to administrators, business office support, data processing, or support of the teaching and administrative duties of the office of the principal or department chairpersons, including clerical staff and secretaries.
    - const: "Administrators"
      title: "Executive officers or managers of education agencies or institutions, including superintendents, deputies, and assistant superintendents; other persons with district-wide responsibilities: e.g., business managers, administrative assistants, and professional instructional support staff. In addition, staff members whose activities are concerned with directing and managing the operation of a particular school including principals, assistant principals, and other assistants; persons who supervise school operations, assign duties to staff members, supervise and maintain the records of the school, and coordinate school instructional activities with those of the education agency, including department chairpersons."
    - const: "All Other Support Staff"
      title: Support staff not reported in instructional or student support. Other support staff includes employees such as data processing, health, plant and equipment maintenance, bus drivers, security, and food service workers.
    - const: "Behavioral Specialists"
      title: Behavioral Specialists
    - const: "Early Learning Assistant Teachers"
      title: Assistant Teachers of general level instruction and/or services delivery classified by state and local practice from birth to Kindergarten.
    - const: "Early Learning Teachers"
      title: Teachers of general level instruction and/or service delivery classified by state and local practice from birth to Kindergarten.
    - const: "Elementary Teachers"
      title: Teachers of general level instruction classified by state and local practice as elementary and composed of any span of grades not above grade 8.
    - const: "Family Service Workers"
      title: Professional staff members assigned specific duties related to staff providing in-home and other services (including needs assessment, development of service plans, family advocacy, and coordination of service delivery) to families of children participating in early care and education programs.
    - const: "Health Specialists"
      title: Professional staff members or supervisors assigned specific duties related to providing any Health services that are not specific to mental health.
    - const: "Home Visitors"
      title: Professional staff members assigned specific duties related to visiting a child or pregnant woman's home for the purpose of assisting parents in fostering the growth and development of their child.
    - const: "Instructional Coordinators"
      title: Staff supervising instructional programs including professional staff members or supervisors in an early learning program assigned specific duties related to instruction , or supervisors at a school district or sub-district level including curriculum coordinators or supervisors; in-service training staff; Title I supervisors; home economics supervisors; educational television staff; coordinators and supervisors of audiovisual services; and staff engaged in development of computer-assisted instruction.
    - const: "Kindergarten Teachers"
      title: Teachers of a group or class that is part of a public school program and is taught during the year preceding the first grade.
    - const: "Librarians/Media Specialists"
      title: "A professional staff member or supervisor assigned specific duties and school time for professional library and media service activities. Activities include: selecting, acquiring, preparing, cataloging, and circulating books and other printed materials; planning the use of library and media services by students, teachers and other members of the instructional staff; and guiding individuals in their use of media services and library materials, (whether maintained separately or as part of an instructional materials center)."
    - const: "Library/Media Support Staff"
      title: Staff members who render other library or media services, such as preparing, caring for, and making available to members of the instructional staff the equipment, films, filmstrips, transparencies, tapes, TV programs, and similar materials (whether maintained separately as part of an instructional materials center).
    - const: "Mental Health Specialists"
      title: Professional staff members or supervisors assigned specific duties related to Mental Health.
    - const: "Nutrition Specialists"
      title: Professional staff members or supervisors assigned specific duties related to Nutrition.
    - const: "Paraprofessionals"
      title: "Paraprofessionals are employees who provide instructional support, including those who: (1) provide one-on-one tutoring if such tutoring is scheduled at a time when a student would not otherwise receive instruction from a teacher, (2) assist with classroom management, such as organizing instructional and other materials, (3) provide instructional assistance in a computer laboratory, (4) conduct parental involvement activities, (5) provide support in a library or media center, (6) act as a translator, or (7) provide instructional support services under the direct supervision of a teacher."
    - const: "Part C Early Interventionists"
      title: "Professional staff members employed to provide early intervention services to infants and toddlers with disabilities or at-risk of experiencing a substantial developmental delay as defined by Part C of the Individuals with Disabilities Education Act (IDEA): The Early Intervention Program for Infants and Toddlers with Disabilities."
    - const: "Part C Service Coordinators"
      title: "Professional staff members employed to coordinate early intervention services to infants and toddlers with disabilities or at-risk of experiencing a substantial developmental delay as defined by Part C of the Individuals with Disabilities Education Act (IDEA): The Early Intervention Program for Infants and Toddlers with Disabilities."
    - const: "School Counselors"
      title: "Professional staff members assigned specific duties and school time for any of the following activities: counseling with students and parents, consulting with other staff members on learning problems, evaluating student abilities, assisting students in making education and career choices, assisting students in personal and social development, providing referral assistance, and/or working with other staff members in planning and conducting guidance programs for students. School counselors may be reported by elementary and secondary level when that information is available."
    - const: "Secondary Teachers"
      title: Teachers of a general level of instruction classified by state and local practice as secondary and composed of any span of grades beginning with the next grade following the elementary grades and ending with or below grade 12.
    - const: "Social Workers"
      title: Social workers assist people by helping them cope with and solve issues in their everyday lives, such as family and personal problems and dealing with relationships.
    - const: "Special Education Teachers"
      title: Special Education teachers include teachers employed to provide special education services to children with disabilities, including preschool teachers, itinerant/consulting teachers, and home/hospital teachers. This should include teachers of children with disabilities in separate schools and facilities.
    - const: "Special Needs Specialists"
      title: Professional staff members or supervisors assigned specific duties related to special needs learners.
    - const: "Student Support Services Staff"
      title: Professional and supervisory staff providing non-instructional services to students including attendance officers; staff providing health, psychology, speech pathology, audiology, or social services; and supervisors of the preceding staff and of health, transportation, and food service workers.
    - const: "Ungraded Teachers"
      title: Teachers of classes or programs to which students are assigned without standard grade designation.

