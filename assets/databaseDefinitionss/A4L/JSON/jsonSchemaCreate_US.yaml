          attribute: true
      LocationType:
        type: string
        description: >-
          <p>Defines whether the location is a school or a non-school location.</p>
        xml:
          attribute: true
      LocationTypeCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      SiteCategory:
        type: string
        description: >-
          <p>Specific site category.</p>
      Name:
        type: string
        description: >-
          <p>Text name of the location</p>
      Description:
        type: string
        description: >-
          <p>Description about the location.</p>
      LocalId:
        type: object
        description: >-
          <p>The locally-assigned identifier for this location.</p>
        $ref: '#/definitions/LocalId'
      IdentificationInfoList:
        type: object
        $ref: '#/definitions/IdentificationInfoList'
      StateProvinceId:
        type: object
        description: >-
          <p>The state-assigned identifier for this location.</p>
        $ref: '#/definitions/StateProvinceId'
      NCESId:
        type: object
        description: >-
          <p>The NCES-assigned identifier for this location.</p>
        $ref: '#/definitions/NCESId'
      LEAInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) that identifies the district.</p>
        $ref: '#/definitions/IdRef'
      OtherLEAs:
        type: object
        description: >-
          <p>The Id (GUID) of an other related education agency, such as a regional service agency.</p>
        $ref: '#/definitions/OtherLEAList'
      ParentLocationInfo:
        type: object
        description: >-
          <p>A LocationInfo instance could be related to another LocationInfo. This element will help create that relation.</p>
        $ref: '#/definitions/IdRef'
      SIF_RefObject:
        description: >-
          <p>The name of the object referenced.</p>
        oneOf:
        - const: "LocationInfo"
          title: LocationInfo
        xml:
          attribute: true
      SchoolInfoRefId:
        type: object
        description: >-
          <p>The RefId of a corresponding SchoolInfo object.</p>
        $ref: '#/definitions/IdRef'
      AddressList:
        type: object
        description: >-
          <p>This element has the LocationInfo address information.</p>
        $ref: '#/definitions/AddressList'
      PhoneNumberList:
        type: object
        description: >-
          <p>The location's phone numbers.</p>
        $ref: '#/definitions/PhoneNumberList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>LocationInfo represents a location in a district.</p>
  # //////////////////////////////// data object /////////////////////////////
