    - const: "No"
      title: No
    - const: "Unknown"
      title: Unknown

  # ////////////////////////////// default sequence ///////////////////////////////
  Street:
    description: >-
      <p>The street element is a complex element and breaks the street down into several parts.</p>
    type: object
    required:
    - "Line1"
    - "StreetType"
    properties:
      Line1:
        type: string
        description: >-
          <p>Address line 1.</p>
      Line2:
        type: string
        description: >-
          <p>Address line 2.</p>
      Line3:
        type: string
        description: >-
          <p>Address line 3.</p>
      Complex:
        type: string
        description: >-
          <p>Name of the complex.</p>
      StreetNumber:
        type: string
        description: >-
          <p>The address number assigned to the building.</p>
      StreetPrefix:
        type: string
        description: >-
          <p>Street prefix like NE</p>
      StreetName:
        type: string
        description: >-
          <p>The name of the street.</p>
      StreetType:
        type: string
        description: >-
          <p>The type of street. For example, Lane, Blvd., Ave., etc.</p>
      StreetSuffix:
        type: string
        description: >-
          <p>Street suffix like SW.</p>
      ApartmentType:
        type: string
        description: >-
          <p>Type of apartment, for example, Suite.</p>
      ApartmentNumberPrefix:
        type: string
        description: >-
          <p>Apartment number prefix.</p>
      ApartmentNumber:
        type: string
        description: >-
          <p>The number of the apartment.</p>
      ApartmentNumberSuffix:
        type: string
        description: >-
          <p>Apartment number suffix.</p>

  # ////////////////////////////// xs:* no attrs ///////////////////////////////
  SchoolName:
    description: >-
      <p>The name of the school.</p>
    type: string

  # ///////////////////////////// single Item with Values ////////////////////////////////
  DefinedProtocols:
    type: string
    oneOf:
    - const: "HTTPS"
      title: HTTPS
    - const: "HTTP"
      title: HTTP

  # ////////////////////////////// xs:* no attrs ///////////////////////////////
  LEAName:
    description: >-
      <p>Name of Local Education Agency.</p>
    type: string

  # ////////////////////////////// xs:* no attrs ///////////////////////////////
  SSN:
    description: >-
      <p>Social Security Number</p>
    type: string

  # //////////////////////// xs:* with attrs /////////////////////////////////////
  MonetaryAmount:
    type: object
    properties:
      value:
      - description: >-
          <p>A monetary amount.</p>
        type: number
      Currency:
        type: string
        description: >-
          Currency code. Where omitted, defaults to implementation-defined local currency, typically <code>USD</code> in the United States.
        xml:
          attribute: true
      CurrencyCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true

  # ///////////////////////////////// list ////////////////////////////
  Creators:
    type: object
    required:
    - "Creator"
    properties:
      Creator:
        type: array
        items:
          $ref: '#/definitions/Creator'

  # ///////////////////////////////// list ////////////////////////////
  SubjectAreas:
    description: >-
      This allows subject areas to be associated with an object or query. Although there could be overlap with <code>LearningStandardItems</code>, it is anticipated there will be use cases where <code>LearningStandardItem</code> objects may not exist or may not be available, and data may need to be tagged with high-level subject areas.
    type: object
    required:
    - "SubjectArea"
    properties:
      SubjectArea:
        type: array
        items:
          $ref: '#/definitions/SubjectArea'

  # ////////////////////////////// default sequence ///////////////////////////////
  Location:
    type: object
    required:
    - "SIF_RefObject"
    properties:
      Type:
        type: string
        xml:
          attribute: true
      TypeCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      LocationName:
        type: string
        description: >-
          Name of the location.
      LocationRefId:
        type: object
        description: >-
          RefId of the location object if the location is a SIF Object such as <code>SchoolInfo</code>.
        $ref: '#/definitions/IdRef'
      SIF_RefObject:
        description: >-
          Type of SIF Object <code>Location</code> points to.
        oneOf:
        - const: "SchoolInfo"
          title: SchoolInfo
        - const: "LEAInfo"
          title: LEAInfo
        - const: "RoomInfo"
          title: RoomInfo
        - const: "LocationInfo"
          title: LocationInfo
        xml:
          attribute: true

  # ///////////////////////////////// list ////////////////////////////
  IdentificationInfoList:
    type: object
    required:
    - "IdentificationInfo"
    properties:
      IdentificationInfo:
        type: array
        items:
          $ref: '#/definitions/IdentificationInfo'

  # ///////////////////////////////// list ////////////////////////////
  FederalProgramList:
    type: object
    required:
    - "FederalProgram"
    properties:
      FederalProgram:
        type: array
        items:
          $ref: '#/definitions/FederalProgram'

  # ////////////////////////////// default sequence ///////////////////////////////
  FederalProgram:
    type: object
    properties:
      Code:
        type: number
        description: >-
          <p>The unique five-digit number assigned to each federal program as listed in the Catalog of Federal Domestic Assistance (CFDA) Programs. See http://www.cfda.gov/.</p>
      FundingAllocation:
        type: number
        description: >-
          <p>The amount of federal dollars distributed to local education agencies (LEAs), retained by the state education agency (SEA) for program administration or other approved state-level activities (including unallocated, transferred to another state agency, or distributed to entities other than LEAs).</p>

  # ////////////////////////////// default sequence ///////////////////////////////
  SpecialEduction:
    type: object
    properties:
      AgeGroupList:
        type: object
        description: >-
          <p>The groups of students by age receiving special education.</p>
        $ref: '#/definitions/AgeGroupList'
      TitleList:
        type: object
        description: >-
          <p>Titles of personnel employed and contracted to provide special education and related services for children with disabilities.</p>
        $ref: '#/definitions/EmployeeTitleList'

  # ///////////////////////////////// list ////////////////////////////
  AgeGroupList:
    type: object
    required:
    - "AgeGroup"
    properties:
      AgeGroup:
        type: array
        items:
          $ref: '#/definitions/AgeGroup'

  # ////////////////////////////// default sequence ///////////////////////////////
  AgeGroup:
    type: object
    properties:
      AgeGroup:
        type: string
        description: >-
          <p>The age range of special education students taught.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true

  # ///////////////////////////////// list ////////////////////////////
  EmployeeTitleList:
    type: object
    required:
    - "TitleList"
    properties:
      TitleList:
        type: array
        items:
          $ref: '#/definitions/EmployeeTitle'

  # ////////////////////////////// default sequence ///////////////////////////////
  EmployeeTitle:
    type: object
    properties:
      Title:
        type: string
        description: >-
          <p> Titles of personnel employed and contracted to provide special education and related services for children with disabilities. </p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true

  # ////////////////////////////// default sequence ///////////////////////////////
  PersonInfo:
    description: >-
      <p>A wrapper element for information that describes a generic person. This element may be used as a basic building block for person-type objects.</p>
    type: object
    required:
    - "Name"
    properties:
      LocalId:
        type: object
        description: >-
          <p>The locally-assigned identifier for this person. Note: LocalId may be used as a unique person identifier rather than a unique contact identifier. In this case there may be more than one object instance with the same LocalId.</p>
        $ref: '#/definitions/LocalId'
      OtherIdList:
        type: object
        description: >-
          <p>Lists all "other" identifiers associated with the person.</p>
        $ref: '#/definitions/OtherIdList'
      Name:
        type: object
        description: >-
          <p>The name of the person. Note: Type attribute value of 04 must be used here.</p>
        $ref: '#/definitions/NameOfRecord'
      OtherNames:
        type: object
        description: >-
          <p>Previous, alternate or other names or aliases associated with the person.</p>
        $ref: '#/definitions/OtherNames'
      Demographics:
        type: object
        description: >-
          <p>This element contains information related to person's demographics.</p>
        $ref: '#/definitions/Demographics'
      AddressList:
        type: object
        description: >-
          <p>The person's address(es).</p>
        $ref: '#/definitions/AddressList'
      PhoneNumberList:
        type: object
        description: >-
          <p>The person's phone number(s).</p>
        $ref: '#/definitions/PhoneNumberList'
      EmailList:
        type: object
        description: >-
          <p>The person's e-mail address(es).</p>
        $ref: '#/definitions/EmailList'

  # ////////////////////////////// xs:* no attrs ///////////////////////////////
  StateCourseCode:
    description: >-
      <p>State-defined standard course code used to report information about courses.</p>
    type: string

  # ///////////////////////////////// list ////////////////////////////
  ExceptionalityCategoryList:
    type: object
    required:
    - "ExceptionalityCategory"
    properties:
      ExceptionalityCategory:
        type: array
        items:
          $ref: '#/definitions/ExceptionalityCategory'

  # /////////////////////////////// empty extn ///////////////////////////
  ReportPackage:
#     allOfB:
      type: object
      description: >-
        This package has exactly the same structure as <code>AbstractContentPackageType</code>. <code>ReportPackage</code> can be used in addition to SIF objects specifically in reporting situations within <code>SIF_ReportObject</code>. At this time, it is not a SIF object. It cannot be requested via <code>SIF_Query</code> or <code>SIF_ExtendedQuery</code> in a <code>ReportManifest</code>. It may be included in <code>SIF_ReportObject</code> as part of an external report definition.
      $ref: '#/definitions/AbstractContentPackage'

  # ////////////////////////////// default sequence ///////////////////////////////
  AbstractContentPackage:
    description: >-
      <p> An abstract type for derived content package types, elements and objects. This structure may be used verbatim, optionally extending with additional attributes, or may be redefined to include only a subset of child elements and/or to add validation to XML contained in <code>XMLData</code>. Only one instance of <code>XMLData</code>, <code>TextData</code>, <code>BinaryData</code> or <code>Reference</code> can occur in a single instance. </p>
    type: object
    required:
    - "RefId"
    properties:
      RefId:
        type: object
        description: >-
          <p>The GUID that uniquely identifies an instance of the package.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      XMLData:
        type: object
        description: >-
          <p>Contains an arbitary XML element, encoded in UTF-8.</p>
        $ref: '#/definitions/XMLData'
      TextData:
        type: object
        description: >-
          <p>Contains arbitrary text, encoded in UTF-8.</p>
        $ref: '#/definitions/TextData'
      BinaryData:
        type: object
        description: >-
          <p>Contains the base64Binary encoding of binary or text data not encoded in UTF-8.</p>
        $ref: '#/definitions/BinaryData'
      Reference:
        type: object
        description: >-
          <p>References external content via a URL.</p>
        $ref: '#/definitions/Reference'

  # ////////////////////////////// default sequence ///////////////////////////////
  StudentRecordPackageAbstractContentPackage:
    description: >-
      <p> An abstract type for derived content package types, elements and objects. This structure may be used verbatim, optionally extending with additional attributes, or may be redefined to include only a subset of child elements and/or to add validation to XML contained in <code>XMLData</code>. Only one instance of <code>XMLData</code>, <code>TextData</code>, <code>BinaryData</code> or <code>Reference</code> can occur in a single instance. </p>
    type: object
    required:
    - "RefId"
    - "SIF_RefId"
    - "SIF_RefObject"
    properties:
      RefId:
        type: object
        description: >-
          <p>The GUID that uniquely identifies an instance of the package.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      SIF_RefId:
        type: object
        description: >-
          <p> The GUID of an associated object, either <code>StudentRecordExchange</code> or <code>StudentPersonal</code>. </p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      SIF_RefObject:
        type: string
        description: >-
          <p> The associated object type. </p>
        xml:
          attribute: true
      XMLData:
        type: object
        description: >-
          <p>Contains an arbitary XML element, encoded in UTF-8.</p>
        $ref: '#/definitions/XMLData'
      TextData:
        type: object
        description: >-
          <p>Contains arbitrary text, encoded in UTF-8.</p>
        $ref: '#/definitions/TextData'
      BinaryData:
        type: object
        description: >-
          <p>Contains the base64Binary encoding of binary or text data not encoded in UTF-8.</p>
        $ref: '#/definitions/BinaryData'
      Reference:
        type: object
        description: >-
          <p>References external content via a URL.</p>
        $ref: '#/definitions/Reference'

  # ////////////////////////////// xs:* no attrs ///////////////////////////////
  Version:
    description: >-
      A SIF version number.
    type: string
    maxLength: 12
    pattern: '^[0-9]+[.][0-9]+(r[0-9]+)?$'

  # ////////////////////////////// default sequence ///////////////////////////////
  SchoolContact:
    description: >-
      <p>Information on contact persons for this school.</p>
    type: object
    required:
    - "ContactInfo"
    - "SchoolContactType"
    properties:
      PublishInDirectory:
        type: string
        description: >-
          <p>Indicates whether or not this school contact's information should be published in a directory of school information.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      ContactInfo:
        type: object
        $ref: '#/definitions/ContactInfo'

  # ////////////////////////////// xs:* no attrs ///////////////////////////////
  LocalId:
    description: >-
      <p> This is a common element used to define the locally assigned identifier associated with an entity. It is used in StudentPersonal, StaffPersonal, SchoolInfo, and other objects. </p>
    type: string

  # ////////////////////////////// xs:* no attrs ///////////////////////////////
  EntryDate:
    description: >-
      <p>The first date on which a student enters.</p>
    type: string
    format: date

  # ////////////////////////////// xs:* no attrs ///////////////////////////////
  GUID:
    description: >-
      SIF format for a GUID.
    type: string
    pattern: '^[0-9A-Fa-f\-]{32,36}$'

  # ////////////////////////////// another type ///////////////////////////////
  SelectedContent:
#    allOfD:
    type: object
    description: >-
      Allows an XML fragment selected from an object to be used in an element with XML validation skipped.

  # ////////////////////////////// default sequence ///////////////////////////////
  ExtendedParameter:
    description: >-
      <p>An arbitrary parameter with a string name and value</p>
    type: object
    required:
    - "SIF_Name"
    - "SIF_Value"
    properties:
      SIF_Name:
        type: string
        description: >-
          <p>The name of the parameter</p>
      SIF_Value:
        type: string
        description: >-
          <p>The value of the parameter </p>

  # ////////////////////////////// default sequence ///////////////////////////////
  Roles:
    description: >-
      <p>List of one or more Roles.</p>
    type: object
    required:
    - "Role"
    - "RolesType"
    properties:
      Role:
        type: string
        description: >-
          <p>One of a set of possible enumerated Role values.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true

  # ////////////////////////////// default sequence ///////////////////////////////
  LocationOfInstruction:
    description: >-
      <p>Description of the location in which the section is taught.</p>
    type: object
    required:
    - "Code"
    properties:
      Code:
        type: string
        description: >-
          <p>Code representing the location of instruction.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      OtherCodeList:
        type: object
        $ref: '#/definitions/OtherCodeList'

  # ////////////////////////////// default sequence ///////////////////////////////
  AttendanceInfo:
    description: >-
      <p>Information describing how the day relates to attendance.</p>
    type: object
    required:
    - "AttendanceValue"
    - "CountsTowardAttendance"
    properties:
      CountsTowardAttendance:
        type: string
        description: >-
          <p>Designates whether this date should be counted toward student attendance.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      AttendanceValue:
        type: number
        description: >-
          <p> Amount of the school day in which the student should be in attendance (Format is x.x; a student who should be in attendance a full day would be represented as 1.0). If <code>CountsTowardAttendance</code> equals <code>Yes</code> then <code>AttendanceValue</code> must be greater than zero. </p>

  # //////////////////////// xs:* with attrs /////////////////////////////////////
  AlertMessage:
    type: object
    properties:
      value:
      - description: >-
          <p>This is an alert message that is associated with the student.</p>
        type: string
      Type:
        type: string
        description: >-
          <p>This attribute specifies what type of alert message this is.</p>
        xml:
          attribute: true
      TypeCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true

  # ///////////////////////////////// list ////////////////////////////
  VictimList:
    description: >-
      <p>List of victim(s) if the incident is directed toward specific persons or their property.</p>
    type: object
    required:
    - "Victim"
    properties:
      Victim:
        type: array
        items:
          $ref: '#/definitions/Victim'

  # //////////////////////// xs:* with attrs /////////////////////////////////////
  IncidentLocation:
    type: object
    properties:
      value:
      - description: >-
          <p>The locally-defined identifier or description of the location where the incident occurred.</p>
        type: string
      Type:
        type: string
        description: >-
          <p>Identifies where the incident occurred.</p>
        xml:
          attribute: true
      TypeCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true

  # //////////////////////// xs:* with attrs /////////////////////////////////////
  MedicalAlertMessage:
    type: object
    properties:
      value:
      - description: >-
          <p>Medical alert associated with the student.</p>
        type: string
      Severity:
        type: string
        description: >-
          <p>The level of severity of this medical alert.</p>
        xml:
          attribute: true
      SeverityCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true

  # ///////////////////////////////// list ////////////////////////////
  TimetablePeriodList:
    description: >-
      <p>The timetable periods for this school year bell schedule. This essentially provides a list of the time period identifiers that are used in the BellPeriod definitions below with some addition properties for each. The identifiers defined here may be referenced by other objects / elements like MeetingTime</p>
    type: object
    required:
    - "TimetablePeriod"
    properties:
      TimetablePeriod:
        type: array
        items:
          $ref: '#/definitions/TimetablePeriod'

  # ////////////////////////////// default sequence ///////////////////////////////
  BellPeriod:
    description: >-
      <p>An entry for each unique bell period for the bell schedule.</p>
    type: object
    required:
    - "BellPeriodType"
    - "EndTime"
    - "InstructionalMinutes"
    - "RegularSchoolPeriod"
    - "StartTime"
    - "TimetableDayIdentifier"
    - "TimetablePeriodIdentifier"
    properties:
      TimetableDayIdentifier:
        type: string
        description: >-
          <p>The unique identifier for the timetable day used for the bell period (from the day list above).</p>
      TimetablePeriodIdentifier:
        type: string
        description: >-
          <p>The unique identifier for the timetable period used for the bell period (from the period list above).</p>
      StartTime:
        description: >-
          <p>The starting time for the bell period.</p>
      EndTime:
        description: >-
          <p>The ending time for the bell period.</p>
      RegularSchoolPeriod:
        type: string
        description: >-
          <p>Indicates if the bell period is part of the regular school day (i.e. is not a before or after school or break period).</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      InstructionalMinutes:
        type: integer
        description: >-
          <p>The number of minutes to be counted for instruction for the bell period.</p>
      UseInAttendanceCalculations:
        type: object
        $ref: '#/definitions/BellPeriodUseInAttendanceCalculations'

  # ///////////////////////////////// list ////////////////////////////
  MedicalAlertMessages:
    description: >-
      <p>A list of medical altert messages associated with the student.</p>
    type: object
    required:
    - "MedicalAlertMessage"
    properties:
      MedicalAlertMessage:
        type: array
        items:
          $ref: '#/definitions/MedicalAlertMessage'

  # ////////////////////////////// default sequence ///////////////////////////////
  SEAContact:
    description: >-
      Container element for SEA contact information.
    type: object
    required:
    - "ContactInfo"
    - "SEAContactType"
    properties:
      PublishInDirectory:
        type: string
        description: >-
          Indicates whether or not this SEA contact's information should be published in a directory of SEA information.
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      ContactInfo:
        type: object
        description: >-
          Contact information for a person at the SEA.
        $ref: '#/definitions/ContactInfo'

  # ///////////////////////////////// list ////////////////////////////
  IncidentActionList:
    description: >-
      <p>List of actions taken on the incident, regardless of actions relating to individual offenders.</p>
    type: object
    required:
    - "IncidentAction"
    properties:
      IncidentAction:
        type: array
        items:
          $ref: '#/definitions/IncidentAction'

  # ////////////////////////////// default sequence ///////////////////////////////
  PromotionInfo:
    description: >-
      <p>Information on a student’s promotion, retention, or demotion related to this enrollment instance.</p>
    type: object
    properties:
      PromotionStatus:
        type: string
        description: >-
          This value should be set if this enrollment instance is closed for an end-of-year closeout or a mid-year promotion or demotion. A value other than NA should be specified when the enrollment instance represents an end-of-year closeout or mid-year promotion/demotion.
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      Promotion:
        type: object
        description: >-
          <p>This element is mutually exclusive with Nonpromotion, and its child elements should only be populated if the value of PromotionStatus is "Promoted".</p>
        $ref: '#/definitions/Promotion'
      Nonpromotion:
        type: object
        description: >-
          <p>This element is mutually exclusive with Promotion, and its child elements should only be populated if the value of PromotionStatus is "Retained" or "Demoted".</p>
        $ref: '#/definitions/Nonpromotion'

  # //////////////////////// xs:* with attrs /////////////////////////////////////
  CreditsAttempted:
    type: object
    properties:
      value:
      - description: >-
          <p>Number of credits the student is attempting to earn. If present, this element's value overrides the credits in SchoolCourseInfo and SectionInfo.</p>
        type: number
      Type:
        type: string
        description: >-
          <p>The type of credit.</p>
        xml:
          attribute: true
      TypeCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true

  # ///////////////////////////////// list ////////////////////////////
  MeetingTimeList:
    type: object
    required:
    - "MeetingTime"
    properties:
      MeetingTime:
        type: array
        items:
          $ref: '#/definitions/MeetingTime'

  # ////////////////////////////// default sequence ///////////////////////////////
  BellScheduleDay:
    description: >-
      <p></p>
    type: object
    required:
    - "BellScheduleDayType"
