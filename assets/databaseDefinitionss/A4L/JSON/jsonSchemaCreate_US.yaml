      <p>Conveys a student's demographic data for student record exchange and transcript purposes.</p> <p> This object is designed to be a dual-purpose object. It can be linked to a <code>StudentRecordExchange</code> object for record exchange purposes. There may also be Zones where systems can provide this information for record exchange systems or general informational purposes, in which case the object can be linked directly to <code>StudentPersonal</code>. </p>
