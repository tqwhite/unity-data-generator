  # //////////////////////////////// data object /////////////////////////////
  MarkValueInfoCollection:
    type: object
    properties:
      MarkValueInfo:
        type: array
        items:
          $ref: '#/definitions/MarkValueInfo'
  MarkValueInfo:
    required:
    - "Letter"
    - "Name"
    - "Narrative"
    - "Numeric"
    - "Percentage"
    - "RefId"
    - "SchoolInfoRefId"
    - "SchoolYear"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies this MarkValueInfo entity.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      SchoolInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies the School that these Mark Values apply to.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SchoolYear:
        type: object
        description: >-
          <p>The year that this MarkValueInfo applies to.</p>
        $ref: '#/definitions/SchoolYear'
      Name:
        type: string
        description: >-
          <p>The text name of the value list ("Letter Grades", "Letter Grades (+/-)", "ESU", "Pass/Fail", "Override Grades", "Citizenship Comment Codes", etc.).</p>
      Percentage:
        type: object
        description: >-
          <p>Indicates whether a percent Mark is accepted (format ##0.00).</p>
        $ref: '#/definitions/MarkValuePercentage'
      Numeric:
        type: object
        description: >-
          <p>Indicates whether a raw numeric score is accepted.</p>
        $ref: '#/definitions/MarkValueNumber'
      Letter:
        type: object
        description: >-
          <p>Indicates whether a letter Mark is accepted.</p>
        $ref: '#/definitions/MarkValueLetter'
      Narrative:
        type: object
        description: >-
          <p>If present, indicates that a free-form text narrative is accepted.</p>
        $ref: '#/definitions/MarkValueNarrative'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object defines the types of values allowed for a mark and the domain for each mark value. At least one of the Percentage, Numeric, Letter or Narrative nodes must be used to create a valid MarkValueInfo.</p>
  # //////////////////////////////// data object /////////////////////////////
  MarkInfoCollection:
    type: object
    properties:
      MarkInfo:
        type: array
        items:
          $ref: '#/definitions/MarkInfo'
  MarkInfo:
    required:
    - "Description"
    - "MarkValueInfoRefId"
    - "RefId"
    - "SchoolInfoRefId"
    - "SchoolYear"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies this Grading Mark entity.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      MarkValueInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies the MarkValueInfo.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SchoolInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies the School that this Mark applies to.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SchoolYear:
        type: object
        description: >-
          <p>The year that this MarkInfo applies to.</p>
        $ref: '#/definitions/SchoolYear'
      Description:
        type: string
        description: >-
          <p>Textual description of the type of Mark (e.g. "Marking Period Grade", "Comment 1", "Comment 2", "Conduct", "Effort", "WorkHabits").</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> This object defines each mark that can be recorded and associates it with a MarkValueInfo object that lists the types of values and valid values for each type. It also places the definition in the context of a school and a school year. </p>
