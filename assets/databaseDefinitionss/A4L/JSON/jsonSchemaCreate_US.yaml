        type: object
        description: >-
          <p>The date the student originally enrolled in the district of the school of record.</p>
        $ref: '#/definitions/PartialDate'
      SchoolAttendanceHistory:
        type: object
        description: >-
          <p>Chronology of schools attended in the student's academic career, including the current school if enrolled.</p>
        $ref: '#/definitions/SchoolAttendanceHistoryList'
      EnrollmentHistory:
        type: object
        description: >-
          <p>A list of each enrollment in the schools above (see SchoolAttended).</p>
        $ref: '#/definitions/StudentSchoolEnrollmentSummaryList'
      CurrentCourseActivity:
        type: object
        description: >-
          <p>Note: Mandatory if coursework is underway. Conveys a student's current coursework along with mid-term marks if applicable.</p>
        $ref: '#/definitions/CurrentCourseActivity'
      CourseHistory:
        type: object
        description: >-
          <p> Conveys the coursework completed, performance and attendance information for a student's academic career. </p>
        $ref: '#/definitions/CourseHistoryTermList'
      AcademicPerformanceHistory:
        type: object
        description: >-
          <p>Provides a summary of a student's academic performance by reporting period.</p>
        $ref: '#/definitions/AcademicPerformanceHistory'
      AcademicPerformanceSummary:
        type: object
        description: >-
          <p>Conveys a cumulative summary of a student's entire academic performance at the time the transcript was generated.</p>
        $ref: '#/definitions/AcademicPerformanceSummary'
      AssessmentPerformanceHistory:
        type: object
        description: >-
          <p>Note: Mandatory if assessments exist. Conveys a history of assessments that the student has taken throughout his/her academic career.</p>
        $ref: '#/definitions/AssessmentPerformanceHistoryList'
      AdditionalGraduationRequirementPerformanceHistory:
        type: object
        description: >-
          <p>Note: Mandatory if additional graduation requirements exist. Conveys a student's achievements in relation to additional graduation requirements.</p>
        $ref: '#/definitions/AdditionalGraduationRequirementPerformanceHistoryList'
      ActivityAwardHistory:
        type: object
        description: >-
          <p>Note: Mandatory if activities/awards exist. Conveys award the student has received and/or activities in which s/he has been involved.</p>
        $ref: '#/definitions/ActivityAwardHistoryList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object conveys a student's academic record data for student record exchange and transcript purposes.</p> <p> This object is designed to be a dual-purpose object. It can be linked to a <code>StudentRecordExchange</code> object for record exchange purposes. There may also be Zones where systems can provide this information for record exchange systems or general informational purposes, in which case the object can be linked directly to <code>StudentPersonal</code>. </p>
