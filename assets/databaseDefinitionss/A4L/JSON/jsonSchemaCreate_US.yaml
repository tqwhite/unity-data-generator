          <p> Reference to SIF elements or external authority (e.g., <code>StudentPersonal/Gender</code>). </p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object defines the attribute of a group of objects that implicitly or explicitly defines a subset of the group.</p>
  # //////////////////////////////// data object /////////////////////////////
  AggregateStatisticFactCollection:
    type: object
    properties:
      AggregateStatisticFact:
        type: array
        items:
          $ref: '#/definitions/AggregateStatisticFact'
  AggregateStatisticFact:
    required:
    - "AggregateStatisticInfoRefId"
    - "Characteristics"
    - "RefId"
    - "Value"
    type: object
    properties:
      RefId:
        type: object
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      AggregateStatisticInfoRefId:
        type: object
        description: >-
          Reference to statistic defined by <code>AggregateStatisticInfo</code>.
        $ref: '#/definitions/IdRef'
      Characteristics:
        type: object
        description: >-
          <p> Reference to one or more <code>AggregateCharacteristicInfo</code> objects. </p>
        $ref: '#/definitions/AggregateCharacteristicInfoRefIdList'
      Excluded:
        type: string
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      Value:
        type: number
        description: >-
          <p>Value of the fact.</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object is the actual value of the measurement. It is always associated with one statistic and one or more characteristics.</p>
  # //////////////////////////////// data object /////////////////////////////
  StudentMealCollection:
    type: object
    properties:
      StudentMeal:
        type: array
        items:
          $ref: '#/definitions/StudentMeal'
  StudentMeal:
    required:
    - "RefId"
    - "StudentPersonalRefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>A GUID that identifies an instance of this object. This RefId is new for 2.7M and MUST be supported like other objects that have a RefId (i.e. it is the key for the object). The alternate keys MUST continue to be supported.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      StudentPersonalRefId:
        type: object
        description: >-
          <p>The GUID of the student to whom this object is linked.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      MealStatus:
        type: object
        description: >-
          <p>The student's current meal status.</p>
        $ref: '#/definitions/MealStatus'
      HistoricalMealStatus:
        type: object
        description: >-
          <p> Optionally provides the meal status of the student historically. Note that as this status is historical, <code>StartDate</code> and <code>EndDate</code> together, and/or <code>SchoolYear</code> <span>MUST</span> be included. If <code>SchoolYear</code> is included, <code>StartDate</code> and <code>EndDate</code> should not cross school year boundaries, i.e. in addition to multiple statuses being a possibility in a given school year, the same status may be repeated so <code>StartDate</code> and <code>EndDate</code> don't disagree with <code>SchoolYear</code>, if included. </p>
        $ref: '#/definitions/MealStatusList'
      LastBreakfastDate:
        type: string
        format: date
        description: >-
          <p>Date of the last reimbursable breakfast served.</p>
      LastLunchDate:
        type: string
        format: date
        description: >-
          <p>Date of the last reimbursable lunch served.</p>
      Amounts:
        type: object
        $ref: '#/definitions/FSAmountList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object communicates the current meal/account status of a given student.</p> <p> This object will return information such as the amount of remaining breakfast/lunch credits, cash balance, meal status (free/reduced), etc. Systems may optionally support the historical reporting of a student's meal status (free/reduced). </p>
  # //////////////////////////////// data object /////////////////////////////
  FoodserviceItemCollection:
    type: object
    properties:
      FoodserviceItem:
        type: array
        items:
          $ref: '#/definitions/FoodserviceItem'
  FoodserviceItem:
    required:
