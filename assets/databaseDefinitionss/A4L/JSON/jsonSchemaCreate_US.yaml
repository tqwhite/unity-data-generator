        type: object
        description: >-
          <p>The purpose of the activities as related to students.</p>
        $ref: '#/definitions/JobFunction'
      RegularHours:
        type: number
        description: >-
          <p>Regular hours worked. Enter 0 if no hours worked.</p>
      OvertimeHours:
        type: number
        description: >-
          <p>Overtime hours worked. Enter 0 if no overtime hours worked.</p>
      PayPeriod:
        type: string
        description: >-
          <p>Pay period hours were worked in.</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object contains information about the time worked by an employee on a specific job.</p>
  # //////////////////////////////// data object /////////////////////////////
  VendorInfoCollection:
    type: object
    properties:
      VendorInfo:
        type: array
        items:
          $ref: '#/definitions/VendorInfo'
  VendorInfo:
    required:
    - "Name"
    - "RefId"
    type: object
    properties:
