  # //////////////////////////////// data object /////////////////////////////
  StudentContactCollection:
    type: object
    properties:
      StudentContact:
        type: array
        items:
          $ref: '#/definitions/StudentContact'
  StudentContact:
    required:
    - "ContactFlags"
    - "Name"
    - "RefId"
    - "StudentPersonalRefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The GUID of this contact.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      StudentPersonalRefId:
        type: object
        description: >-
          <p>The GUID of the student whose contact this is.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      LocalId:
        type: object
        description: >-
          <p> The locally-assigned identifier for this contact. Note: LocalId may be used as a unique person identifier rather than a unique contact identifier. In this case there may be more than one StudentContact instance with the same LocalId. </p>
        $ref: '#/definitions/LocalId'
      OtherIdList:
        type: object
        description: >-
          <p>Lists all "other" identifiers associated with the contact.</p>
        $ref: '#/definitions/OtherIdList'
      Name:
        type: object
        description: >-
          <p> The name of the contact. Note: Type attribute value of <code>04</code> must be used here. </p>
        $ref: '#/definitions/NameOfRecord'
      OtherNames:
        type: object
        description: >-
          <p>Previous, alternate or other names or aliases associated with the contact.</p>
        $ref: '#/definitions/OtherNames'
      Demographics:
        type: object
        description: >-
          <p>Demographic information about the contact.</p>
        $ref: '#/definitions/Demographics'
      AddressList:
        type: object
        description: >-
          <p>The contact's address(es).</p>
        $ref: '#/definitions/AddressList'
      PhoneNumberList:
        type: object
        description: >-
          <p>The contact's phone number(s).</p>
        $ref: '#/definitions/PhoneNumberList'
      EmailList:
        type: object
        description: >-
          <p>The contact's e-mail address(es).</p>
        $ref: '#/definitions/EmailList'
      Relationship:
        type: object
        description: >-
          <p>Defines the relationship of the contact to the student.</p>
        $ref: '#/definitions/Relationship'
      EmployerType:
        type: string
        description: >-
          <p>Code that defines the employer type.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      EducationalLevel:
        type: object
        description: >-
          <p>The highest level of education completed by the contact person.</p>
        $ref: '#/definitions/EducationalLevel'
      ContactFlags:
        type: object
        description: >-
          <p> Contains Yes/No characteristics of the contact person's role. Provide a <code>Yes</code> value for all that apply. At least one of the child elements of <code>ContactFlags</code> must have a <code>Yes</code> value. Do not publish the <code>StudentContact</code> instance if one of the child elements does not have a <code>Yes</code> value. </p>
        $ref: '#/definitions/ContactFlags'
      ContactSequence:
        type: integer
        description: >-
          <p>Number indicating the order in which the person should be contacted.</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object contains information regarding a contact person for a student.</p> <p>Note: <em>As of version 2.5 this object is deprecated.</em> It will be removed from the Specification in the next major release. Use the StudentContactPersonal and StudentContactRelationship objects instead. </p> <p> Note: At least one of the child elements of <code>ContactFlags</code> must have a <code>Yes</code> value. Do not publish the <code>StudentContact</code> instance if one of the child elements does not have a <code>Yes</code> value. </p>
  # //////////////////////////////// data object /////////////////////////////
  StudentDailyAttendanceCollection:
    type: object
    properties:
      StudentDailyAttendance:
        type: array
        items:
          $ref: '#/definitions/StudentDailyAttendance'
  StudentDailyAttendance:
    required:
    - "AttendanceCodeInfoRefId"
    - "Date"
    - "RefId"
    - "SchoolInfoRefId"
    - "SchoolYear"
