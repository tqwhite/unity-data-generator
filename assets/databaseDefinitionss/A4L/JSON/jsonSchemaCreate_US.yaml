          attribute: true
      SchoolYear:
        type: object
        description: >-
          <p> School year for which this enrollment is applicable, expressed as the four-digit year in which the school year ends (e.g. <code>2007</code> for the 2006-07 school year). </p>
        $ref: '#/definitions/SchoolYear'
        xml:
          attribute: true
      PictureSource:
        type: object
        description: >-
          <p> This element defines the picture. If the Type attribute is URL, this is the location of the picture in [JPEG] format; if Type is JPEG, this is the [JPEG] image data encoded using the Base64 Content-Transfer-Encoding defined in Section 6.8 of [RFC 2045]. </p>
