        description: >-
          <p>Summarized amount.</p>
      InstructionalLevel:
        type: string
        description: >-
          <p>An identifier for the level of instruction provided by the facility or operational unit e.g. Middle, Elementary, Prekindergarten, Charter This has greater granularity than the SIF element ExpenditureArea.</p>
      OperationalUnit:
        type: string
        description: >-
          <p>The code for a location, building, organization code, facility or site. For example, this code can identify a Charter School or Maintenance Facility.</p>
      ProjectCode:
        type: string
        description: >-
          <p>A code used for project reporting. For instance, according to NCES, this code can be parsed to identify the particular funding source, authority, or expenditure purpose for which a special record or report is required, and to identify particular projects and the fiscal year of the appropriation within that funding source.</p>
      Source:
        type: string
        description: >-
          <p>Codes used for recording revenue and other receivables by source, e.g. codes for Taxes Levied/Assessed by the School District, Sales and Use Taxes, code for Textbook Sales and Rentals, etc.</p>
      ChartOfAccountCode:
        type: string
        description: >-
          <p>Balance Sheet account number used for an Asset, Liability, or Equity (equity also known as Net Asset or Fund Balance), e.g. a code for Cash in Bank, or Interfund Loans Payable, or Unreserved Fund Balance, etc.</p>
      SubjectMatter:
        type: string
        description: >-
          <p>The actual code that identifies the organization of subject matter and related learning experiences provided for the instruction of students.</p>
      JobClassification:
        type: string
        description: >-
          <p>A code that classifies an expense; a description of the specific group of duties and responsibilities, e.g. Staff Career Development Alternatives. (NCES, National Education Data Model, http://nces.ed.gov/forum/datamodel/eiebrowser/techview.aspx?instance=staffAssignment'amp';attrib=Professional-Educational_Job_Classification).</p>
