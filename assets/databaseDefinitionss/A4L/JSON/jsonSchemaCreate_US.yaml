      BloomsTaxonomyLevels:
        type: object
        description: >-
          <p> This is a taxonomy of educational objectives based on three "domains:" Affective, Psychomotor, and Cognitive. For the purposes of assigning attributes to learning resources, the SIF specification is limited to the cognitive domain, including knowledge, comprehension, application, analysis, synthesis and evaluation. </p>
        $ref: '#/definitions/BloomsTaxonomyLevels'
      MultipleIntelligences:
        type: object
        description: >-
          <p>An educational theory that describes at least eight different kinds of "intelligences." These include linguistic, logical-mathematical, spatial, bodily-kinesthetic, musical intelligence, interpersonal, intrapersonal and naturalist. </p>
        $ref: '#/definitions/MultipleIntelligences'
      InstructionalStrategies:
        type: object
        description: >-
          <p>The various ways that instruction is delivered to achieve learning objectives and concepts.</p>
        $ref: '#/definitions/InstructionalStrategies'
      Title:
        type: string
        description: >-
          <p>The title of the content.</p>
      Summary:
        type: string
        description: >-
          <p>A summary of the content.</p>
      LearningObjectives:
        type: object
        description: >-
          <p>Description of learning objective(s) for this lesson, i.e., "Student will be able to use Pythagorean Theorem."—equates to 'benchmark' or 'goal' or other terminology</p>
        $ref: '#/definitions/LearningObjectives'
      ResourceTypes:
        type: object
        description: >-
          <p> Type of resource </p>
        $ref: '#/definitions/ResourceTypes'

  # ///////////////////////////// single Item with Values ////////////////////////////////
  ELL:
    type: string
    oneOf:
    - const: "Yes"
      title: Yes
    - const: "No"
      title: No
    - const: "Unknown"
      title: Unknown

  # ////////////////////////////// default sequence ///////////////////////////////
  OtherCodeList:
    description: >-
      <p> List of other codes or strings that crosswalk to or serve as translations of the <code>Code</code> element paired with this common element. If <code>Code</code> changes and <code>OtherCode</code>s are supported, both <code>Code</code> and all associated <code>OtherCode</code> elements must be present. </p>
    type: object
    required:
    - "Codeset"
    - "OtherCode"
    properties:
      OtherCode:
        type: string
        description: >-
          <p> A state/province code, local code, other code or a text string that crosswalks to or serves as a translation of an associated <code>Code</code> element. </p>
      Codeset:
        description: >-
          <p> Describes the <code>OtherCode</code> element content as either a state/province code, a local code, other code, or text string. </p>
        oneOf:
        - const: "StateProvince"
          title: StateProvince
        - const: "Local"
          title: Local
        - const: "Other"
          title: Other
        - const: "Text"
          title: Text
        xml:
          attribute: true

  # ///////////////////////////////// list ////////////////////////////
  SIF_ExtendedElements:
    description: >-
      <p>Allows an agent to include data not yet defined within a SIF data object as name/value pairs.</p>
    type: object
    properties:
      SIF_ExtendedElement:
        type: array
        items:
          $ref: '#/definitions/SIF_ExtendedElement'

  # //////////////////////// attr extn /////////////////////////////////////
  Name:
    type: object
    properties:
      value:
#        allOfC:
        $ref: '#/definitions/BaseName'
      Type:
        type: string
        description: >-
          <p> Code that specifies what type of name this is. If unsure, use <code>04</code>. </p>
        xml:
          attribute: true
    description: >-
      The Name element, which could belong to a student, staff member, contact, etc. This element or a form with a subset of Type values occurs within objects such as StudentPersonal, StudentContact, StaffPersonal, etc.

  # ////////////////////////////// default sequence ///////////////////////////////
  OldAddress:
    description: >-
      <p>This element contains address data.</p>
    type: object
    required:
    - "City"
    - "Country"
    - "OldAddressType"
    - "PostalCode"
    - "StateProvince"
    - "Street"
    - "Type"
    properties:
      Type:
        type: string
        description: >-
          <p>Code that defines the location of the address. Note: A subset of specific valid values for each instance in a data object may be listed in that object.</p>
        xml:
          attribute: true
      TypeCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      Street:
        type: object
        description: >-
          <p>The street element is a complex element and breaks the street down into several parts.</p>
        $ref: '#/definitions/Street'
      City:
        type: string
        description: >-
          <p>The city part of the address.</p>
      County:
        type: string
        description: >-
          <p>The county part of the address.</p>
      StateProvince:
        type: object
        description: >-
          <p>The state or province code.</p>
        $ref: '#/definitions/StateProvince'
      StateANSICode:
        type: string
        description: >-
          <p>The American National Standards Institute (ANSI) two-digit code for the state.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      Country:
        type: object
        description: >-
          <p>The country code.</p>
        $ref: '#/definitions/Country'
      PostalCode:
        type: string
        description: >-
          <p>The ZIP/postal code.</p>
      GridLocation:
        type: object
        description: >-
          <p>The location of the address.</p>
        $ref: '#/definitions/GridLocation'
      AddressRefId:
        type: object
        description: >-
          <p>Reference to an Address object or instance.</p>
        $ref: '#/definitions/RefId'

  # ///////////////////////////////// list ////////////////////////////
  RightsElements:
    description: >-
      <p>A list of rights elements.</p>
    type: object
    properties:
      RightsElement:
        type: array
        items:
          $ref: '#/definitions/RightsElement'

  # ////////////////////////////// default sequence ///////////////////////////////
  XMLData:
    description: >-
      <p>Contains an arbitary XML element, encoded in UTF-8.</p>
    type: object
    properties:
      Description:
        type: string
        description: >-
          <p> Contains an optional description of the content or a processing hint with regard to its structure (e.g. named standard, file layout or XSD). Contents may be mandated in instances of this type, or types that follow the <code>AbstractContentPackageType</code> pattern. </p>
        xml:
          attribute: true

  # ////////////////////////////// default sequence ///////////////////////////////
  LifeCycle:
    description: >-
      <p> This common metadata element describes the life cycle of the object it represents, based on the IEEE LOM LifeCycle element [LOM]. </p>
    type: object
    properties:
      Created:
        type: object
        description: >-
          When the object was created by whom. This is a more persistent creation date than the date/time in the object's <code>SIF_Header</code>. Depending on the use case being implemented, this value could contain the date the data in the object first entered the zone or was actually created.
        $ref: '#/definitions/Created'
      ModificationHistory:
        type: object
        description: >-
          An ordered set of <code>Modified</code> elements describing which system modified the data, when the modification took place, and a brief description of the modification.
        $ref: '#/definitions/ModificationHistory'
      TimeElements:
        type: object
        $ref: '#/definitions/TimeElements'

  # ////////////////////////////// default sequence ///////////////////////////////
  Creator:
    type: object
    required:
    - "ID"
    - "Name"
    properties:
      Name:
        type: string
        description: >-
          Human-readable name of the data's creator. If the object contains system-generated data, the name should identify the creating service or application.
      ID:
        type: string
        description: >-
          Unique identifier of the creator. An email address or URI could be used here.

  # ////////////////////////////// xs:* no attrs ///////////////////////////////
  DistrictCourseCode:
    description: >-
      <p>A district course code.</p>
    type: string

  # ////////////////////////////// another type ///////////////////////////////
  ReportDataObject:
#    allOfD:
    type: object
    description: >-
      <p>A SIF XML object.</p>

  # ////////////////////////////// default sequence ///////////////////////////////
  OrganizationRelationship:
    description: >-
      <p>Provides information about a student's relationship to an organization.</p>
    type: object
    required:
    - "FinanciallyResponsible"
    - "ProvidingInstruction"
    - "ProvidingServices"
    - "ResidencyStatus"
    properties:
      ResidencyStatus:
        type: object
        $ref: '#/definitions/ResidencyStatus'
      ProvidingInstruction:
        type: boolean
        description: >-
          <p>Flag that indicates if the reporting organization is providing instruction to the student.</p>
      ProvidingServices:
        type: boolean
        description: >-
          <p>Flag that indicates if the reporting organization is providing services that are not related to instruction to the student. An example of a non-instructional service is transportation.</p>
      FinanciallyResponsible:
        type: boolean
        description: >-
          <p>Flag that indicates if the reporting organization is financially responsible for the student.</p>

  # ////////////////////////////// another type ///////////////////////////////
  GraduationDate:
#    allOfD:
    $ref: '#/definitions/PartialDate'
    description: >-
      <p>Date student officially graduated from secondary education.</p>

  # ///////////////////////////// single Item with Values ////////////////////////////////
  PrimaryAssignment:
    type: string
    oneOf:
    - const: "Yes"
      title: Yes
    - const: "No"
      title: No

  # ///////////////////////////////// list ////////////////////////////
  FeesForUse:
    description: >-
      A container for fees for use of the content in the object.
    type: object
    properties:
      FeeForUse:
        type: array
        items:
          $ref: '#/definitions/FeeForUse'

  # ////////////////////////////// another type ///////////////////////////////
  PartialDate:
#    allOfD:
    description: >-
      <p>A year, with an optional month/day, or an optional month by itself.</p>

  # //////////////////////// xs:* with attrs /////////////////////////////////////
  ElectronicId:
    type: object
    properties:
      value:
      - description: >-
          <p> Common element used to specify entity identifiers that are read by electronic equipment. It is used in objects such as StudentPersonal, StaffPersonal, and LibraryPatronStatus. </p>
        type: string
      Type:
        type: string
        description: >-
          <p>Electronic Id type.</p>
        xml:
          attribute: true
      TypeCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true

  # ///////////////////////////////// list ////////////////////////////
  CountriesOfResidency:
    type: object
    required:
    - "CountryOfResidency"
    properties:
      CountryOfResidency:
        type: array
        items:
          $ref: '#/definitions/Country'

