      title: A short session which occurs between longer sessions.
    - const: "LongSession"
      title: A session that is longer than a semester but shorter than a full year.
    - const: "MiniTerm"
      title: A school term which is shorter than a regular session..
    - const: "Quarter"
      title: One of four equal segments into which a school year is divided.
    - const: "Quinmester"
      title: One of five equal segments into which a school year is divided.
    - const: "Semester"
      title: One of two equal segments into which a school year is divided.
    - const: "SummerTerm"
      title: A school term which takes place in the summer between two regular school terms.
    - const: "Trimester"
      title: One of three equal segments into which a school year is divided.
    - const: "TwelveMonth"
      title: An educational program that operates on a full twelve month cycle.
    - const: "Other"
      title: The session type is in a category not yet defined in CEDS.

