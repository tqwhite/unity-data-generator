        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      TimeFrame:
        type: string
        description: >-
          <p> The timeframe of the enrollment based on the <code>SIF_Date</code> in the <code>SIF_Header</code> of the message. For events, it is determined as of the date the event is generated. For requests and responses, it is calculated based on the date of the request. </p>
        xml:
          attribute: true
      TimeFrameCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      SchoolYear:
        type: object
        description: >-
          <p> School year for which this enrollment is applicable, expressed as the four-digit year in which the school year ends (e.g. <code>2007</code> for the 2006-07 school year). StudentSchoolEnrollment instances must not span multiple school years. </p>
        $ref: '#/definitions/SchoolYear'
        xml:
          attribute: true
      EntryDate:
        type: string
        format: date
        description: >-
          <p>The date from when this enrollment is valid.</p>
      EntryType:
        type: object
        $ref: '#/definitions/StudentEntryType'
      GradeLevel:
        type: object
        description: >-
          <p>Grade or academic level of student for this enrollment.</p>
        $ref: '#/definitions/GradeLevel'
      Homeroom:
        type: object
        description: >-
          <p>Homeroom for this enrollment.</p>
        $ref: '#/definitions/IdRef'
      SIF_RefObject:
        description: >-
          <p>The name of the object referenced.</p>
        oneOf:
        - const: "RoomInfo"
          title: RoomInfo
        xml:
          attribute: true
      Advisor:
        type: object
        $ref: '#/definitions/StudentSchoolEnrollmentAdvisor'
      Counselor:
        type: object
        $ref: '#/definitions/StudentSchoolEnrollmentCounselor'
      Calendar:
        type: object
        $ref: '#/definitions/StudentSchoolEnrollmentCalendar'
      ExitDate:
        type: string
        format: date
        description: >-
          <p> The last school calendar day of this enrollment. If the student has exited the school or the enrollment has a <code>RecordClosureReason</code>, <code>ExitDate</code> must have a value. </p>
      ExitStatus:
        type: object
        $ref: '#/definitions/StudentExitStatus'
      ExitType:
        type: object
        $ref: '#/definitions/StudentExitType'
      ExitGradeLevel:
        type: object
        description: >-
          <p>The grade level or primary instructional level at which a student exits a school, program, or an educational institution.</p>
        $ref: '#/definitions/GradeLevel'
      RecordClosureReason:
        type: string
        description: >-
          <p>The reason why this enrollment was closed.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      PromotionInfo:
        type: object
        description: >-
          <p>Information on a student’s promotion, retention, or demotion related to this enrollment instance.</p>
        $ref: '#/definitions/PromotionInfo'
      FTE:
        type: number
        description: >-
          <p>Full-time equivalent numeric value of the student's course load during this enrollment, expressed in decimal form, where 1.00 represents a full-time enrollment.</p>
      FTPTStatus:
        type: object
        $ref: '#/definitions/StudentSchoolEnrollmentFTPTStatus'
      ResidencyStatus:
        type: object
        description: >-
          <p>Location of an individual's legal residence relative to (within or outside) the boundaries of the school for this enrollment.</p>
        $ref: '#/definitions/ResidencyStatus'
      NonResidentAttendReason:
        type: object
        $ref: '#/definitions/StudentSchoolEnrollmentNonResidentAttendReason'
      ResponsableSchoolList:
        type: object
        $ref: '#/definitions/ResponsableSchoolList'
      ResponsableLEAList:
        type: object
        $ref: '#/definitions/ResponsableLEAList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> This object defines information related to a student's enrollment. StudentSchoolEnrollment instances must not span multiple school years. </p> <p> Note there is only one current home enrollment at a time for a student. One and only one instance of the <code>StudentSchoolEnrollment</code> object must exist for a given student with <code>MembershipType=Home</code> for the time interval between <code>EntryDate</code> and <code>ExitDate</code>, inclusive. </p> <p> Effective in version 2.0, agents are required to re-publish a <code>StudentSchoolEnrollment</code> object <code>Change</code> event when the <code>TimeFrame</code> attribute changes, regardless of when the data entry is done. This is in addition to the pre-2.0 practice of publishing the object <code>Change</code> event at the time the data changes in the corresponding application. </p> <p> When the object is re-published, it must contain all the data in the object that is supported by the publisher. For more information, please refer to the supporting documentation. </p>
  # //////////////////////////////// data object /////////////////////////////
  StudentSectionEnrollmentCollection:
    type: object
    properties:
      StudentSectionEnrollment:
        type: array
        items:
          $ref: '#/definitions/StudentSectionEnrollment'
  StudentSectionEnrollment:
    required:
    - "RefId"
    - "SchoolYear"
    - "SectionInfoRefId"
    - "StudentPersonalRefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies this StudentSectionEnrollment entity.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      StudentPersonalRefId:
        type: object
        description: >-
          <p>The Id (GUID) of the student to whom the enrollment information applies.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SectionInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) of the section in which this student is enrolled.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SchoolYear:
        type: object
        description: >-
          <p> School year for which the information is applicable, expressed as the four-digit year in which the school year ends (e.g. <code>2007</code> for the 2006-07 school year). </p>
        $ref: '#/definitions/SchoolYear'
        xml:
          attribute: true
      EntryDate:
        type: string
        format: date
        description: >-
          <p>Date from when this course section enrollment is valid.</p>
      ExitDate:
        type: string
        format: date
        description: >-
          <p>The last school calendar day (membership day) the student was enrolled in the course section (inclusive).</p>
      ScheduleInfoOverrideList:
        type: object
        description: >-
          <p>A complete replacement of the standard SectionInfo/ScheduleInfoList for this student's course enrollment.</p>
        $ref: '#/definitions/ScheduleInfoOverrideList'
      InstructionalDeliveryModeList:
        type: object
        description: >-
          <p>The various instructional delivery modes chosen, out of those offered, for this section.</p>
        $ref: '#/definitions/InstructionalDeliveryModeList'
      CreditsAttempted:
        type: object
        description: >-
          <p>Number of credits the student is attempting to earn. If present, this element's value overrides the credits in SchoolCourseInfo and SectionInfo.</p>
        $ref: '#/definitions/CreditsAttempted'
      DualCredit:
        type: string
        description: >-
          <p>Indicates whether this course is applicable in having dual credits. This value overrides the SchoolCourseInfo DualCredit value at the student section level..</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      CTEConcentrator:
        type: object
        $ref: '#/definitions/StudentSectionEnrollmentCTEConcentrator'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object contains information about a student's enrollment in a section of a course.</p>
  # //////////////////////////////// data object /////////////////////////////
  TermInfoCollection:
    type: object
    properties:
      TermInfo:
        type: array
        items:
          $ref: '#/definitions/TermInfo'
  TermInfo:
    required:
    - "EndDate"
    - "RefId"
    - "SchoolInfoRefId"
    - "SchoolYear"
    - "StartDate"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies this TermInfo entity.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      SchoolInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) that identifies the school where the term is used.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SchoolYear:
        type: object
        description: >-
          <p> School year for which the information is applicable, expressed as the four-digit year in which the school year ends (e.g., <code>2007</code> for the 2006-07 school year). </p>
        $ref: '#/definitions/SchoolYear'
        xml:
          attribute: true
      StartDate:
        type: string
        format: date
        description: >-
          <p>Starting date of the term.</p>
      EndDate:
        type: string
        format: date
        description: >-
          <p>Ending date of the term (CCYYMMDD).</p>
      Description:
        type: string
        description: >-
          <p>Text-based description of the term.</p>
      RelativeDuration:
        type: number
        description: >-
          <p>Portion of the school year represented by this term, expressed in decimal form precise to 4 decimal places (e.g., 0.1333).</p>
      TermCode:
        type: string
        description: >-
          <p>Locally-defined code.</p>
      Track:
        type: string
        description: >-
          <p>The name, description, or code of the track that contains this term. This is used when there are multiple tracks within a school. For instance, kindergarten commonly has a different set of terms than other grades within the school.</p>
      TermSpan:
        type: object
        $ref: '#/definitions/TermSpan'
      MarkingTerm:
        type: string
        description: >-
          <p>Does this TermInfo represent a marking period?</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      SchedulingTerm:
        type: object
        $ref: '#/definitions/TermInfoSchedulingTerm'
      AttendanceTerm:
        type: object
        $ref: '#/definitions/TermInfoAttendanceTerm'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object provides information about a term; i.e., a reportable period of time.</p>
  # //////////////////////////////// data object /////////////////////////////
  StudentSnapshotCollection:
    type: object
    properties:
      StudentSnapshot:
        type: array
        items:
          $ref: '#/definitions/StudentSnapshot'
  StudentSnapshot:
    required:
    - "HomeEnrollment"
    - "LocalId"
    - "RefId"
    - "SchoolYear"
    - "SnapDate"
    - "StudentPersonalRefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>A GUID that identifies an instance of this object. This RefId is a “transient” value; that is, it SHOULD be generated by the provider at the time the object is provided in a Response message. This value MUST NOT be used in a later Request for the object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      SnapDate:
        type: string
        format: date
        description: >-
          <p> The date the data snapshot was taken. Some elements are provided/calculated as of the SnapDate, and some are provided as of the date the object is requested (i.e., some can be historical and some will represent the last information available/last known value). In a SIS the following elements are provided/calculated as of the SnapDate: Age, HomeEnrollment and all its child elements. Other applications (e.g., data warehouses) may be able to provide values for other elements on various snap dates. </p>
        xml:
          attribute: true
      StudentPersonalRefId:
        type: object
        description: >-
          <p>The Id (GUID) of the student to whom this information relates.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SchoolYear:
        type: object
        description: >-
          <p> School year in which the SnapDate falls, and for which the information is applicable, expressed as the four-digit year in which the school year ends (e.g. <code>2007</code> for the 2006-07 school year). </p>
        $ref: '#/definitions/SchoolYear'
        xml:
          attribute: true
      Name:
        type: object
        description: >-
          <p>The name of the student.</p>
        $ref: '#/definitions/Name'
      LocalId:
        type: object
        description: >-
          <p>The locally-defined identifier for this student.</p>
        $ref: '#/definitions/LocalId'
      StateProvinceId:
        type: object
        description: >-
          <p>The state-assigned identifier for this student.</p>
        $ref: '#/definitions/StateProvinceId'
      Address:
        type: object
        description: >-
          <p>The address of the student.</p>
        $ref: '#/definitions/OldAddress'
      RaceList:
        type: object
        description: >-
          <p>Person's race</p>
        $ref: '#/definitions/RaceList'
      HispanicLatino:
        type: string
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      Gender:
        type: object
        $ref: '#/definitions/StudentSnapshotGender'
      BirthDate:
        type: object
        description: >-
          <p>The person's date of birth.</p>
        $ref: '#/definitions/BirthDate'
      Age:
        type: integer
        description: >-
          <p>The age (in years) of the student on the date in SnapDate.</p>
      ProjectedGraduationYear:
        type: object
        description: >-
          <p>Currently projected graduation year.</p>
        $ref: '#/definitions/ProjectedGraduationYear'
      OnTimeGraduationYear:
        type: object
        description: >-
          <p>First projected graduation year, usually determined when student is accepted into ninth grade.</p>
        $ref: '#/definitions/OnTimeGraduationYear'
      GraduationDate:
        type: object
        description: >-
          <p>Date student officially graduated from secondary education.</p>
        $ref: '#/definitions/GraduationDate'
      GraduationAward:
        type: object
        $ref: '#/definitions/StudentSnapshotGraduationAward'
      GraduationOnTime:
        type: object
        $ref: '#/definitions/StudentSnapshotGraduationOnTime'
      HomeEnrollment:
        type: object
        description: >-
          <p> Enrollment-related information for the school that is responsible for reporting the student's membership/child accounting information. This is most likely the primary enrollment site for the student. </p>
        $ref: '#/definitions/HomeEnrollment'
      IDEA:
        type: object
        $ref: '#/definitions/StudentSnapshotIDEA'
      Migrant:
        type: object
        $ref: '#/definitions/StudentSnapshotMigrant'
      Title1:
        type: object
        $ref: '#/definitions/StudentSnapshotTitle1'
      GiftedTalented:
        type: object
        $ref: '#/definitions/StudentSnapshotGiftedTalented'
      EconomicDisadvantage:
        type: object
        $ref: '#/definitions/StudentSnapshotEconomicDisadvantage'
      ELL:
        type: object
        $ref: '#/definitions/StudentSnapshotELL'
      Homeless:
        type: object
        $ref: '#/definitions/StudentSnapshotHomeless'
      Section504:
        type: object
        $ref: '#/definitions/StudentSnapshotSection504'
      VocationalConcentrator:
        type: object
        $ref: '#/definitions/StudentSnapshotVocationalConcentrator'
      Immigrant:
        type: object
        $ref: '#/definitions/StudentSnapshotImmigrant'
      NeglectedDelinquent:
        type: object
        $ref: '#/definitions/StudentSnapshotNeglectedDelinquent'
      FreeAndReducedStatus:
        type: object
        $ref: '#/definitions/StudentSnapshotFreeAndReducedStatus'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> This object provides a snapshot of a student's record on a given day. All information reported in the object is reported as it appeared in the responding system on the date specified in SnapDate. It can be used for synching data across applications, for periodically loading a data warehouse, or for vertical reporting of data to a requesting authority, such as a state department of education. </p>
