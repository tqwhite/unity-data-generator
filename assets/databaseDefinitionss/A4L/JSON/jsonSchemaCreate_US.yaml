      StateProvinceId:
        type: object
        description: >-
          <p>The state or province defined identifier for this school.</p>
        $ref: '#/definitions/StateProvinceId'
      Status:
        type: string
        description: >-
          <p>Enrollment status as of the SnapDate.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      GradeLevel:
        type: object
        description: >-
          <p>Grade or academic level of student.</p>
        $ref: '#/definitions/GradeLevel'
      Homeroom:
        type: object
        $ref: '#/definitions/IdRef'
      SIF_RefObject:
        description: >-
          <p>The name of the SIF object referenced.</p>
