    - "Code"
    - "LanguageContainerType"
    properties:
      Code:
        type: string
        description: >-
          <p>The code representing the specific language that an individual uses to communicate.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      OtherCodeList:
        type: object
        $ref: '#/definitions/OtherCodeList'
      LanguageType:
        type: object
        $ref: '#/definitions/LanguageContainerLanguageType'
      Dialect:
        type: string
        description: >-
          <p>Specific dialect of a person's language.</p>

  # //////////////////////// attr extn /////////////////////////////////////
  SIF_ExtendedElement:
    type: object
    properties:
      value:
#        allOfC:
        $ref: '#/definitions/ExtendedContent'
      Name:
        type: string
        description: >-
          <p>The name of the extended element. As it is possible that names for extended elements may collide from agent to agent, it is recommended that the names of extended elements be configurable in an agent, or that agents use URIs for the names of extended elements.</p>
        xml:
          attribute: true
      xsi:type:
        description: >-
          <p>Allows type of element to be explicitly communicated.</p>
        xml:
          attribute: true
      SIF_Action:
        description: >-
          <p> In a <code>Change</code> event, this flag can be used to indicate an element has been deleted from the parent list container. At a minimum the key for the list must also be present. </p>
        oneOf:
        - const: "Delete"
          title: Delete
        xml:
          attribute: true
    description: >-
      <p>A name/value pair, the name being contained in the Name attribute, the value being the element content.</p>

  # ///////////////////////////////// list ////////////////////////////
  SchoolContactList:
    description: >-
      <p>A list of contact persons associated with a school.</p>
    type: object
    required:
    - "SchoolContact"
    properties:
      SchoolContact:
        type: array
        items:
          $ref: '#/definitions/SchoolContact'

  # ////////////////////////////// default sequence ///////////////////////////////
  RaceCode:
    type: object
    required:
    - "Code"
    - "RaceCodeType"
    properties:
      Code:
        type: string
        description: >-
          <p>The general racial category which reflects the individual's recognition of his or her community or with which the individual most identifies.</p> <p>In a given SIF implementation Agents must have alignment on the use of the NCES and deprecated SPEEDE code sets. Agents are not required to translate between the code sets.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      OtherCodeList:
        type: object
        $ref: '#/definitions/OtherCodeList'
      Proportion:
        type: number
        description: >-
          <p>A percentage associated with the race.</p>

  # ////////////////////////////// xs:* no attrs ///////////////////////////////
  CourseCode:
    description: >-
      <p>School-defined local code for a course.</p>
    type: string

  # ////////////////////////////// default sequence ///////////////////////////////
  EarnedStatus:
    description: >-
      <p>This gives information about a staff member's meal status.</p>
    type: object
    required:
    - "Type"
    properties:
      Type:
        type: string
        description: >-
          <p>Earned status type.</p> <p> In SIF objects where the EarnedStatus is required and does not apply, <code>NA</code> should be used. </p>
        xml:
          attribute: true
      TypeCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      StartDate:
        type: string
        format: date
        description: >-
          <p>Date on which earned status became effective (inclusive).</p>
      EndDate:
        type: string
        format: date
        description: >-
          <p>Date on which earned status was last in effect. This attribute is conditional upon the StartDate element. It exists only if the StartDate element exists.</p>

  # //////////////////////// xs:* with attrs /////////////////////////////////////
  OtherId:
    type: object
    properties:
      value:
      - description: >-
          <p> An "other" identifier associated with a person. This element occurs in objects such as StudentPersonal and StaffPersonal, etc. </p>
        type: string
      Type:
        type: string
        description: >-
          <p>Code that defines the type of this other Id. Note: A subset of valid values may be specified in data objects.</p>
        xml:
          attribute: true
      TypeCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true

  # ////////////////////////////// default sequence ///////////////////////////////
  OtherNames:
    description: >-
      <p>Previous, alternate or other names or aliases associated with a person.</p>
    type: object
    required:
    - "Name"
    properties:
      Name:
        type: array
        items:
#        - allOfG:
          type: object
