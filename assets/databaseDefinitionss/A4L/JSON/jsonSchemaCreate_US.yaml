  # /////////////////////////////////////////////////////////////
  xSessionType:
    type: string
    title: Session Type
    description: >-
      
      <ul>
        <li>'FullSchoolYear' - A regular school term consisting of no major subdivision of time segments. It usually begins in the late summer or early fall and ends in late spring or early summer (e.g., elementary school).</li>
        <li>'Intersession' - A short session which occurs between longer sessions.</li>
        <li>'LongSession' - A session that is longer than a semester but shorter than a full year.</li>
        <li>'MiniTerm' - A school term which is shorter than a regular session..</li>
        <li>'Quarter' - One of four equal segments into which a school year is divided.</li>
        <li>'Quinmester' - One of five equal segments into which a school year is divided.</li>
        <li>'Semester' - One of two equal segments into which a school year is divided.</li>
        <li>'SummerTerm' - A school term which takes place in the summer between two regular school terms.</li>
        <li>'Trimester' - One of three equal segments into which a school year is divided.</li>
        <li>'TwelveMonth' - An educational program that operates on a full twelve month cycle.</li>
