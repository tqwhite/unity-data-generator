  W4Collection:
    type: object
    properties:
      W4:
        type: array
        items:
          $ref: '#/definitions/W4'
  W4:
    required:
    - "EmployeePersonalRefId"
    - "Exempt"
    - "FederalAllowancesNumber"
    - "MaritalStatusRate"
    - "RefId"
    - "StateProvince"
    - "W4Date"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>A GUID that identifies an instance of this object. This RefId is new for 2.7M and MUST be supported like other objects that have a RefId (i.e. it is the key for the object). The alternate keys MUST continue to be supported.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      EmployeePersonalRefId:
        type: object
        description: >-
          <p>This is the GUID that points to the employee represented in the EmployeePersonal object.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      W4Date:
        type: string
        format: date
        description: >-
          <p>Date W4 was completed.</p>
      MaritalStatusRate:
        type: string
        description: >-
          <p>This denotes the current martial status of the employee</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      FederalAllowancesNumber:
        type: integer
        description: >-
          <p>Number of federal allowances.</p>
      StateAllowancesNumber:
        type: integer
        description: >-
          <p>Number of state allowances.</p>
      StateProvince:
        type: object
        description: >-
          <p>State of residence.</p>
        $ref: '#/definitions/StateProvince'
      Exempt:
        type: boolean
        description: >-
          <p>Is this employee exempt from federal and state exemptions?</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> This object contains the information completed on a W4 tax form. (Please note that this object is defined to represent the current deductions allowances for the employee; this is not intended to circumvent or replace IRS reporting standards but to faciliatate movement of W4 data from system to system within the LEA.) </p>
  # //////////////////////////////// data object /////////////////////////////
  EmployeeWageCollection:
