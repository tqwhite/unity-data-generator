        type: object
        description: >-
          <p>Reports up to two parents/guardians of the student.</p>
        $ref: '#/definitions/StudentContactsSummary'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
