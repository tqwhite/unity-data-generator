          <p>Code representing the medium of instruction.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      OtherCodeList:
        type: object
        $ref: '#/definitions/OtherCodeList'

  # ////////////////////////////// default sequence ///////////////////////////////
  DisciplineAction:
    description: >-
      <p>Information regarding the action(s) taken against the offender in response to the incident.</p>
    type: object
    required:
    - "Code"
    - "Duration"
    - "EndDate"
    - "StartDate"
    properties:
      Code:
        type: string
        description: >-
          <p>Specific action taken toward this offender.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      OtherCodeList:
        type: object
        description: >-
          <p>List of other codes or strings that crosswalk to or serve as translations of the Code element. If Code changes and OtherCode elements are supported, both Code and all associated OtherCode elements must be present.</p>
