      WeaponTypeList:
        type: object
        description: >-
          <p>List of weapons involved in the incident used by the offender. If the incident involves weapons, the element must have a value.</p> <p>Each weapon used by the offender is identified by a WeaponType entry. When multiple weapons of a single type are used by the offender, each weapon has a separate entry in this list.</p> <p>(Note: All weapons used in the incident are reported in WeaponTypeList entries for the incident, including those weapons related to this offender.)</p>
