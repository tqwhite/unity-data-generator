        description: >-
          <p>Operational condition of a school.</p>
        $ref: '#/definitions/OperationalStatus'
      OperationalStatusDate:
        type: string
        format: date
        description: >-
          <p>The effective date for a change in operational status.</p>
      SchoolImprovementStatus:
        type: object
