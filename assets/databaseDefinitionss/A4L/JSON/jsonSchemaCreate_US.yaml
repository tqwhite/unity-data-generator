            <p> Name of the person. Note: Type value of <code>04</code> may not occur here. </p>
      SIF_Action:
        description: >-
          <p> In a <code>Change</code> event, this flag can be used to indicate an element has been deleted from the parent list container. At a minimum the key for the list must also be present. </p>
        oneOf:
        - const: "Delete"
          title: Delete
        xml:
          attribute: true

