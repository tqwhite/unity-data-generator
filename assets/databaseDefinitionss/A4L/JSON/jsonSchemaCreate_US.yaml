  # /////////////////////////////////////////////////////////////
  xResponsibleSchoolType:
    type: string
    title: Responsible School Type
    description: >-
      
      <ul>
        <li>'Accountability' - The role/relationship type assigned to an organization, institution, or agency responsible for student learning under Federal ESEA and State accountability plans. (e.g. for AYP reporting)</li>
        <li>'Attendance' - The role/relationship assigned to an organization, institution, or agency operating the physical or virtual site in which delivery of educational services take place.</li>
        <li>'Funding' - The role/relationship assigned to an organization, institution, or agency responsible for funding related to a student enrollment.</li>
        <li>'Graduation' - The role/relationship assigned to an organization, institution, or agency responsible for issuing/awarding diplomas. (e.g. for graduation-rate reporting)</li>
        <li>'IEP' - The role/relationship type assigned to an organization, institution, or agency responsible for the enrolled student’s IEP, a written instructional plan for students with disabilities designated as special education students under the Individuals with Disabilities Education Act (IDEA-Part B) which includes: 1) a statement of present levels of educational performance of a child; 2) a statement of annual goals including short-term instructional objectives; 3) a statement of specific education and related services to be provided and the extent to which the child will be able to participate in regular educational programs; 4) a projected date for initiation and anticipated duration of services; and 5) appropriate objectives, criteria and evaluation procedures and schedules for determining, on at least an annual basis, whether instructional objectives are being achieved.</li>
        <li>'Transportation' - The role/relationship type assigned to an organization, institution, or agency responsible for transporting the student to the physical location of the school or facility in which educational services are delivered.</li>
      </ul>
    oneOf:
    - const: "Accountability"
      title: The role/relationship type assigned to an organization, institution, or agency responsible for student learning under Federal ESEA and State accountability plans. (e.g. for AYP reporting)
    - const: "Attendance"
      title: The role/relationship assigned to an organization, institution, or agency operating the physical or virtual site in which delivery of educational services take place.
    - const: "Funding"
      title: The role/relationship assigned to an organization, institution, or agency responsible for funding related to a student enrollment.
    - const: "Graduation"
      title: The role/relationship assigned to an organization, institution, or agency responsible for issuing/awarding diplomas. (e.g. for graduation-rate reporting)
    - const: "IEP"
      title: "The role/relationship type assigned to an organization, institution, or agency responsible for the enrolled student’s IEP, a written instructional plan for students with disabilities designated as special education students under the Individuals with Disabilities Education Act (IDEA-Part B) which includes: 1) a statement of present levels of educational performance of a child; 2) a statement of annual goals including short-term instructional objectives; 3) a statement of specific education and related services to be provided and the extent to which the child will be able to participate in regular educational programs; 4) a projected date for initiation and anticipated duration of services; and 5) appropriate objectives, criteria and evaluation procedures and schedules for determining, on at least an annual basis, whether instructional objectives are being achieved."
    - const: "Transportation"
      title: The role/relationship type assigned to an organization, institution, or agency responsible for transporting the student to the physical location of the school or facility in which educational services are delivered.

