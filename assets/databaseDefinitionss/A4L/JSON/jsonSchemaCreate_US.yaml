        xml:
          attribute: true
      BusInfoRefId:
        type: object
        description: >-
          <p>GUID that identifies the bus that is associated with this route.</p>
        $ref: '#/definitions/IdRef'
      RouteNumber:
        type: string
        description: >-
          <p> A unique identifier for the route. It may contain any printable ASCII character. F or instance, you may have route 16AM in the morning and a 16PM in the afternoon. </p>
      RouteType:
        type: string
        description: >-
          <p>The type of route.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      MaximumLoad:
        type: integer
        description: >-
          <p>The maximum number of students who are on the bus at any point along this route.</p>
      Description:
        type: string
        description: >-
          <p>Short explanation of the route. It may be used to designate an area, or used to color-code bus routes (the "orange" route).</p>
      Name:
        type: object
        description: >-
          <p>Name of the driver who drives this route.</p>
        $ref: '#/definitions/Name'
      RouteDurationLoaded:
        description: >-
          <p>Refers to the amount of time that at least one student is riding the bus.</p>
      RouteDurationTotal:
        description: >-
          <p>Includes time when no student is on the bus, including time driving to and from the garage, etc.</p>
      RouteDistanceLoaded:
        type: object
        description: >-
          <p>Refers to the distance the bus drives when at least one student is riding the bus.</p>
        $ref: '#/definitions/Distance'
      RouteDistanceTotal:
        type: object
        description: >-
          <p>Includes the total distance driven for this route including to and from garage.</p>
        $ref: '#/definitions/Distance'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object contains all of the information about a bus route.</p>
  # //////////////////////////////// data object /////////////////////////////
  BusStopInfoCollection:
    type: object
    properties:
      BusStopInfo:
        type: array
        items:
          $ref: '#/definitions/BusStopInfo'
  BusStopInfo:
    required:
    - "Description"
    - "RefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>GUID that identifies this location.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      Description:
        type: string
        description: >-
          <p>An explanation of this location.</p>
      GridLocation:
        type: object
        description: >-
          <p>The location of the bus stop.</p>
        $ref: '#/definitions/GridLocation'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object contains information about a bus stop.</p>
  # //////////////////////////////// data object /////////////////////////////
  StudentTransportInfoCollection:
    type: object
    properties:
      StudentTransportInfo:
        type: array
        items:
          $ref: '#/definitions/StudentTransportInfo'
  StudentTransportInfo:
    required:
    - "DayOfWeek"
    - "RefId"
    - "SIF_RefObject"
    - "SchoolInfoRefId"
    - "StudentPersonalRefId"
    - "Type"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>GUID that identifies this object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      StudentPersonalRefId:
        type: object
        description: >-
          <p>GUID that identifies the student that this object refers to.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      Type:
        type: string
        description: >-
          <p>The direction of transportation that this object refers to.</p>
        xml:
          attribute: true
      TypeCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      DayOfWeek:
        type: string
        description: >-
          <p>This attribute indicates the day(s) of the week to which this object refers.</p>
        pattern: '^(Mo)?(Tu)?(We)?(Th)?(Fr)?(Sa)?(Su)?$'
        xml:
          attribute: true
      DayOfWeekCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      SchoolInfoRefId:
        type: object
        description: >-
          <p>GUID referring to the school that the student attends on these day(s) of the week.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      Eligibility:
        type: string
        description: >-
          <p>Eligibility status of student for district transportation for this trip.</p> <p> Note: this element has been deprecated—use <code>TransportationStatus</code> and <code>PublicExpense</code>. </p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      HomeToSchoolDistance:
        type: object
        description: >-
          <p>Distance between the student’s home address and the school.</p>
        $ref: '#/definitions/Distance'
      WalkToStopDistance:
        type: object
        description: >-
          <p>Distance between the student’s address and the bus stop where they are picked up or dropped off.</p>
        $ref: '#/definitions/Distance'
      StopToSchoolDistance:
        type: object
        description: >-
          <p>Distance between the bus stop where a student is picked up or dropped off and the school.</p>
        $ref: '#/definitions/Distance'
      OriginPoint:
        type: object
        $ref: '#/definitions/OriginPoint'
      HomeBusRouteDetail:
        type: object
        description: >-
          <p>GUID referring to a BusRouteDetail object that identifies the origin bus stop for an inbound route or the destination bus stop for an outbound route.</p> <p>If the HomeBusRouteDetail element does not exist, then the student does not ride a bus to/from school.</p> <p> Note: this element has been deprecated—use <code>OriginPoint</code> and <code>DestinationPoint</code>. </p>
        $ref: '#/definitions/IdRef'
      SIF_RefObject:
        oneOf:
        - const: "BusRouteDetail"
          title: BusRouteDetail
        xml:
          attribute: true
      TransferPoints:
        type: object
        $ref: '#/definitions/TransferPointList'
      SchoolBusRouteDetail:
        type: object
        $ref: '#/definitions/StudentTransportInfoSchoolBusRouteDetail'
      DestinationPoint:
        type: object
        $ref: '#/definitions/DestinationPoint'
      StateAidQualification:
        type: object
        $ref: '#/definitions/StudentTransportInfoStateAidQualification'
      TransportationStatus:
        type: object
        $ref: '#/definitions/StudentTransportInfoTransportationStatus'
      PublicExpense:
        type: object
        $ref: '#/definitions/StudentTransportInfoPublicExpense'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> This object contains transportation information about a student. Students should have at least two StudentTransportInfo objects associated with them: one for inbound information (getting to school) and one for outbound information (leaving school). If their transportation changes based on the day of the week, then a student will have more than two StudentTransportInfo objects. </p>
  # //////////////////////////////// data object /////////////////////////////
  BusPositionInfoCollection:
    type: object
    properties:
      BusPositionInfo:
        type: array
        items:
          $ref: '#/definitions/BusPositionInfo'
  BusPositionInfo:
    required:
    - "Date"
    - "GridLocation"
    - "RefId"
    - "Time"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The GUID that identifies the bus. This object only has meaning as current data for this particular bus.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      Date:
        type: string
        format: date
        description: >-
          <p>The date of the report from the bus.</p>
      Time:
        description: >-
          <p>The time of the report from the bus.</p>
      GridLocation:
        type: object
        description: >-
          <p>The location of the bus.</p>
        $ref: '#/definitions/GridLocation'
      TelematicsId:
        type: string
        description: >-
          <p>Id of the hardware unit on the bus that tracks and reports location and status. The interpretation of the content is deployment specific, but the format must be compact.</p>
      TelemetryList:
        type: object
        $ref: '#/definitions/TelemetryList'
      BusDriver:
        type: object
        description: >-
          <p>Information identifying the driver.</p>
        $ref: '#/definitions/BusStaff'
      BusStaffList:
        type: object
        description: >-
          <p>List identifying other staff. This may include aides, nurses, proctors, etc.</p>
        $ref: '#/definitions/BusStaffList'
      RouteStatus:
        type: object
        description: >-
          <p> If the bus is running a route, this element must be included in the object. Absence means the bus is not operating a route. </p>
        $ref: '#/definitions/BusRouteStatus'
      OtherStatus:
        type: string
        description: >-
          <p>If the bus is not running a regularly scheduled route but is transporting (or positioning to transport) passengers as approved and directed by the school district, this element describes the activity. It's also used for maintenance, repair, and other authorized movements. This element is mutually exclusive with RouteStatus. Absence of both RouteStatus and OtherStatus is acceptable, but may indicate unauthorized operation.</p> <p>The following values are suggested to enhance interoperability, but the field is free-form.</p> <p>Suggested Values:</p> <p>Field Trip</p> <p>Sporting Event</p> <p>Support Services</p> <p>Maintenance</p> <p>Repair</p>
      Odometer:
        type: object
        description: >-
          <p>Current odometer reading.</p>
        $ref: '#/definitions/Distance'
      Speedometer:
        type: object
        description: >-
          <p>Current speedometer reading.</p>
        $ref: '#/definitions/Distance'
      Students:
        type: object
        description: >-
          A list of students and their statuses. The complete list may be sent with some events (e.g. change in RouteStatus) per district policy, but it is more typical of responses.
        $ref: '#/definitions/BusPositionStudentList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object exposes telematics information to the zone.</p>
  # //////////////////////////////// data object /////////////////////////////
  AuthenticationCollection:
    type: object
    properties:
      Authentication:
        type: array
        items:
          $ref: '#/definitions/Authentication'
  Authentication:
    required:
    - "AuthenticationInfo"
    - "RefId"
    - "SIF_RefId"
    - "SIF_RefObject"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The SIF RefId that uniquely identifies this authentication object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      SIF_RefId:
        type: object
        description: >-
          <p>The SIF RefId of a student or staff member</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SIF_RefObject:
        type: string
        description: >-
          <p>The type of SIF object that the SIF_RefId attribute identifies.</p>
        xml:
          attribute: true
      SIF_RefObjectCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      AuthenticationInfo:
        type: object
        description: >-
          <p>The authentication information for one system.</p>
        $ref: '#/definitions/AuthenticationInfo'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> The Authentication object allows a system that stores usernames and/or passwords to share them with other applications through SIF. The provider of the Authentication object may only support providing a username or a password, or it may support both. </p> <p> The Authentication object is also able to transmit a user's network identity through SIF. If the user has an account in a network directory system that supports LDAP, the user's distinguishedName or username is shared to uniquely identify the user to applications that support LDAP or native network authentication options. </p>
  # //////////////////////////////// data object /////////////////////////////
  EnergyUsageCollection:
    type: object
    properties:
      EnergyUsage:
        type: array
        items:
          $ref: '#/definitions/EnergyUsage'
  EnergyUsage:
    required:
    - "RefId"
    - "UsageLocationInfo"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>A GUID that identifies an instance of this object. This RefId is a “transient” value; that is, it SHOULD be generated by the provider at the time the object is provided in a Response message. This value MUST NOT be used in a later Request for the object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      UsageLocationInfo:
        type: object
        description: >-
          <p>Complex element containing the location of where measurements apply to.</p>
        $ref: '#/definitions/EnergyUsageLocationInfo'
      DataSource:
        type: object
        description: >-
          <p>The description of the source of the measurements.</p>
        $ref: '#/definitions/EnergyUsageDataSource'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object contains energy usage information for an energy location.</p>
  # //////////////////////////////// data object /////////////////////////////
  IdMApplicationCollection:
    type: object
    properties:
      IdMApplication:
        type: array
        items:
          $ref: '#/definitions/IdMApplication'
  IdMApplication:
    required:
    - "DefaultFunction"
    - "DefaultIdentityProvider"
    - "Name"
    - "RefId"
    - "URI"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>GUID that uniquely identifies an instance of this object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      Name:
        type: string
        description: >-
          <p>A short name for the application</p>
      URI:
        type: string
        format: uri
        description: >-
          <p>The URI of the application.</p>
      DefaultFunction:
        type: string
        description: >-
          <p>A short description of the default or main function of the application.</p>
      FunctionList:
        type: object
        description: >-
          <p>A list of short descriptions of other functions the application performs. </p>
        $ref: '#/definitions/FunctionList'
      DefaultIdentityProvider:
        type: object
        description: >-
          <p>The RefID of the application that is used as the Identity Provider (i.e., authentication provider) for the framework. </p>
        $ref: '#/definitions/IdRef'
      IdentityProviderList:
        type: object
        description: >-
          <p>If the application can use multiple Identity Providers (authentication providers) to authenticate the user, for example Google directory service, LDAP, AD, etc., there could be multiple such providers in this list.</p>
        $ref: '#/definitions/IdentityProviderList'
      StartDate:
        type: string
        format: date
        description: >-
          <p>Start date of the association of this application to the Identity Provider application.</p>
      EndDate:
        type: string
        format: date
        description: >-
          <p>End date of the association of this application to the Identity Provider application.</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>A software application or system for which access is controlled through the identity management system.</p>
  # //////////////////////////////// data object /////////////////////////////
  IdMAuthenticationCollection:
    type: object
    properties:
      IdMAuthentication:
        type: array
        items:
          $ref: '#/definitions/IdMAuthentication'
  IdMAuthentication:
    required:
    - "ApplicationRefId"
    - "IdentityProviderLoginId"
    - "RefId"
    - "UserOrganizationAssociationRefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>GUID that uniquely identifies an instance of this object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      UserOrganizationAssociationRefId:
        type: object
        description: >-
          <p>The RefId for the UserOrganizationAssociation SIF object if the authentication returns “true”.</p>
        $ref: '#/definitions/IdRef'
      ApplicationRefId:
        type: object
        description: >-
          <p>RefId of the Identity Provider application.</p>
        $ref: '#/definitions/IdRef'
      IdentityProviderLoginId:
        type: string
        description: >-
          <p>The login for the Organization-User within the Identity Provider application.</p>
      IdentityProviderType:
        type: string
        description: >-
          <p>An enumeration that defines how the authentication can be performed and exchanged.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      AuthoritativeSourceId:
        type: object
        description: >-
          <p>The RefID of the Authoritative Application creating this association.</p>
        $ref: '#/definitions/IdRef'
      StartDate:
        type: string
        format: date
        description: >-
          <p>Start date of the association of this authentication instance to the Identity Provider application.</p>
      EndDate:
        type: string
        format: date
        description: >-
          <p>End date of the association of this authentication instance to the Identity Provider application.</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object establishes an authentication map between the Organization-User and the Identity Provider (IDP) LoginId. The profile will be used primarily to provision/deprovision users from the SIS/HR systems to the IDP.</p>
  # //////////////////////////////// data object /////////////////////////////
  IdMAuthorizationCollection:
    type: object
    properties:
      IdMAuthorization:
        type: array
        items:
          $ref: '#/definitions/IdMAuthorization'
  IdMAuthorization:
    required:
    - "ApplicationRefId"
    - "RefId"
    - "UserOrganizationAssociationRefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>GUID that uniquely identifies an instance of this object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      UserOrganizationAssociationRefId:
        type: object
        description: >-
          <p>The RefId for the SIF UserOrganizationAssociation object which defines the Organization-User to be authorized.</p>
        $ref: '#/definitions/IdRef'
      ApplicationRefId:
        type: object
        description: >-
          <p>RefId of the Identity Provider application.</p>
        $ref: '#/definitions/IdRef'
      ApplicationFunction:
        type: string
        description: >-
          <p>The role for the OrganizationUser to be assigned for the target application. The consuming application must be able to honor such role.</p>
      AuthoritativeSourceId:
        type: object
        description: >-
          <p>The RefID of the Authoritative Application creating this association.</p>
        $ref: '#/definitions/IdRef'
      StartDate:
        type: string
        format: date
        description: >-
          <p>Start date of the association of this authorization instance to the Identity Provider application.</p>
      EndDate:
        type: string
        format: date
        description: >-
          <p>End date of the association of this authorization instance to the Identity Provider application.</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object establishes a role/permission map between the Organization-User and the downstream applications’ roles and permissions. This will be used primarily to provision/deprovision users from the SIS/HR systems to other applications.</p>
  # //////////////////////////////// data object /////////////////////////////
  UserOrganizationAssociationCollection:
    type: object
    properties:
      UserOrganizationAssociation:
        type: array
        items:
          $ref: '#/definitions/UserOrganizationAssociation'
  UserOrganizationAssociation:
    required:
    - "AssociationType"
    - "OrganizationRefId"
    - "RefId"
    - "SIF_Object"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>GUID that uniquely identifies an instance of this object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      PersonRefId:
        type: object
        $ref: '#/definitions/UserOrganizationAssociationPersonRefId'
      OrganizationRefId:
        type: object
        description: >-
          <p>RefId of the organization.</p>
        $ref: '#/definitions/IdRef'
      SIF_Object:
        description: >-
          <p>The name of the SIF object that is being referenced by the payload of this element.</p>
        xml:
          attribute: true
      AssociationType:
        type: string
        description: >-
          <p>The type of association. For example, if the user is a member of the organization then the type would be Member.</p>
      AuthoritativeSourceId:
        type: object
        description: >-
          <p>The RefID of the Authoritative Application creating this association</p>
        $ref: '#/definitions/RefId'
      StartDate:
        type: string
        format: date
        description: >-
          <p>Start date of the association.</p>
      EndDate:
        type: string
        format: date
        description: >-
          <p>End date of the association.</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object associates a user of computer software applications to an organization. </p>
  # //////////////////////////////// data object /////////////////////////////
  PersonPrivacyObligationDocumentCollection:
    type: object
    properties:
      PersonPrivacyObligationDocument:
        type: array
        items:
          $ref: '#/definitions/PersonPrivacyObligationDocument'
  PersonPrivacyObligationDocument:
    required:
    - "ConsentToSharingOfData"
    - "ContactForRequestsObjectTypeName"
    - "ContactForRequestsRefId"
    - "ParentObjectTypeName"
    - "ParentRefId"
    - "PermissionToParticipateList"
    - "RefId"
    - "SchoolYear"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The ID (GUID) that uniquely identifies this object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      ParentRefId:
        type: object
        description: >-
          <p>The GUID of the personal object to which this privacy obligation object is linked</p>
        $ref: '#/definitions/IdRef'
      ParentObjectTypeName:
        type: string
        description: >-
          <p>The name of the object reference. </p>
      SchoolYear:
        type: object
        description: >-
          <p> School year for which this information is applicable, expressed as the four-digit year in which the school year ends (e.g. <code>2020</code>). </p>
        $ref: '#/definitions/SchoolYear'
      StartDate:
        type: string
        format: date
        description: >-
          <p>Start Date applicabile if not applicable for the whole School Year.</p>
      EndDate:
        type: string
        format: date
        description: >-
          <p>End Date applicabile if not applicable for the whole School Year.</p>
      SettingLocationList:
        type: object
        description: >-
          <p>List of locations where this privacy list applies.</p>
        $ref: '#/definitions/SettingLocationList'
      ContactForRequestsRefId:
        type: object
        description: >-
          <p>The GUID of the personal object for the person who needs to be contacted for data sharing requests.</p>
        $ref: '#/definitions/IdRef'
      ContactForRequestsObjectTypeName:
        type: string
        description: >-
          <p>The name of the object reference.</p>
      ConsentToSharingOfData:
        type: object
        $ref: '#/definitions/ConsentToSharingOfDataContainer'
      PermissionToParticipateList:
        type: object
        $ref: '#/definitions/PermissionToParticipateList'
      ApplicableLawList:
        type: object
        $ref: '#/definitions/ApplicableLawList'
    description: >-
      <p>This object contains information about the person's data and privacy obligations as well as permissions and consent associated with it.</p>

  # ////////////////////////////// default sequence ///////////////////////////////
  InstructionalLevel:
    description: >-
      <p>An indication of the general nature and difficulty of instruction provided.</p>
    type: object
    required:
    - "Code"
    properties:
      Code:
        type: string
        description: >-
          <p>Code representing the general nature and difficulty of instruction provided.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      OtherCodeList:
        type: object
        $ref: '#/definitions/OtherCodeList'

  # ///////////////////////////// single Item with Values ////////////////////////////////
  GiftedTalented:
    type: string
    oneOf:
    - const: "Yes"
      title: Yes
    - const: "No"
      title: No
    - const: "Unknown"
      title: Unknown

  # ///////////////////////////////// list ////////////////////////////
  LearningObjectives:
    description: >-
      <p>Description of learning objective(s) for this lesson, i.e., "Student will be able to use Pythagorean Theorem."—equates to 'benchmark' or 'goal' or other terminology</p>
    type: object
    required:
    - "LearningObjective"
    properties:
      LearningObjective:
        type: array
        items:
          type: string

  # //////////////////////// xs:* with attrs /////////////////////////////////////
  Email:
    type: object
    properties:
      value:
      - description: >-
          <p> This element represents an e-mail address of one of a number of types and occurs in objects such as StudentPersonal, StaffPersonal, StudentContact, etc. </p>
        type: string
      Type:
        type: string
        description: >-
          <p>This attribute specifies the type of e-mail address.</p>
        xml:
          attribute: true
      TypeCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true

  # ////////////////////////////// default sequence ///////////////////////////////
  InstructionalStrategies:
    description: >-
      <p>The various ways that instruction is delivered to achieve learning objectives and concepts.</p>
    type: object
    properties:
      InstructionalStrategy:
        type: string
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true

  # ////////////////////////////// another type ///////////////////////////////
  Object:
#    allOfD:
    type: object
    description: >-
      <p>A SIF XML object.</p>

  # ////////////////////////////// default sequence ///////////////////////////////
  PhoneNumberList:
    description: >-
      <p>Lists phone numbers associated with an entity.</p>
    type: object
    required:
    - "PhoneNumber"
    properties:
      PhoneNumber:
        type: array
        items:
#        - allOfG:
          type: object
      SIF_Action:
        description: >-
          <p> In a <code>Change</code> event, this flag can be used to indicate an element has been deleted from the parent list container. At a minimum the key for the list must also be present. </p>
        oneOf:
        - const: "Delete"
          title: Delete
        xml:
          attribute: true

  # ////////////////////////////// default sequence ///////////////////////////////
  FSCount:
    description: >-
      <p>Reports aggregate counts and, optionally, received funds for individual combinations of student or staff meal status and meal type.</p>
    type: object
    required:
    - "Value"
    oneOf:
    - required: [ 'MealStatus' ]
    - required: [ 'EarnedStatus' ]
    properties:
      MealStatus:
        type: object
        description: >-
          <p>Student meal status. If a meal status applies, either MealStatus (for students), or EarnedStatus (for staff) is specified.</p>
        $ref: '#/definitions/MealStatus'
      EarnedStatus:
        type: object
        description: >-
          <p>Staff meal status.</p>
        $ref: '#/definitions/EarnedStatus'
      MealType:
        type: string
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      Amount:
        type: object
        $ref: '#/definitions/FSAmount'
      Tax:
        type: object
        description: >-
          <p>Value of tax collected.</p>
        $ref: '#/definitions/MonetaryAmount'
      Value:
        type: number
        description: >-
          <p>The value of the count.</p>

  # ///////////////////////////////// list ////////////////////////////
  InterestLevels:
    description: >-
      <code>InterestLevels</code> is designed to represent the grade level for which the content is created. For example a tenth grader is at a third grade level in Algebra. You would want to present the content at a third grade level, but in a tenth grade context or interest level.
    type: object
    required:
    - "InterestLevel"
    properties:
      InterestLevel:
        type: array
        items:
          $ref: '#/definitions/GradeLevel'

  # ////////////////////////////// default sequence ///////////////////////////////
  EmailList:
    description: >-
      <p>A list of e-mail addresses associated with an individual.</p>
    type: object
    required:
    - "Email"
    properties:
      Email:
        type: array
        items:
#        - allOfG:
          $ref: '#/definitions/Email'
      SIF_Action:
        description: >-
          <p> In a <code>Change</code> event, this flag can be used to indicate an element has been deleted from the parent list container. At a minimum the key for the list must also be present. </p>
        oneOf:
        - const: "Delete"
          title: Delete
        xml:
          attribute: true

  # //////////////////////// attr extn /////////////////////////////////////
  OtherName:
    type: object
    properties:
      value:
#        allOfC:
        $ref: '#/definitions/BaseName'
      Type:
        type: string
        description: >-
          <p> Code that specifies what type of name this is, excluding "name of record." </p>
        xml:
          attribute: true
      TypeCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
    description: >-
      <p> Extends <code>BaseNameType</code> to allow for <code>Type</code> attribute values excluding "name of record." Used for other names to be included in addition to the name of record in objects like StudentPersonal. </p>

  # ////////////////////////////// default sequence ///////////////////////////////
  RightsElement:
    description: >-
      <p> A common metadata element designed to carry any intellectual property or copyright information, based on the IEEE LOM Rights element [LOM]. </p>
    type: object
    properties:
      Cost:
        type: boolean
      FeesForUse:
        type: object
        description: >-
          A container for fees for use of the content in the object.
        $ref: '#/definitions/FeesForUse'
      CopyrightStatement:
        type: string
      TermsOfUse:
        type: string

  # //////////////////////// xs:* with attrs /////////////////////////////////////
  EducationalLevel:
    type: object
    properties:
      value:
      - description: >-
          <p>A code representing the highest level of education completed by a person.</p>
        type: string
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true

  # ///////////////////////////////// list ////////////////////////////
  LanguageList:
    type: object
    required:
    - "Language"
    properties:
      Language:
        type: array
        items:
          $ref: '#/definitions/LanguageContainer'

  # ////////////////////////////// default sequence ///////////////////////////////
  ProgramStatus:
    type: object
    required:
    - "Code"
    properties:
      Code:
        type: string
        description: >-
          <p>The current status of the student's program participation.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      OtherCodeList:
        type: object
        $ref: '#/definitions/OtherCodeList'

  # ///////////////////////////// single Item with Values ////////////////////////////////
  Migrant:
    type: string
    oneOf:
    - const: "Yes"
      title: Yes
    - const: "No"
      title: No
    - const: "Unknown"
      title: Unknown

  # ////////////////////////////// xs:* no attrs ///////////////////////////////
  MiddleName:
    description: >-
      <p>A person's middle name or initial.</p>
    type: string

  # ///////////////////////////////// list ////////////////////////////
  SubjectAreaList:
    description: >-
      <p>A list of subject areas.</p>
    type: object
    required:
    - "SubjectArea"
    properties:
      SubjectArea:
        type: array
        items:
          $ref: '#/definitions/SubjectArea'

  # ///////////////////////////////// list ////////////////////////////
  MediaTypes:
    description: >-
      Allows an object or query to be tagged with MIME types.
    type: object
    required:
    - "MediaType"
    properties:
      MediaType:
        type: array
        items:
          type: string

  # ////////////////////////////// default sequence ///////////////////////////////
  FSAmount:
    $ref: '#/definitions/MonetaryAmount'
    type: object
    properties:
      Type:
        type: string
        description: >-
          <p> Type of amount. Note that when this common element is used not all of the following values apply. There are notes to indicate values that are applicable. </p> <p> The type <code>Value</code> is used to denote the value of the amount. </p>
        xml:
          attribute: true
      TypeCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      Credits:
        type: number
        description: >-
          <p> Number of credits. This attribute does not apply to <code>Cash</code> or <code>Value</code> and hence has a value <code>0</code>. It only applies to types <code>BreakfastCredit</code> and <code>LunchCredit</code>. </p>
        xml:
          attribute: true

  # ///////////////////////////////// list ////////////////////////////
  OtherIdList:
    description: >-
      <p>Common XML structure for a list of other Ids related to the object.</p>
    type: object
    required:
    - "OtherId"
    properties:
      OtherId:
        type: array
        items:
          $ref: '#/definitions/OtherId'

  # //////////////////////// xs:* with attrs /////////////////////////////////////
  FundedProgram:
    type: object
    properties:
      value:
      - description: >-
          <p>Program value.</p>
        type: string
      Type:
        type: string
        description: >-
          <p>The type of the program. Type identifies the list of values.</p>
        xml:
          attribute: true
      TypeCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true

  # ////////////////////////////// default sequence ///////////////////////////////
  ExceptionalityCategory:
    type: object
    required:
    - "Code"
    - "ExceptionalityPriority"
    properties:
      Code:
        type: string
        description: >-
          <p> Exceptionality description/code which identifies the exceptionality or areas of need of the student. Not all programs require identification of an exceptionality. If required for this program type, must have at least one element with ExceptionalityPriority value of <code>Primary</code>. </p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      OtherCodeList:
        type: object
        $ref: '#/definitions/OtherCodeList'
      ExceptionalityPriority:
        type: string
        description: >-
          <p>Identifies priority of the exceptionality. "Primary" is the first and is required even if only one exceptionality is specified. "Secondary", etc. are of lower priority. Primary, Secondary, and Tertiary must be specified before "Additional" is used.</p>

  # ////////////////////////////// default sequence ///////////////////////////////
  Demographics:
    description: >-
      <p> Demographics information about the student, contact, staff member, etc. This element occurs within objects such as StudentPersonal, StudentContact, etc. </p>
    type: object
    properties:
      RaceList:
        type: object
        $ref: '#/definitions/RaceList'
      HispanicLatino:
        type: string
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      RaceEthnicityDeclined:
        type: string
      Gender:
        type: object
        $ref: '#/definitions/DemographicsGender'
      BirthDate:
        type: object
        description: >-
          <p>The person's date of birth.</p>
        $ref: '#/definitions/BirthDate'
      BirthDateVerification:
        type: object
        $ref: '#/definitions/DemographicsBirthDateVerification'
      PlaceOfBirth:
        type: string
        description: >-
          <p>The person's place of birth like: village, town, city etc.</p>
      CountyOfBirth:
        type: string
        description: >-
          <p>The county in which the person was born.</p>
      StateOfBirth:
        type: object
        description: >-
          <p>The person's state of birth.</p>
        $ref: '#/definitions/StateProvince'
      CountryOfBirth:
        type: object
        description: >-
          <p>The person's country of birth.</p>
        $ref: '#/definitions/Country'
      CountriesOfCitizenship:
        type: object
        $ref: '#/definitions/CountriesOfCitizenship'
      CountriesOfResidency:
        type: object
        $ref: '#/definitions/CountriesOfResidency'
      CountryArrivalDate:
        type: string
        format: date
        description: >-
          <p>Date the person first arrived in the country.</p>
      CitizenshipStatus:
        type: object
        $ref: '#/definitions/DemographicsCitizenshipStatus'
      EnglishProficiency:
        type: object
        description: >-
          Person's proficiency in English.
        $ref: '#/definitions/EnglishProficiency'
      LanguageList:
        type: object
        description: >-
          List of languages an individual uses to communicate.
        $ref: '#/definitions/LanguageList'
      DwellingArrangement:
        type: object
        description: >-
          <p>Setting/environment in which the person resides.</p>
        $ref: '#/definitions/DwellingArrangement'
      MaritalStatus:
        type: string
        description: >-
          <p>The person's marital status.</p>
      MilitaryConnectedStudent:
        type: string
        description: >-
          <p>An indication that the student's parent or guardian is on Active Duty, in the National Guard, or in the Reserve components of the United States military services</p>

  # //////////////////////// xs:* with attrs /////////////////////////////////////
  CourseCredits:
    type: object
    properties:
      value:
      - description: >-
          <p>The number of credits awarded upon course completion.</p>
        type: number
      Type:
        type: string
        description: >-
          <p>The type of credit offered.</p>
        xml:
          attribute: true
      TypeCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true

  # ////////////////////////////// default sequence ///////////////////////////////
  GridLocation:
    description: >-
      <p> This element contains a map location. The GridLocation element is utilized within other objects and elements, such as BusStopInfo and Address, etc. </p>
    type: object
    required:
    - "Latitude"
    - "Longitude"
    properties:
      Latitude:
        type: number
        description: >-
          <p>Latitude in decimal degrees.</p> <p> Latitudes north of the equator are positive, latitudes south of the equator are negative [ISO 6709]. </p>
      Longitude:
        type: number
        description: >-
          <p>Longitude in decimal degrees.</p> <p> Longitudes east of the Prime Meridian in Greenwich are positive, longitudes west of the Prime Meridian are negative. The 180th meridian is negative. [ISO 6709] </p>

  # ///////////////////////////////// list ////////////////////////////
  GradeLevels:
    description: >-
      <p> This is a common element used to specify a collection of grade levels supported. It is used in SchoolInfo and assessment-related objects. </p>
    type: object
    required:
    - "GradeLevel"
    properties:
      GradeLevel:
        type: array
        items:
          $ref: '#/definitions/GradeLevel'

  # ///////////////////////////// single Item with Values ////////////////////////////////
  Gender:
    type: string
    oneOf:
    - const: "M"
      title: Male
    - const: "F"
      title: Female
    - const: "U"
      title: Unknown

  # ////////////////////////////// another type ///////////////////////////////
  RefId:
#    allOfD:
    $ref: '#/definitions/GUID'
    description: >-
      An object or element identifier.

  # ////////////////////////////// default sequence ///////////////////////////////
  SoftwareRequirement:
    description: >-
      <p>Contains information about a specific required piece of software.</p>
    type: object
    required:
    - "SoftwareTitle"
    properties:
      SoftwareTitle:
        type: string
        description: >-
          <p>This is the title of the specific software. This does not include the vendor. For example, Flash not Adobe.</p>
      Version:
        type: string
        description: >-
          <p>This includes the version of the specific software.</p>
      Vendor:
        type: string
        description: >-
          <p>This is the vendor of the specific software. For example, Adobe.</p>
      OS:
        type: string
        description: >-
          <p>This is the operating system and version. For example, Macintosh OS X 1.4.</p>

  # ////////////////////////////// default sequence ///////////////////////////////
  BloomsTaxonomyLevels:
    description: >-
      <p> This is a taxonomy of educational objectives based on three "domains:" Affective, Psychomotor, and Cognitive. For the purposes of assigning attributes to learning resources, the SIF specification is limited to the cognitive domain, including knowledge, comprehension, application, analysis, synthesis and evaluation. </p>
    type: object
    properties:
      BloomsTaxonomyLevel:
        type: string
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true

  # ////////////////////////////// default sequence ///////////////////////////////
  FeeForUse:
    description: >-
      Description of one fee structure applying to the use of this resource.
    type: object
    required:
    - "MeteringType"
    - "UseType"
    properties:
      UseType:
        type: string
        description: >-
          A description of the fee structure for this resource. Some resources may be licensed differently depending upon their context. For example, a content provider might charge one fee structure for resources used in the classroom and a separate fee for those resources available to parents from home.
      MeteringType:
        type: string
      MeteringURL:
        type: string
        format: uri
      PerUseCharge:
        type: object
        $ref: '#/definitions/MonetaryAmount'

  # ////////////////////////////// default sequence ///////////////////////////////
  MealStatus:
    description: >-
      <p>This gives information about a student's meal status.</p>
    type: object
    required:
    - "Type"
    properties:
      Type:
        type: string
        description: >-
          <p>Meal status type.</p> <p><code>None</code> refers to paid students. In SIF objects where the MealStatus is required and does not apply, <code>NA</code> should be used. </p>
        xml:
          attribute: true
      TypeCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      StartDate:
        type: string
        format: date
        description: >-
          <p>Date on which meal status became effective (inclusive).</p>
      EndDate:
        type: string
        format: date
        description: >-
          <p> Date on which meal status was last in effect, if in the past. This element can't exist without a <code>StartDate</code>. </p>
      SchoolYear:
        type: object
        description: >-
          <p> School year for which the information is applicable, expressed as the four-digit year in which the school year ends (e.g., <code>2004</code> for the 2003-04 school year). </p>
        $ref: '#/definitions/SchoolYear'

  # ////////////////////////////// default sequence ///////////////////////////////
  ProgramType:
    type: object
    required:
    - "Code"
    properties:
      Code:
        type: string
        description: >-
          <p>Identifies the individualized program for which the student's participation is described in this instance.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      OtherCodeList:
        type: object
        $ref: '#/definitions/OtherCodeList'

  # ///////////////////////////////// list ////////////////////////////
  TechnicalRequirements:
    description: >-
      <p>A list of operating system, network, and other technical requirements.</p>
    type: object
    required:
    - "TechnicalRequirement"
    properties:
      TechnicalRequirement:
        type: array
        items:
          type: string

  # ////////////////////////////// xs:* no attrs ///////////////////////////////
  BirthDate:
    description: >-
      <p>A person's date of birth.</p>
    type: string
    format: date

  # ////////////////////////////// xs:* no attrs ///////////////////////////////
  SchoolURL:
    description: >-
      <p>URL for a school.</p>
    type: string
    format: uri

  # ///////////////////////////// single Item with Values ////////////////////////////////
  NeglectedDelinquent:
    type: string
    oneOf:
    - const: "Yes"
      title: Yes
    - const: "No"
      title: No
    - const: "Unknown"
      title: Unknown

  # ////////////////////////////// xs:* no attrs ///////////////////////////////
  ExitDate:
    description: >-
      <p>The date on which a student exits.</p>
    type: string
    format: date

  # ////////////////////////////// default sequence ///////////////////////////////
  SpanGap:
    description: >-
      This structure duplicates much of the structure of <code>TimeElement</code> and is designed to represent a gap in the parent time period defined by <code>StartDateTime</code> and <code>EndDateTime</code> above.
    type: object
    required:
    - "Code"
    - "Name"
    - "Type"
    - "Value"
    properties:
      Type:
        type: string
      Code:
        type: string
      Name:
        type: string
      Value:
        type: string
      StartDateTime:
        type: string
        format: date-time
      EndDateTime:
        type: string
        format: date-time

  # //////////////////////// xs:* with attrs /////////////////////////////////////
  TextData:
    type: object
    properties:
      value:
      - description: >-
          <p>Contains arbitrary text, encoded in UTF-8.</p>
        type: string
      MIMEType:
        type: string
        description: >-
          <p> Optional MIME type to specifically indicate the text type. Otherwise <code>text/plain</code> can be assumed. </p>
        xml:
          attribute: true
      FileName:
        type: string
        description: >-
          <p> Optional file name to indicate the file from which the content originated, or to suggest a name to use when saving the content. </p>
        xml:
          attribute: true
      Description:
        type: string
        description: >-
          <p> Contains an optional description of the content or a processing hint with regard to its structure (e.g. named standard, file layout or XSD). Contents may be mandated in instances of this type, or types that follow the <code>AbstractContentPackageType</code> pattern. </p>
        xml:
          attribute: true

  # ///////////////////////////// single Item with Values ////////////////////////////////
  IDEA:
    type: string
    oneOf:
    - const: "Yes"
      title: Yes
    - const: "No"
      title: No
    - const: "Unknown"
      title: Unknown

  # ////////////////////////////// xs:* no attrs ///////////////////////////////
  HomeroomNumber:
    description: >-
      <p>Common element used to specify the locally-defined number or identifier for a homeroom. It is used in objects such as RoomInfo and StudentSnapshot.</p>
    type: string

  # ////////////////////////////// xs:* no attrs ///////////////////////////////
  FirstName:
    description: >-
      <p>A person's first name.</p>
    type: string

  # ///////////////////////////////// list ////////////////////////////
  Names:
    description: >-
      <p>The name(s) of the person.</p>
    type: object
    properties:
      Name:
        type: array
        items:
          $ref: '#/definitions/Name'

  # ////////////////////////////// xs:* no attrs ///////////////////////////////
  LastName:
    description: >-
      <p>A person's last name.</p>
    type: string

  # ///////////////////////////// single Item with Values ////////////////////////////////
  EconomicDisadvantage:
    type: string
    oneOf:
    - const: "Yes"
      title: Yes
    - const: "No"
      title: No
    - const: "Unknown"
      title: Unknown

  # ////////////////////////////// xs:* no attrs ///////////////////////////////
  ObjectName:
    description: >-
      <p>An unenumerated SIF object name.</p>
    maxLength: 64

  # ///////////////////////////////// list ////////////////////////////
  CountriesOfCitizenship:
    type: object
    required:
    - "CountryOfCitizenship"
    properties:
      CountryOfCitizenship:
        type: array
        items:
          $ref: '#/definitions/Country'

  # ////////////////////////////// default sequence ///////////////////////////////
  PhoneNumber:
    description: >-
      <p>This element represents a phone number and occurs within objects such as StudentPersonal, StaffPersonal, etc.</p>
    type: object
    required:
    - "Number"
    - "Type"
    properties:
      Type:
        type: string
        description: >-
          <p>Code that specifies what type of phone number this is. Note: A subset of valid values may be specified in data objects.</p>
        xml:
          attribute: true
      TypeCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      Number:
        type: string
        description: >-
          <p>Phone number. Free-form, but typical U.S. formats include:</p> <ul> <li>(###) ###-####</li> <li>###-####</li> </ul>
      Extension:
        type: string
        description: >-
          <p>Phone number extension.</p>
      ListedStatus:
        type: string
        description: >-
          <p>Indicates whether or not the phone number is available to the public.</p>

  # ////////////////////////////// xs:* no attrs ///////////////////////////////
  VersionWithWildcards:
    description: >-
      A SIF version number, with wildcards for matching multiple versions.
    type: string
    maxLength: 12
    pattern: '^\*|([0-9]+[.]\*)|([0-9]+[.][0-9]+r\*)|([0-9]+[.][0-9]+(r[0-9]+)?)$'

  # ////////////////////////////// another type ///////////////////////////////
  AbstractContentElement:
#    allOfD:
    description: >-
      <p><code>AbstractContentPackageType</code> used as an element rather than an object, omitting <code>RefId</code>, <code>SIF_Metadata</code> and <code>SIF_ExtendedElements</code>. </p>

