    - "RefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>GUID that identifies this item</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      LocalId:
        type: object
        description: >-
          <p>Item number as presented to user.</p>
        $ref: '#/definitions/LocalId'
      Description:
        type: string
        description: >-
          <p>Description of Item</p>
      ElectronicIdList:
        type: object
        description: >-
          <p>Electronic identifier(s) associated with this item.</p>
        $ref: '#/definitions/ElectronicIdList'
      ItemCategory:
        type: string
        description: >-
          <p> The category is derived from the Child Nutrition Database's food category codes/names (Source: Food Category Name File [CNDB]). Agents may use the actual codes or a district's local definition of the names associated with the codes. The Child Nutrition Database [CNDB] is updated on a yearly basis by the USDA. </p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
  # //////////////////////////////// data object /////////////////////////////
  FoodserviceItemUnitCollection:
    type: object
    properties:
      FoodserviceItemUnit:
        type: array
        items:
          $ref: '#/definitions/FoodserviceItemUnit'
  FoodserviceItemUnit:
    required:
    - "Description"
    - "FoodserviceItemRefId"
    - "GramWeight"
    - "MeasureDescriptionCode"
    - "RefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>GUID that identifies this unit</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      FoodserviceItemRefId:
        type: object
        description: >-
          <p>GUID that identifies related item</p>
        $ref: '#/definitions/IdRef'
      Description:
        type: string
        description: >-
          <p>Description of unit ("cup", "teaspoon", etc.)</p>
      MeasureDescriptionCode:
        type: string
        description: >-
          <p> Child Nutrition Database [CNDB] standard code describing unit.  The database is updated on a yearly basis by the USDA. </p>
      GramWeight:
        type: number
        description: >-
          <p>Gram weight of this item in terms of MeasureDescriptionCode</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object describes the unit for an item.</p>
  # //////////////////////////////// data object /////////////////////////////
  FoodserviceItemPortionCollection:
    type: object
    properties:
      FoodserviceItemPortion:
        type: array
        items:
          $ref: '#/definitions/FoodserviceItemPortion'
  FoodserviceItemPortion:
    required:
    - "FoodserviceItemUnitRefId"
    - "ItemPortionQuantity"
    - "ItemPortionType"
    - "RefId"
    type: object
    properties:
