          title: StaffPersonal
        - const: "EmployeePersonal"
          title: EmployeePersonal
        xml:
          attribute: true
      Injury:
        type: string
        description: >-
          <p>Identifies whether or not this specific victim was physically injured, and if so, identify whether the injury was major or minor.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true

  # ///////////////////////////////// list ////////////////////////////
  IdentityProviderList:
    description: >-
      <p>If the application can use multiple Identity Providers (authentication providers) to authenticate the user, for example Google directory service, LDAP, AD, etc., there could be multiple such providers in this list.</p>
