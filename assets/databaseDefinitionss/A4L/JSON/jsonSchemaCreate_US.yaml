  # //////////////////////////////// data object /////////////////////////////
  FoodserviceTransactionCollection:
    type: object
    properties:
      FoodserviceTransaction:
        type: array
        items:
          $ref: '#/definitions/FoodserviceTransaction'
  FoodserviceTransaction:
    required:
    - "Amount"
    - "Customer"
    - "Program"
    - "RefId"
    - "SchoolInfoRefId"
    - "TransactionDate"
    - "TransactionTime"
    - "TransactionTypes"
    - "Voided"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>GUID that identifies food service transaction</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      SchoolInfoRefId:
        type: object
        description: >-
          <p>GUID that identifies the school/site of account transaction</p>
        $ref: '#/definitions/IdRef'
      Program:
        type: object
        $ref: '#/definitions/FundedProgram'
      TransactionDate:
        type: string
        format: date
        description: >-
          <p>Date of transaction</p>
      TransactionTime:
        description: >-
          <p>Time of transaction.</p>
      TransactionTypes:
        type: object
        $ref: '#/definitions/FoodserviceTransactionList'
      Customer:
        type: object
        description: >-
          <p>The customer can be a student or staff.</p>
        $ref: '#/definitions/FoodserviceCustomer'
      Amount:
        type: object
        $ref: '#/definitions/FSAmount'
      Tax:
        type: object
        description: >-
          <p>Amount of tax.</p> <p>Note: Final amount is Amount/Value + Tax</p>
        $ref: '#/definitions/MonetaryAmount'
      Description:
        type: string
        description: >-
          <p>Description of the Transaction</p>
      Voided:
        type: string
        description: >-
          <p>This flag tells us if the transaction is voided.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> This object communicates food service transaction information. This is the key object that will be present for every food service transaction. </p> <p> Note: With SIF Implementation Specification version 2.4 the choice element depicted in the diagram below has changed. In the XSD files, the choice element used to be rendered as a sequence of optional elements. Now, in the XSD files, the choice element is rendered as an xs:choice. This may cause problems with agents that treat the choice element as two optional elements rather than a choice of one and only one of the choices. </p>
  # //////////////////////////////// data object /////////////////////////////
  FoodserviceTransactionDetailsCollection:
    type: object
    properties:
      FoodserviceTransactionDetails:
        type: array
        items:
          $ref: '#/definitions/FoodserviceTransactionDetails'
  FoodserviceTransactionDetails:
    required:
    - "Amounts"
    - "FoodserviceTransactionRefId"
    - "RefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>GUID that identifies transaction details</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      FoodserviceTransactionRefId:
        type: object
        description: >-
          <p>GUID that identifies food service transaction</p>
        $ref: '#/definitions/IdRef'
      Amounts:
        type: object
        $ref: '#/definitions/FSAmountList'
      Description:
        type: string
        description: >-
          <p>Description</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> This object gives the transaction distribution for food service transactions of type other than <code>Purchase</code>. So, this object can be requested for transactions of type <code>Prepayment</code>, <code>Repayment</code>, <code>Refund</code>, <code>Adjustment</code>. </p>
