        type: object
        $ref: '#/definitions/DisciplineActionZeroTolerance'
      FullYearExpulsion:
        type: object
        $ref: '#/definitions/DisciplineActionFullYearExpulsion'
      ShortenedExpulsion:
        type: object
        $ref: '#/definitions/DisciplineActionShortenedExpulsion'
      PoliceNotification:
        type: object
        $ref: '#/definitions/DisciplineActionPoliceNotification'
      Arrest:
        type: object
        $ref: '#/definitions/DisciplineActionArrest'
      AlternativeEducation:
        type: object
        $ref: '#/definitions/DisciplineActionAlternativeEducation'

