        format: date
        description: >-
          <p>Date the evaluation/assessment process for student was completed.</p>
      EvaluationExtensionDate:
        type: string
        format: date
        description: >-
          <p>Actual date by which evaluation must be completed (for state use in determining timeliness in event that parent and LEA agreed to an extension beyond normal state deadline).</p>
      ExtensionComments:
        type: string
        description: >-
          <p>Contains any comments on the extension. Optional even if an EvaluationExtensionDate is present.</p>
      ReevaluationDate:
        type: string
        format: date
        description: >-
          <p>Date students will be reevaluated for continued placement in a support program(s).</p>
      ExceptionalityCategories:
        type: object
        $ref: '#/definitions/ExceptionalityCategoryList'
      ProgramEligibilityDate:
        type: string
        format: date
        description: >-
          <p>Date student is eligible for beginning the support program(s).</p>
      ProgramPlanType:
        type: object
        $ref: '#/definitions/ProgramPlanType'
      ProgramPlanDate:
        type: string
        format: date
        description: >-
          <p>Date the most recent program plan was completed and approved by the team responsible for developing it. The date the parent consented to placement is NOREPDate.</p>
      ProgramPlanEffectiveDate:
        type: string
        format: date
        description: >-
          Date by which the plan must be implemented for the student.
      NOREPDate:
        type: string
        format: date
        description: >-
          <p>Date the Notice of Recommended Educational Placement was signed and approved by the parent / guardian of the student.</p>
      PlacementParentalConsentDate:
        type: string
        format: date
        description: >-
          <p>Date the parent(s) consented to the proposed placement.</p>
      ProgramPlacementDate:
        type: string
        format: date
        description: >-
          <p>Date student began the support program.</p>
      ProgramPlacementReason:
        type: string
        description: >-
          <p>Why the student was placed in the support program.</p>
      LeastRestrictiveEnvironment:
        type: object
        $ref: '#/definitions/LeastRestrictiveEnvironment'
      ExtendedSchoolYear:
        type: boolean
        description: >-
          <p>For special education, indicates whether Extended School Year (ESY) / summer services have been determined as necessary</p>
      ExtendedDay:
        type: boolean
        description: >-
          <p>For special education, indicates whether Extended School Day (ESD) services have been determined as necessary.</p>
      ProgramAvailability:
        type: object
        $ref: '#/definitions/ProgramAvailability'
      PrivateNotPlacedByPublic:
        type: boolean
        description: >-
          <p>Indicates whether the student is enrolled by a parent/guardian in a private school and has special education/services provided at public expense. Necessary for the OSEP federal IDEA reports..</p>
      ProgramReviewDate:
        type: string
        format: date
        description: >-
          <p>Projected date of the program plan review (for IDEA, the projected annual IEP review date).</p>
      FBADate:
        type: string
        format: date
        description: >-
          <p>The most recent date on which the IEP Team completed a full and comprehensive review of all functional behavioral assessment materials.</p>
      BIPDate:
        type: string
        format: date
        description: >-
          <p>The most recent date on which the IEP Team approved a behavioral intervention plan.</p>
      ProgramExitDate:
        type: string
        format: date
        description: >-
          <p>Date student exited support program(s).</p>
      ProgramExitReason:
        type: object
        $ref: '#/definitions/ProgramExitReason'
      ProjectedExitDate:
        type: string
        format: date
        description: >-
          <p>The date on which it is projected that a student will exit program. Has typically been provided when student turns 14; under new IDEA, may change to 16.</p>
      ProjectedExitReason:
        type: object
        description: >-
          <p>Review by program / state. May be required if a ProjectedExitDate is present. The projected reason for a student's exit from program.</p>
        $ref: '#/definitions/SourcedCodeset'
      PlannedAssessmentParticipation:
        type: object
        description: >-
          <p>The student's planned level of participation in statewide assessments.</p>
        $ref: '#/definitions/SourcedCodeset'
      TransitionPlanning:
        type: object
        description: >-
          <p>Purpose / goal for recommended transition planning services.</p>
        $ref: '#/definitions/SourcedCodeset'
      StudentSpecialEducationFTE:
        type: number
        description: >-
          <p>Calculated ratio of time the student is in a special ed setting. Values range from 0.00 to 1.00. If the student is in a special ed setting 25% of the time, the value is .25; if 100% of the time, the value is 1.00.</p>
      EntryPerson:
        type: string
        description: >-
          <p>Identification / name of the person who created the transaction that led to the creation of this instance of the object.</p>
      ParticipationContact:
        type: string
        description: >-
          <p>Primary contact for this record.</p>
      AdditionalProgramAvailabilityList:
        type: object
        $ref: '#/definitions/ProgramAvailabilityList'
      CaseManager:
        type: string
        description: >-
          <p>The name of the case manager responsible for the academic plans of this student.</p>
      FreeAndReducedStatus:
        type: string
        description: >-
          <p>Student's eligibility for free and reduced meals.</p>
      CertifiedLunchProgram:
        type: string
        description: >-
          <p>Indicates that the student's National School Lunch Program (NSLP) eligibility has been determined through direct certification.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      PerkinsLEPStatus:
        type: object
        $ref: '#/definitions/StudentParticipationPerkinsLEPStatus'
      TitleIIIAccountabilityProgressStatus:
        type: object
        $ref: '#/definitions/StudentParticipationTitleIIIAccountabilityProgressStatus'
      TitleIIIImmigrantParticipationStatus:
        type: object
        $ref: '#/definitions/StudentParticipationTitleIIIImmigrantParticipationStatus'
      NeglectedOrDelinquentAchievementIndicator:
        type: object
        $ref: '#/definitions/StudentParticipationNeglectedOrDelinquentAchievementIndicator'
      NeglectedOrDelinquentAcademicOutcomeIndicator:
        type: object
        $ref: '#/definitions/StudentParticipationNeglectedOrDelinquentAcademicOutcomeIndicator'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object contains information pertaining to student eligibility for and participation in an individualized special program such as special education, ESL, Section 504, etc.</p> <p> Multiple instances of this object may be transmitted for a particular student because the student may participate in multiple programs and because the details of a student's participation in a given program may change over time. A separate instance of this object must be generated for each program in which the student participates, and the <code>ProgramType</code> element is used to identify the particular program. In addition, each time the student's participation profile changes for a particular program, a new instance of this object must be generated with the appropriate value in the <code>ProgramType</code> element, the effective date of the new profile in <code>StudentParticipationAsOfDate</code>, and a new <code>RefId</code>. </p>
  # //////////////////////////////// data object /////////////////////////////
  StudentPlacementCollection:
    type: object
    properties:
      StudentPlacement:
        type: array
        items:
          $ref: '#/definitions/StudentPlacement'
  StudentPlacement:
    required:
    - "RefId"
    - "SIF_RefObject"
    - "Service"
    - "StudentParticipationRefId"
    - "StudentPersonalRefId"
    - "StudentPlacementAsOfDate"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>This is the unique identification code</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      StudentParticipationRefId:
        type: object
        description: >-
          <p>This is the reference code for student eligibility for participation</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      StudentPersonalRefId:
        type: object
        description: >-
          <p>The GUID of the student that this object is linked to.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      StudentPlacementAsOfDate:
        type: string
        format: date
        description: >-
          <p>Effective date (NOT the entry date) of this StudentPlacement instance for the identified student and program. It is intended that each time the contents of this instance of the object changes, it will be published with a new RefId.</p>
      Service:
        type: object
        description: >-
          <p>Specialized instruction or related / transitional service provided to this student.</p>
        $ref: '#/definitions/StudentPlacementService'
      ServiceCategory:
        type: string
        description: >-
          <p>Category of service (for example, whether it is instruction or a related / transitional service or a supplemental service). Typically designated by a state.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      ServiceFundingSources:
        type: object
        $ref: '#/definitions/StudentPlacementServiceFundingSourceList'
      ServicingPublicAgency:
        type: object
        description: >-
          <p>The GUID of the public agency (a district / LEA) to which the "ServicingSchool" reports / belongs.</p>
        $ref: '#/definitions/IdRef'
      SIF_RefObject:
        oneOf:
        - const: "LEAInfo"
          title: LEAInfo
        xml:
          attribute: true
      ServicingSchool:
        type: object
        $ref: '#/definitions/StudentPlacementServicingSchool'
      SchoolWhereServiceDelivered:
        type: object
        $ref: '#/definitions/StudentPlacementSchoolWhereServiceDelivered'
      ServiceProviderType:
        type: object
        description: >-
          <p>Used for an individual providing the service. Review by state / program, may be required. Service provider title (such as Physical Therapist or Psychologist).</p>
        $ref: '#/definitions/ServiceProviderType'
      AgencyType:
        type: string
        description: >-
          <p>Identifies an agency or clinic that will provide the specified service.</p>
      ServiceProviderName:
        type: string
        description: >-
          <p>The name of the person who delivers the service.</p>
      ServiceSetting:
        type: object
        description: >-
          <p>Setting where service is provided (Regular Class, Resource Room, Homebound, Detention Center, etc.).</p>
        $ref: '#/definitions/ServiceSetting'
      WhenServiceProvided:
        type: object
        description: >-
          <p>General timing of service delivery relative to school calendar / schedule.</p>
        $ref: '#/definitions/WhenServiceProvided'
      LatestStartDate:
        type: string
        format: date
        description: >-
          <p>Date by which service is supposed to start for this student.</p>
      StartDate:
        type: string
        format: date
        description: >-
          <p>Actual date this service began for this student.</p>
      EndDate:
        type: string
        format: date
        description: >-
          <p>Actual date this service ended for this student.</p>
      FrequencyTime:
        type: object
        description: >-
          <p>Code for the frequency that the service is provided.</p>
        $ref: '#/definitions/FrequencyTime'
      DirectTime:
        type: object
        description: >-
          <p>Number of units of time per session spent directly providing the service to the student.</p>
        $ref: '#/definitions/SessionDuration'
      IndirectTime:
        type: object
        description: >-
          <p>Number of units of time per session NOT spent directly providing the service to the student but rather spent providing consultation services to someone related to the student (e.g. parent, a general ed teacher, a new service provider, etc.).</p>
        $ref: '#/definitions/SessionDuration'
      TotalServiceDuration:
        type: object
        description: >-
          <p>Total of the direct and indirect time as it relates to the FrequencyTime; e.g., DirectTime 60 + IndirectTime 30 = 90.</p>
        $ref: '#/definitions/SessionDuration'
      IncludedInSpecialEducationFTE:
        type: boolean
        description: >-
          <p>Indicates whether the direct time for this service is included in the calculation of a student's special education FTE.</p>
      SpecialNeedsTransportation:
        type: boolean
        description: >-
          <p>Indicates whether the student requires transportation to the location of Placement/Service.</p>
      AssistiveTechnology:
        type: boolean
        description: >-
          <p>Indicates whether the student requires assistive technology for this Placement/Service.</p>
      EntryPerson:
        type: string
        description: >-
          <p>Identification / name of the person who created the transaction that led to the creation of this instance of the object.</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object contains information that describes a specific instructional, related or transitional service that has been prescribed or recommended in the program plan developed for a student who has been placed in an individualized special program.</p>
  # //////////////////////////////// data object /////////////////////////////
  TestAccommodationCollection:
    type: object
    properties:
      TestAccommodation:
        type: array
        items:
          $ref: '#/definitions/TestAccommodation'
  TestAccommodation:
    required:
    - "AuthorizedActual"
    - "GradeLevel"
    - "RefId"
    - "SchoolInfoRefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>Unique Id for this set of test accommodations required for a particular student who is participating in a special program and for whom this set of test accommodation(s) is recommended / prescribed for this test administration (specific subject area and level) in a specific special programs plan.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      StudentPersonalRefId:
        type: object
        description: >-
          <p>Reference to StudentPersonal object. Typically a vendor is allowed to receive a StateProvinceId or a student's Name, but not both together. The student must be identified by StudentPersonalRefId, or Name and LocalId, or StateProvinceId.</p>
        $ref: '#/definitions/IdRef'
      StateProvinceId:
        type: object
        description: >-
          <p>Reference to the state code identifying the student in the StudentPersonal object, as of the date of the response.</p>
        $ref: '#/definitions/StateProvinceId'
      StateDistrictId:
        type: object
        description: >-
          <p>Reference to State code (StateProvinceId for LEAInfo) for the student's district of enrollment as of the date of the response (optional because school might be independent).</p>
        $ref: '#/definitions/StateProvinceId'
      LEAInfoRefId:
        type: object
        description: >-
          <p>The RefId for the district to which the student's home school of enrollment belongs as of the date of the response (optional because school might be independent).</p>
        $ref: '#/definitions/IdRef'
      SchoolInfoRefId:
        type: object
        description: >-
          <p>The RefId for the student's home school of enrollment as of the date of the response.</p>
        $ref: '#/definitions/IdRef'
      StateSchoolId:
        type: object
        description: >-
          <p>Reference to State code (StateProvinceId for SchoolInfo) for student's home school of enrollment as of the date of the response (optional because state may not require).</p>
        $ref: '#/definitions/StateProvinceId'
      GradeLevel:
        type: object
        description: >-
          <p>Code for the current actual grade placement of the student as of the date of the response from StudentSchoolEnrollment.</p>
        $ref: '#/definitions/GradeLevel'
      AssessmentRegistrationRefId:
        type: object
        description: >-
          <p>RefId for the student's registration / assignment to take a particular test (test name, subject area, level, grade level, type) at a particular time or within a particular timeframe. An assessment may also be identified by omitting this element and specifying the whole set (TestAdministration, TestSubjectArea, TestGradeLevel, TestAdministrationDateRange or PlannedTestAdministrationDate, and TestType).</p>
        $ref: '#/definitions/IdRef'
      TestAdministration:
        type: string
        description: >-
          <p>Abbreviated name of the test for which this set of accommodations is to be provided.</p>
      TestSubjectArea:
        type: string
        description: >-
          <p>Subject area of the test. Teachers may only supply this element, while a high-stakes test will supply the whole set (TestAdministration, TestSubjectArea, TestGradeLevel, TestAdministrationDateRange or PlannedTestAdministrationDate, and TestType).</p>
      TestGradeLevel:
        type: string
        description: >-
          <p>Grade level of the test.</p>
      TestAdministrationDateRange:
        type: string
        description: >-
          <p>General date range of the test (e.g. "Spring 2005"). Date is identified by either TestAdministrationDateRange or PlannedTestAdministrationDate</p>
      PlannedTestAdministrationDate:
        type: string
        format: date
        description: >-
          <p>The date the test is planned to be administered. Should contain the most current known date (Date is needed in order to identify accommodations to be sent—accommodations are date-dependent).</p>
      TestType:
        type: string
        description: >-
          <p>Identifies whether the test the student is to take is a standard or alternate.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      AuthorizedActual:
        type: object
        $ref: '#/definitions/TestAccommodationAuthorizedActual'
      ActualTestAdministrationDate:
        type: string
        format: date
        description: >-
          <p>The date the test was actually administered.</p>
      StudentProgramAccommodations:
        type: object
        description: >-
          <p>Container. If the requested student no longer requires any accomodations, this element should be omitted.</p>
        $ref: '#/definitions/StudentProgramAccommodationList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> This object provides information about test accommodation(s) required for a particular student who is registered to take a particular state test or who is about to be assigned by a teacher to take a course-related test, is participating in one or more special program(s) and for whom this set of test accommodations is prescribed in one or more specific special program plan(s). </p>
  # //////////////////////////////// data object /////////////////////////////
  StudentSpecialEducationSummaryCollection:
    type: object
    properties:
      StudentSpecialEducationSummary:
        type: array
        items:
          $ref: '#/definitions/StudentSpecialEducationSummary'
  StudentSpecialEducationSummary:
    required:
    - "RefId"
    - "SchoolYear"
    - "StudentPersonalRefId"
    - "SummaryDate"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>A GUID that identifies an instance of this object. This RefId is a “transient” value; that is, it SHOULD be generated by the provider at the time the object is provided in a Response message. This value MUST NOT be used in a later Request for the object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      StudentPersonalRefId:
        type: object
        description: >-
          The Id (GUID) of the student for whom this special education information is being reported.
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SummaryDate:
        type: string
        format: date
        description: >-
          <p> The date the data summary was taken. Some elements are provided/calculated as of the SummaryDate, and some are provided as of the date the object is requested (i.e., some can be historical and some will represent the last information available/last known value). </p>
        xml:
          attribute: true
      SchoolYear:
        type: object
        description: >-
          <p>School year for which the information is applicable.</p>
        $ref: '#/definitions/SchoolYear'
        xml:
          attribute: true
      StudentSpecialEducationFTE:
        type: number
        description: >-
          <p>Calculated ratio of time the student is in a special ed setting. Values range from 0.00 to 1.00. If the student is in a special ed setting 25% of the time, the value is .25; if 100% of the time, the value is 1.00.</p>
      PrimaryDisabilityCode:
        type: string
        description: >-
          <p>A code that identifies the primary disability type for a student who is eligible for services under the Individuals with Disabilities Education Act (IDEA) and who has an Individualized Education Program (IEP). Since primary disability is time-dependent a student’s primary disability can change through a school year or reporting period</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      SpecificDisabilityIdentified:
        type: boolean
        description: >-
          <p> An indication of whether a person is classified as disabled under the American's with Disability Act (ADA). </p>
      EnvironmentForSchoolAge:
        type: object
        $ref: '#/definitions/StudentSpecialEducationSummaryEnvironmentForSchoolAge'
      EnvironmentForEarlyChildhood:
        type: object
        $ref: '#/definitions/StudentSpecialEducationSummaryEnvironmentForEarlyChildhood'
      NeglectedOrDelinquentParticipationList:
        type: object
        description: >-
          <p>The type and number of days a student participated in a Neglected or Delinquent program during the reporting period.</p>
        $ref: '#/definitions/NeglectedOrDelinquentParticipationList'
      StudentParticipationList:
        type: object
        description: >-
          <p>Collects elements of interest for each StudentParticipation.</p>
        $ref: '#/definitions/StudentSpecialEducationSummaryStudentParticipationList'
      StudentPlacementList:
        type: object
        description: >-
          <p>This list contains information that describes each specific instructional, related or transitional service that has been prescribed or recommended in the program plan developed for a student who has been placed in an individualized special program.</p>
        $ref: '#/definitions/StudentSpecialEducationSummaryStudentPlacementList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      This object provides a summary of a student's participation and placement in special education programs for a given school for a given school year, reflecting the known or calculated values at the time (SummaryDate) the summary was provided. As such, there may be multiple instances of this object for a student in a school over the course of a school year. SIF_Events are not supported by this object.
  # //////////////////////////////// data object /////////////////////////////
  StudentCareerTechnicalCollection:
    type: object
    properties:
      StudentCareerTechnical:
        type: array
        items:
          $ref: '#/definitions/StudentCareerTechnical'
  StudentCareerTechnical:
    required:
    - "ProgramParticipationStartDate"
    - "RefId"
    - "StudentPersonalRefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies the record.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      StudentPersonalRefId:
        type: object
        description: >-
          <p>The Id (GUID) that identifies the school where federal funds being tracked.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      EducationCompleter:
        type: string
        description: >-
          <p>An indication of a student who reached a state-defined threshold of a career and technical education program/pathway.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      Concentrator:
        type: string
        description: >-
          <p>An indication of a student who has met the state-defined threshold of career and technical education concentrators, as defined in the State's approved Perkins IV State Plan.</p>
      Participant:
        type: object
        $ref: '#/definitions/StudentCareerTechnicalParticipant'
      NontraditionalGenderStatus:
        type: object
        $ref: '#/definitions/StudentCareerTechnicalNontraditionalGenderStatus'
      DisplacedHomemaker:
        type: object
        $ref: '#/definitions/StudentCareerTechnicalDisplacedHomemaker'
      ProgramParticipationExitDate:
        type: string
        format: date
        description: >-
          <p>The year, month and day on which the person ceased to participate in a program.</p>
      ProgramParticipationStartDate:
        type: string
        format: date
        description: >-
          <p>The year, month and day on which the person began to participate in a program.</p>
      NeglectedOrDelinquentProgramType:
        type: string
        description: >-
          <p>The year, month and day on which the person began to participate in a program.The type of program under ESEA Title I, Part D, Subpart 1 (state programs) or Subpart 2 (LEA).</p>
      SingleParentOrSinglePregnantWoman:
        type: object
        $ref: '#/definitions/StudentCareerTechnicalSingleParentOrSinglePregnantWoman'
      OutcomeType:
        type: string
        description: >-
          <p>The type of academic or career and technical outcome attained while enrolled in the program.</p>
      OutcomeExitType:
        type: string
        description: >-
          <p>The type of academic or career and technical outcome attained up to 90 days after exiting the facility or program.</p>
    description: >-
      Holds career and technical elements for a student.
  # //////////////////////////////// data object /////////////////////////////
  AssessmentCollection:
    type: object
    properties:
      Assessment:
        type: array
        items:
          $ref: '#/definitions/Assessment'
  Assessment:
    required:
    - "Name"
    - "RefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The GUID that uniquely identifies this object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      Name:
        type: string
        description: >-
          <p>Name of the test.</p>
      ShortName:
        type: string
        description: >-
          <p>An abbreviated title for an assessment.</p>
      AssessmentId:
        type: string
        description: >-
          <p>The state, local or publisher unique Id for the assessment.</p>
      AssessmentIdSystem:
        type: string
        description: >-
          <p>A coding scheme that is used for identification and record-keeping purposes by schools, social services, or other agencies to refer to an assessment.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      AssessmentPackageRefId:
        type: object
        $ref: '#/definitions/IdRef'
      AssessmentDescriptors:
        type: object
        description: >-
          <p>Describes what type of assessment this represents.</p>
        $ref: '#/definitions/AssessmentDescriptorList'
      AssessmentPurpose:
        type: string
        description: >-
          <p>The reason for which an assessment is designed or delivered.</p>
      AssessmentFamilyTitle:
        type: string
        description: >-
          <p>The full title of the Assessment Family. An Assessment Family is a set of assessments with a common name, jurisdiction, or focus, such as Graduate Record Exam or National Assessment of Educational Progress.</p>
      AssessmentFamilyShortName:
        type: string
        description: >-
          <p>The abbreviated title of the Assessment Family. An Assessment Family is a set of assessments with a common name, jurisdiction, or focus.</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
  # //////////////////////////////// data object /////////////////////////////
  AssessmentItemCollection:
    type: object
    properties:
      AssessmentItem:
        type: array
        items:
          $ref: '#/definitions/AssessmentItem'
  AssessmentItem:
    required:
    - "AssessmentFormRefId"
    - "ItemLabel"
    - "RefId"
    - "ResponseType"
    type: object
    properties:
      RefId:
        type: object
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      AssessmentFormRefId:
        type: object
        description: >-
          <p>This RefId points to the assessment form of which the item is a part.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      ResponseType:
        type: string
        description: >-
          <p>A value that indicates the response type for the item.</p>
        xml:
          attribute: true
      ResponseTypeCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      ItemLabel:
        type: string
        description: >-
          <p>An item number or other identifier for the item. It may be used to indicate the order or grouping of items.</p>
      ItemName:
        type: string
        description: >-
          <p>Name or short description of the item.</p>
      LearningStandardItems:
        type: object
        description: >-
          <p> This object contains information related to curriculum standards statements "standards" or "benchmarks" or the like within the document. This object primarily focuses upon state department curriculum standards, published curriculum standards and local education agency learning standards. Each <code>LearningStandardItemRefId</code> reflects an individual standard statement and may occur at several levels within a hierarchially structured document. </p>
        $ref: '#/definitions/LearningStandardItemRefIdList'
      Stimulus:
        type: object
        description: >-
          <p>A piece of content to be used by the test taker in responding to the stem. Examples include a reading passage, a video, a diagram, or a picture.</p> <p> Note: The <code>Stimulus</code> element only is included when a <code>Stem</code> element exists. </p>
        $ref: '#/definitions/AbstractContentElement'
      Stem:
        type: object
        description: >-
          <p>The question, task, or statement that prompts a response from the test taker.</p>
        $ref: '#/definitions/AbstractContentElement'
      ResponseChoices:
        type: object
        description: >-
          <p> This complex element will not be included in the object if <code>@ResponseType</code> is: </p> <ul> <li> <code>fill-in-the-blank</code> </li> <li> <code>short-answer</code> </li> <li> <code>essay</code> </li> </ul> <p>Other cases will be added in the future.</p>
        $ref: '#/definitions/AssessmentItemChoiceList'
      ItemScoreMaximum:
        type: string
        description: >-
          <p>The maximum item score possible for this item.</p>
      ItemScoreMinimum:
        type: string
        description: >-
          <p>The minimum item score possible for this item.</p>
      PerformanceLevels:
        type: object
        description: >-
          <p>Performance Levels are an ordered set of categories that indicate the achievement level of a person on an assessment. </p>
        $ref: '#/definitions/PerformanceLevelList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> This object is designed to allow software systems to provide item detail information such as the stem of the item, the distractors, the stimuli, etc. This initial version of the object does not deal with presentation aspects of the item. Instead it focuses on the item content and characteristics needed to enable interoperability and the usage of item-level information in the improvement of learning and instruction. </p>
  # //////////////////////////////// data object /////////////////////////////
  ItemCharacteristicsCollection:
    type: object
    properties:
      ItemCharacteristics:
        type: array
        items:
          $ref: '#/definitions/ItemCharacteristics'
  ItemCharacteristics:
    required:
    - "AssessmentFormRefId"
    - "AssessmentItemRefId"
    - "RefId"
    type: object
    properties:
      RefId:
        type: object
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      AssessmentItemRefId:
        type: object
        description: >-
          This RefId points to the assessment item of which the characteristics are a part.
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      AssessmentFormRefId:
        type: object
        description: >-
          This RefId points to the assessment form of which the item is a part.
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      PercentCorrect:
        type: number
        description: >-
          Number of correct answers in sample.
      SampleSize:
        type: integer
        description: >-
          Number of total Item exposures.
      SampleDescription:
        type: string
        description: >-
          The description of the Sample the statistics are based on. May be District name, State or National sample.
      Measurements:
        type: object
        description: >-
          A repeating group of psychometric measures.
        $ref: '#/definitions/ItemCharacteristicsMeasurementList'
      Descriptive:
        type: object
        description: >-
          [This element is deprecated as of release 2.5. It is replaced by the Measurements element.]
        $ref: '#/definitions/ItemCharacteristicsDescriptive'
      DifferentialItemAnalysis:
        type: object
        description: >-
          [This element is deprecated as of release 2.5. It is replaced by the Measurements element.]
        $ref: '#/definitions/ItemCharacteristicsDifferentialItemAnalysis'
      ResponseChoicePattern:
        type: object
        description: >-
          The distribution of responses to each choice. This element only applies to multiple choice items.
        $ref: '#/definitions/ItemCharacteristicsChoiceList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      This object provides specific information about each assessment item. This information includes an analysis, psychometric measures, reliability and validity information. This item-level information assists in interpreting assessment scores as well as aide in improving teaching and learning.
  # //////////////////////////////// data object /////////////////////////////
  AssessmentSubTestCollection:
    type: object
    properties:
      AssessmentSubTest:
        type: array
        items:
          $ref: '#/definitions/AssessmentSubTest'
  AssessmentSubTest:
    required:
    - "Name"
    - "RefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The GUID that uniquely identifies an instance of the object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      Name:
        type: string
        description: >-
          <p>Text name of the subtest. </p>
      ScoreRange:
        type: object
        description: >-
          The possible range of scores.
        $ref: '#/definitions/ScoreRange'
      PerformanceLevels:
        type: object
        description: >-
          <p>Container for performance level elements. </p>
        $ref: '#/definitions/PerformanceLevelList'
      SubjectArea:
        type: string
        description: >-
          <p>Content area covered by the score.</p>
      GradeLevels:
        type: object
        description: >-
          <p>Grade levels for which the score is valid.</p>
        $ref: '#/definitions/GradeLevels'
      AssessmentSubTestRefIds:
        type: object
        description: >-
          <p>References (possibly recursive) to other SIF AssessmentSubTests. This enables subtests or scores to be composites of other scores. If any references are given here, the score is a composite score. The list must be unique.</p>
        $ref: '#/definitions/AssessmentSubTestRefIdList'
      SubTestTier:
        type: integer
        description: >-
          <p>An integer that defines the level or tier of the score in a multi-level arrangement of composite scores. Zero indicates the highest or root level.</p>
      LearningStandardItemRefIds:
        type: object
        description: >-
          <p>References to LearningStandardItems. The list must be unique.</p>
        $ref: '#/definitions/LearningStandardItemRefIdList'
      Abbreviation:
        type: string
        description: >-
          <p>This is the short version of the name of the assessment that is often used for quick reference and used in reports.</p>
      Description:
        type: string
        description: >-
          <p>The description element provides an opportunity to pass additional information about the assessment and also be used for describing elements in a test hierarchy.</p>
      NumberOfItems:
        type: integer
        description: >-
          <p>This element records the number of items included on the assessment. This number may be different than the possible score.</p>
      ContainerOnly:
        type: boolean
        description: >-
          <p>Indicator describing the purpose of an AssessmentSubTest as being that of a container for the child AssessmentSubTests. There will be no scores within this subtest.</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> A psychological construct measured by the assessment. Operationally, a subtest is a class of scores on an assessment. Some assessments may have only one subtest or type of score but most assessments measure more than one psychological construct. The subtest can be based upon items in a section or items that are empirically related. Subtests can also be composites of other subtests that are combined using a particular algorithm. Examples of subtests of an assessment are math total, reading composite, total test, and English composition. </p>
  # //////////////////////////////// data object /////////////////////////////
  AssessmentAdministrationCollection:
    type: object
    properties:
      AssessmentAdministration:
        type: array
        items:
          $ref: '#/definitions/AssessmentAdministration'
  AssessmentAdministration:
    required:
    - "AdministrationDateTime"
    - "AssessmentFormRefId"
    - "RefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The GUID that uniquely identifies an instance of the object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      AssessmentFormRefId:
        type: object
        description: >-
          <p>The RefId of the assessment form used in the assessment administration.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      AdministrationName:
        type: string
      SpecialConditions:
        type: object
        description: >-
          <p>Special conditions or unusual events related to the administration event.</p>
        $ref: '#/definitions/SpecialConditionActionList'
      AdministrationDateTime:
        type: string
        format: date-time
        description: >-
          <p>Date and time the test is scheduled to be given.</p>
      StartDateTime:
        type: string
        format: date-time
        description: >-
          <p>Date and time testing begins.</p>
      FinishDateTime:
        type: string
        format: date-time
        description: >-
          <p>Date and time testing ends.</p>
      DueDateTime:
        type: string
        format: date-time
        description: >-
          <p>Date and time test is due.</p>
      Address:
        type: object
        description: >-
          <p>Address of the location where the administration takes place.</p>
        $ref: '#/definitions/OldAddress'
      StaffPersonalRefId:
        type: object
        description: >-
          <p>Optional reference to a staff person associated with the administration.</p>
        $ref: '#/definitions/IdRef'
      LEAInfoRefId:
        type: object
        description: >-
          <p>Optional reference to a school district associated with the administration.</p>
        $ref: '#/definitions/IdRef'
      SchoolInfoRefId:
        type: object
        description: >-
          <p>Optional reference to a school associated with the administration.</p>
        $ref: '#/definitions/IdRef'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object represents an assessment event. It includes information related to the time of administration, place of administration, and unusual events related to the administration.</p>
  # //////////////////////////////// data object /////////////////////////////
  AssessmentFormCollection:
    type: object
    properties:
      AssessmentForm:
        type: array
        items:
          $ref: '#/definitions/AssessmentForm'
  AssessmentForm:
    required:
    - "AssessmentRefId"
    - "FormName"
    - "RefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The GUID that uniquely identifies an instance of the object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      AssessmentRefId:
        type: object
        description: >-
          <p>The RefId of the assessment related to this form.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      AssessmentType:
        type: string
        description: >-
          <p>Indicates whether this assessment (form) is a standard administration or alternate.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      FormName:
        type: string
        description: >-
          <p>Text description for this particular arrangement of questions, etc.</p>
      FormNumbers:
        type: object
        description: >-
          <p>Reference numbers for the form.</p>
        $ref: '#/definitions/AssessmentFormNumberList'
      Level:
        type: string
        description: >-
          <p>Indicates the level of the form.</p>
      Period:
        type: string
        description: >-
          <p>The time period in which the form is intended to be administered.</p>
      GradeLevels:
        type: object
        description: >-
          <p>Grade levels this assessment is designed to evaluate.</p>
        $ref: '#/definitions/GradeLevels'
      AssessmentSubTestRefIds:
        type: object
        description: >-
          <p>Associated subtests (score types). Each form can provide scores in one or more subtest areas.</p>
        $ref: '#/definitions/AssessmentSubTestRefIdList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>Represents the unique set of questions or stimuli given to a set of test takers. A physical correlate of the assessment form is the test booklet given to students during an assessment. However, this object does not contain the questions, it only contains elements that describe the form for use in scoring the questions.</p>
  # //////////////////////////////// data object /////////////////////////////
  AssessmentRegistrationCollection:
    type: object
    properties:
      AssessmentRegistration:
        type: array
        items:
          $ref: '#/definitions/AssessmentRegistration'
  AssessmentRegistration:
    required:
    - "AssessmentAdministrationRefId"
    - "CreationDateTime"
    - "RefId"
    - "StudentPersonalRefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The GUID that uniquely identifies an instance of the object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      StudentPersonalRefId:
        type: object
        description: >-
          <p>The student associated with the registration.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      AssessmentAdministrationRefId:
        type: object
        description: >-
          <p>The assessment administration associated with the registration.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      CreationDateTime:
        type: string
        format: date-time
        description: >-
          <p>Date/time assignment is made.</p>
      StudentSpecialConditions:
        type: object
        description: >-
          <p>Records student-specific special conditions during the test. </p>
        $ref: '#/definitions/StudentSpecialConditionList'
      StudentGradeLevel:
        type: object
        description: >-
          <p>Grade level of the student at the time of testing.</p>
        $ref: '#/definitions/GradeLevel'
      AssessmentGradeLevel:
        type: object
        description: >-
          <p>The grade or level at which the student is to be tested. This element should be omitted unless the student is being tested out-of-level.</p>
        $ref: '#/definitions/GradeLevel'
      AssessmentStudentSnapshot:
        type: object
        description: >-
          <p>The status of the student at the time of testing. The source of this information is meant to be the assessment system and not the student information system.</p>
        $ref: '#/definitions/AssessmentStudentSnapshot'
      StudentParticipation:
        type: object
        description: >-
          <p>Whether a student participated and/or completed.</p>
        $ref: '#/definitions/StudentParticipationCommon'
      LEAInfoRefId:
        type: object
        description: >-
          <p>Optional reference to a district associated with the registration.</p>
        $ref: '#/definitions/IdRef'
      SchoolInfoRefId:
        type: object
        description: >-
          <p>Optional reference to a school associated with the registration.</p>
        $ref: '#/definitions/IdRef'
      StaffPersonalRefId:
        type: object
        description: >-
          <p>Optional reference to a staff person associated with the registration.</p>
        $ref: '#/definitions/IdRef'
      SectionInfoRefId:
        type: object
        description: >-
          <p>Optional reference to a section (or class) associated with the registration.</p>
        $ref: '#/definitions/IdRef'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object represents the assignment of a specific assessment to be taken by a student.</p>
  # //////////////////////////////// data object /////////////////////////////
  StudentResponseSetCollection:
    type: object
    properties:
      StudentResponseSet:
        type: array
        items:
          $ref: '#/definitions/StudentResponseSet'
  StudentResponseSet:
    required:
    - "AssessmentAdministrationRefId"
    - "Items"
    - "RefId"
    - "StudentPersonalRefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The GUID that uniquely identifies an instance of the object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      AssessmentAdministrationRefId:
        type: object
        description: >-
          <p>The administration associated with the response set.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      StudentPersonalRefId:
        type: object
        description: >-
          <p>The student associated with the response set.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      AssessmentRegistrationRefId:
        type: object
        description: >-
          <p>The registration associated with the response set.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      Items:
        type: object
        description: >-
          <p>Container for item elements.</p>
        $ref: '#/definitions/StudentResponseSetItemList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object transmits the student's responses to stimuli presented in an assessment. These are the raw, unscored responses.</p>
  # //////////////////////////////// data object /////////////////////////////
  StudentScoreSetCollection:
    type: object
    properties:
      StudentScoreSet:
        type: array
        items:
          $ref: '#/definitions/StudentScoreSet'
  StudentScoreSet:
    required:
    - "AssessmentAdministrationRefId"
    - "RefId"
    - "ScoreMetric"
    - "Scores"
    - "StudentPersonalRefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The GUID that uniquely identifies an instance of the object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      ScoreMetric:
        type: string
        description: >-
          <p>The metric or scale used to report the score.</p>
        xml:
          attribute: true
      ScoreMetricCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      AssessmentAdministrationRefId:
        type: object
        description: >-
          <p>The administration associated with this score set.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      StudentPersonalRefId:
        type: object
        description: >-
          <p>The student associated with this score set.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      AssessmentRegistrationRefId:
        type: object
        description: >-
          <p>The registration associated with this score set.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      Scores:
        type: object
        description: >-
          <p>Container for score elements. </p>
        $ref: '#/definitions/StudentScoreSetScoreList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>The scored results from an assessment.</p>
  # //////////////////////////////// data object /////////////////////////////
  AssessmentPackageCollection:
    type: object
    properties:
      AssessmentPackage:
        type: array
        items:
          $ref: '#/definitions/AssessmentPackage'
  AssessmentPackage:
    required:
    - "RefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p> The GUID that uniquely identifies an object instance in a zone. </p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      XMLData:
        type: object
        description: >-
          <p>Contains an arbitary XML element, encoded in UTF-8.</p>
        $ref: '#/definitions/XMLData'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> A wrapper for any external standard that can define or transmit the content of an assessment. </p>
  # //////////////////////////////// data object /////////////////////////////
  LearningStandardDocumentCollection:
    type: object
    properties:
      LearningStandardDocument:
        type: array
        items:
          $ref: '#/definitions/LearningStandardDocument'
  LearningStandardDocument:
    required:
    - "DocumentStatus"
    - "LearningStandardItemRefId"
    - "Organizations"
    - "RefId"
    - "Source"
    - "SubjectAreas"
    - "Title"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>Id for the standards document</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      RefURI:
        type: string
        format: uri
        description: >-
          <p>A URI that establishes uniqueness of the object instance.</p>
      Title:
        type: string
        description: >-
          <p>Name of standard document, i.e., "Washington Essential Academic Learning Requirements."</p>
      ShortName:
        type: string
        description: >-
          <p>A short name for the document.</p>
      DocumentVersion:
        type: string
        description: >-
          <p>Identifies the version of the document that this object instance represents. Note that new versions of documents must generate new RefIds and therefore a new object instance. This element is immutable in that once the object has been published with a value (other than blank) it must never be changed. </p>
      Description:
        type: string
        description: >-
          <p>Description of the standards document.</p>
      Source:
        type: string
        description: >-
          <p> Defines source of standard document. This is the descriptive type of the organization listed in <code>Organization</code>. It serves to describe the type of the standards contained within the document. </p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      Organizations:
        type: object
        description: >-
          <p>Names of organization represented by the document, i.e., "National Council of Teachers of Mathematics (NCTM)," "Washington," "Seattle School District."</p>
        $ref: '#/definitions/OrganizationList'
      Authors:
        type: object
        description: >-
          <p>Name of the organization that authored the standards document, i.e. "Mid-Continent Research for Education & Learning (McREL)." May be the same as "Organization" above.</p>
        $ref: '#/definitions/AuthorList'
      OrganizationContactPoint:
        type: string
        description: >-
          <p>A brief description of how to contact the organization maintaining the standards. It could be a phone number, email address, or URL.</p>
      SubjectAreas:
        type: object
        $ref: '#/definitions/SubjectAreaList'
      DocumentStatus:
        type: object
        $ref: '#/definitions/LearningStandardDocumentDocumentStatus'
      DocumentDate:
        type: string
        format: date
        description: >-
          <p>The date the current status was achieved.</p>
      LocalAdoptionDate:
        type: string
        format: date
        description: >-
          <p>The date the local organization adopted this standard document</p>
      LocalArchiveDate:
        type: string
        format: date
        description: >-
          <p>The date the local organization stopped using this standard document and superseded by a new document.</p>
      EndOfLifeDate:
        type: string
        format: date
        description: >-
          <p>This is the date that the governing organization retired this document. </p>
      Copyright:
        type: object
        description: >-
          <p>Copyright for document.</p>
        $ref: '#/definitions/Copyright'
      GradeLevels:
        type: object
        description: >-
          <p>SIF common GradeLevels element</p>
        $ref: '#/definitions/GradeLevels'
      RepositoryDate:
        type: string
        format: date
        description: >-
          <p>Date document data was added to the repository</p>
      LearningStandardItemRefId:
        type: object
        description: >-
          <p>Link to the first/top LearningStandardItem in the standard hierarchy</p>
        $ref: '#/definitions/IdRef'
      RelatedLearningStandards:
        type: object
        $ref: '#/definitions/LearningStandardDocumentRefIdList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> A curriculum standards document or the like published by a national, state, district, school site, professional association or other interested party. The LearningStandardDocument reflects an expectation of student work. </p>
  # //////////////////////////////// data object /////////////////////////////
  LearningStandardItemCollection:
    type: object
    properties:
      LearningStandardItem:
        type: array
        items:
          $ref: '#/definitions/LearningStandardItem'
  LearningStandardItem:
    required:
    - "GradeLevels"
    - "LearningStandardDocumentRefId"
    - "RefId"
    - "StandardHierarchyLevel"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>GUID assigned to each statement at each level within the document hierarchy</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      RefURI:
        type: string
        format: uri
        description: >-
          <p>A URI that establishes uniqueness of the object instance.</p>
      ShortName:
        type: string
        description: >-
          <p>A short name for the item.</p>
      ItemVersion:
        type: string
        description: >-
          <p>Identifies the version of the item that this object instance represents. Note that new versions of items must generate new RefIds and therefore a new object instance. This element is immutable in that once the object has been published with a value (other than blank) it must never be changed. </p>
      Description:
        type: string
        description: >-
          <p>A text description of the item.</p>
      StandardSettingBody:
        type: object
        description: >-
          <p>The name of the state or organization that authored and manages updates to the standards document (i.e., NCTM, Ohio Department of Education).</p>
        $ref: '#/definitions/StandardsSettingBody'
      StandardHierarchyLevel:
        type: object
        description: >-
          <p>Description of hierarchical level within standards tree.</p>
        $ref: '#/definitions/StandardHierarchyLevel'
      PredecessorItems:
        type: object
        description: >-
          <p>GUID assigned to the LearningStandardItem directly above it in the hierarchy tree. This is a repeatable element because a single granular item may relate to multiple parent levels of the hierarchy.</p>
        $ref: '#/definitions/LearningStandardItemRefIdList'
      StatementCodes:
        type: object
        description: >-
          <p>An alphanumeric Id code as defined by the organization to identify the statement.</p>
        $ref: '#/definitions/StatementCodeList'
      Statements:
        type: object
        description: >-
          <p>The text of the "standard," or "benchmark."</p>
        $ref: '#/definitions/StatementList'
      GradeLevels:
        type: object
        $ref: '#/definitions/GradeLevels'
      SubjectArea:
        type: object
        $ref: '#/definitions/SubjectArea'
      StandardIdentifier:
        type: object
        description: >-
          <p>This element describes the unique identifier for each LearningStandard.</p>
        $ref: '#/definitions/StandardIdentifier'
      LearningStandardDocumentRefId:
        type: object
        description: >-
          <p>The RefId of the item's parent LearningStandardDocument.</p>
        $ref: '#/definitions/IdRef'
      RelatedLearningStandardItems:
        type: object
        description: >-
          <p>Container for external relationships.</p>
        $ref: '#/definitions/RelatedLearningStandardItemRefIdList'
      Level4:
        type: string
        description: >-
          <p>This element has been deprecated as of version 2.6. Use of this element is not recommended. This is the second to most granular level of the learning or performance standard associated with the grade level.</p>
      Level5:
        type: string
        description: >-
          <p>This element has been deprecated as of version 2.6. Use of this element is not recommended. This is the most granular level of the learning or performance standard associated with the grade level.</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      This object contains information related to curriculum standards statements "standards" or "benchmarks" or the like within the document. This object primarily focuses upon state department curriculum standards, published curriculum standards and local education agency learning standards. Each LearningStandardItem reflects an individual standard statement and may occur at several levels within a hierarchially structured document.
  # //////////////////////////////// data object /////////////////////////////
  CurriculumStructureCollection:
    type: object
    properties:
      CurriculumStructure:
        type: array
        items:
          $ref: '#/definitions/CurriculumStructure'
  CurriculumStructure:
    required:
    - "CurriculumHierarchyLevel"
    - "RefId"
    - "Titles"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>GUID for this particular object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      Titles:
        type: object
        $ref: '#/definitions/TitleList'
      Description:
        type: string
        description: >-
          <p>Description of this curriculum object</p>
      SubjectArea:
        type: object
        $ref: '#/definitions/SubjectArea'
      CurriculumHierarchyLevel:
        type: object
        description: >-
          <p>Describes the position of this object in the curriculum hierarchy.</p>
        $ref: '#/definitions/CurriculumStructureCurriculumHierarchyLevel'
      PredecessorObjects:
        type: object
        description: >-
          <p> CurriculumStructure objects directly above this one in the hierarchy tree. These are repeatable because a single object can have multiple parent levels in the hierarcy. </p>
        $ref: '#/definitions/CurriculumStructureRefIdList'
      LearningObjectives:
        type: object
        description: >-
          <p> Learning objectives for this object. </p>
        $ref: '#/definitions/LearningObjectiveList'
      ComponentObjects:
        type: object
        description: >-
          <p> Component objects, if any, that make up this object. </p>
        $ref: '#/definitions/ComponentObjectList'
      LearningStandards:
        type: object
        description: >-
          <p> Associated learning standards. </p>
        $ref: '#/definitions/LearningStandardItemRefIdList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> An object designed to contain instructional objects such as units, lessons, activities, and assessments—or other containers—joined together under a particular topic and/or duration. </p>
  # //////////////////////////////// data object /////////////////////////////
  LessonCollection:
    type: object
    properties:
      Lesson:
        type: array
        items:
          $ref: '#/definitions/Lesson'
  Lesson:
    required:
    - "RefId"
    - "Title"
    type: object
    properties:
      RefId:
        type: object
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      SourceObjects:
        type: object
        description: >-
          <p>Reference to the source objects.</p>
        $ref: '#/definitions/SourceObjectList'
      CurriculumStructures:
        type: object
        description: >-
          <p>GUID references to the parent CurriculumStructure object of this Lesson.</p>
        $ref: '#/definitions/CurriculumStructuresRefIdList'
      SubjectArea:
        type: object
        $ref: '#/definitions/SubjectArea'
      Title:
        type: string
        description: >-
          <p>Name of lesson.</p>
      Duration:
        type: object
        description: >-
          <p>Desired duration of the lesson</p>
        $ref: '#/definitions/Duration'
      Description:
        type: string
        description: >-
          <p>Description of the lesson plan.</p>
      Procedure:
        type: string
        description: >-
          <p>Text field to describe how to use and implement the lesson.</p>
      Strategies:
        type: object
        description: >-
          <p>Teaching strategies used in this lesson plan.</p>
        $ref: '#/definitions/LessonStrategyList'
      LearningObjectives:
        type: object
        description: >-
          <p>Description of learning objective(s) for this lesson, i.e., "Student will be able to use Pythagorean Theorem."—equates to 'benchmark' or 'goal' or other terminology</p>
        $ref: '#/definitions/LearningObjectiveList'
      SupportingActivities:
        type: object
        description: >-
          <p>Links to Activity objects that may support the lesson</p>
        $ref: '#/definitions/ActivityRefIdList'
      LearningStandards:
        type: object
        description: >-
          <p>Link to associated LearningStandardItems. This allows for a single Lesson to be aligned to multiple standard statements.</p>
        $ref: '#/definitions/LearningStandardItemRefIdList'
      LearningResources:
        type: object
        description: >-
          <p>Links to aligned LearningResource objects.</p>
        $ref: '#/definitions/LearningResourceRefIdList'
      LessonSources:
        type: object
        description: >-
          <p>One or more sources for the lesson. This describes the lesson's origin.</p>
        $ref: '#/definitions/LessonSourceList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> A series of Activities and LearningResources tied together under a particular topic or period of time to deliver a particular educational concept or skill. </p>
  # //////////////////////////////// data object /////////////////////////////
  ActivityCollection:
    type: object
    properties:
      Activity:
        type: array
        items:
          $ref: '#/definitions/Activity'
  Activity:
    required:
    - "ActivityTime"
    - "RefId"
    type: object
    properties:
      RefId:
        type: object
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      Title:
        type: string
        description: >-
          <p>Descriptive name of the activity.</p>
      Preamble:
        type: string
        description: >-
          <p>Description and context for the activity.</p>
      TechnicalRequirements:
        type: object
        description: >-
          <p>Operating system, network, and other technical requirements for the activity, if applicable.</p>
        $ref: '#/definitions/TechnicalRequirements'
      SoftwareRequirementList:
        type: object
        description: >-
          <p>Contains information about required software.</p>
        $ref: '#/definitions/SoftwareRequirementList'
      EssentialMaterials:
        type: object
        description: >-
          <p>Essential materials required to engage in this activity.</p>
        $ref: '#/definitions/EssentialMaterialList'
      LearningObjectives:
        type: object
        description: >-
          <p>Educational objectives of the activity.</p>
        $ref: '#/definitions/LearningObjectiveList'
      LearningStandards:
        type: object
        description: >-
          <p> Associated <code>LearningStandardItem</code> objects. </p>
        $ref: '#/definitions/LearningStandardItemRefIdList'
      SubjectArea:
        type: object
        $ref: '#/definitions/SubjectArea'
      Prerequisites:
        type: object
        description: >-
          <p> Skills or competencies the student must have to engage in activity. </p>
        $ref: '#/definitions/PrerequisiteList'
      Students:
        type: object
        description: >-
          <p> Links to any students or group or category of students that this activity is for. </p>
        $ref: '#/definitions/StudentPersonalRefIdList'
      SourceObjects:
        type: object
        description: >-
          <p> Source objects assigned to students. </p>
        $ref: '#/definitions/SourceObjectList'
      Points:
        type: integer
        description: >-
          <p>Number of possible points for an activity.</p>
      ActivityTime:
        type: object
        description: >-
          <p>Time structures for the activity.</p>
        $ref: '#/definitions/ActivityTime'
      AssessmentRefId:
        type: object
        description: >-
          <p>Link to the SIF Assessment object containing the evaluation information for this activity.</p>
        $ref: '#/definitions/IdRef'
      MaxAttemptsAllowed:
        type: integer
        description: >-
          <p>How many tries allowed.</p>
      ActivityWeight:
        type: number
        description: >-
          <p>The percentage weight of the activity during the particular course or term.</p>
      Evaluation:
        type: object
        description: >-
          <p>Field for non-numeric types of grading and evaluation such as "narrative."</p>
        $ref: '#/definitions/ActivityEvaluation'
      LearningResources:
        type: object
        description: >-
          <p>Learning resources that support this activity.</p>
        $ref: '#/definitions/LearningResourceRefIdList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> The work assigned to students, an educational event planned by a teacher to deliver a particular educational concept or skill. </p>
  # //////////////////////////////// data object /////////////////////////////
  AssignmentCollection:
    type: object
    properties:
      Assignment:
        type: array
        items:
          $ref: '#/definitions/Assignment'
  Assignment:
    required:
    - "AssignmentTime"
    - "RefId"
    - "Students"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>GUID assigned to assignment.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      Students:
        type: object
        description: >-
          <p>Students given this assignment.</p>
        $ref: '#/definitions/StudentPersonalRefIdList'
      StaffPersonalRefId:
        type: object
        description: >-
          <p>GUID assigned to the educator who gave the assignment.</p>
        $ref: '#/definitions/IdRef'
      TechnicalRequirements:
        type: object
        description: >-
          <p>Operating system, network, and other technical requirements for the activity, if applicable.</p>
        $ref: '#/definitions/TechnicalRequirements'
      SoftwareRequirementList:
        type: object
        description: >-
          <p>Contains information about required software.</p>
        $ref: '#/definitions/SoftwareRequirementList'
      EssentialMaterials:
        type: object
        description: >-
          <p>Essential materials required to engage in the assignment.</p>
        $ref: '#/definitions/EssentialMaterialList'
      Title:
        type: string
        description: >-
          <p>Descriptive name of the assignment.</p>
      Preamble:
        type: string
        description: >-
          <p>Description and context for the assignment.</p>
      LearningObjectives:
        type: object
        description: >-
          <p>Educational objectives of the assignment.</p>
        $ref: '#/definitions/LearningObjectiveList'
      LearningStandards:
        type: object
        description: >-
          <p> Associated <code>LearningStandardItem</code> objects. </p>
        $ref: '#/definitions/LearningStandardItemRefIdList'
      Prerequisites:
        type: object
        description: >-
          <p>Skills or competencies the student must have to engage in assignment.</p>
        $ref: '#/definitions/PrerequisiteList'
      SourceObjects:
        type: object
        description: >-
          <p>Source objects assigned to students.</p>
        $ref: '#/definitions/SourceObjectList'
      AssignmentTime:
        type: object
        description: >-
          <p>Time structures for the assignment.</p>
        $ref: '#/definitions/AssignmentTime'
      MaxAttemptsAllowed:
        type: integer
        description: >-
          <p>The number attempts a student may make on this assignment. Assumed to be unlimited if omitted.</p>
      AddToGradeBookFlag:
        type: boolean
        description: >-
          <p>Flag to prompt grade book processing.</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> The work assigned to a student, which can comprise of learning resources, activities, and assessments. It must have a student and a time attached to it. </p>
  # //////////////////////////////// data object /////////////////////////////
  LearningResourceCollection:
    type: object
    properties:
      LearningResource:
        type: array
        items:
          $ref: '#/definitions/LearningResource'
  LearningResource:
    required:
    - "Components"
    - "Name"
    - "RefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>GUID assigned to this LearningResource.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      Name:
        type: string
        description: >-
          <p>Name of learning resource.</p>
      Author:
        type: string
        description: >-
          <p>Name of organization or company that created the resource.</p>
      Contacts:
        type: object
        description: >-
          <p>Contains contact information about resource authors.</p>
        $ref: '#/definitions/LearningResourceContactList'
      Location:
        type: object
        description: >-
          <p>Description of location of resource, i.e. location in library or URL, community resource, outside resource supplier.</p>
        $ref: '#/definitions/LearningResourceLocation'
      Status:
        type: string
        description: >-
          <p>Describes availability status of resource, e.g. "checked out."</p>
      Description:
        type: string
        description: >-
          <p>Description of the resource, e.g., "This textbook is intended for grade 4 social studies students and addresses..."</p>
      GradeLevels:
        type: object
        $ref: '#/definitions/GradeLevels'
      SubjectAreas:
        type: object
        $ref: '#/definitions/SubjectAreaList'
      MediaTypes:
        type: object
        description: >-
          <p> Resource media types. </p>
        $ref: '#/definitions/MediaTypeList'
      UseAgreement:
        type: string
        description: >-
          <p>Describes terms of use for resource.</p>
      AgreementDate:
        type: string
        format: date
        description: >-
          <p>A date that defines the date of agreement.</p>
      Approvals:
        type: object
        description: >-
          <p>Authorizations to use this resource. For example, this resource may be included as part of the district's standard curriculum model.</p>
        $ref: '#/definitions/ApprovalList'
      Evaluations:
        type: object
        description: >-
          <p>Evaluations/review of the resource.</p>
        $ref: '#/definitions/LearningResourceEvaluationList'
      Components:
        type: object
        description: >-
          <p>Lesson or activity-sized portions of a resource.</p>
        $ref: '#/definitions/LearningResourceComponentList'
      LearningStandards:
        type: object
        description: >-
          <p>References to LearningStandardItems.</p>
        $ref: '#/definitions/LearningStandardItemRefIdList'
      LearningResourcePackageRefId:
        type: object
        description: >-
          <p> Reference to a <code>LearningResourcePackage</code>, a transport envelope for teaching and learning object files. </p>
        $ref: '#/definitions/IdRef'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> This object contains information related to learning resources that may be used in educational settings. These include textbooks, Internet content, educational software, videos and DVDs, supplemental print material, etc. </p>
  # //////////////////////////////// data object /////////////////////////////
  LearningResourcePackageCollection:
    type: object
    properties:
      LearningResourcePackage:
        type: array
        items:
          $ref: '#/definitions/LearningResourcePackage'
  LearningResourcePackage:
    required:
    - "RefId"
    type: object
    description: >-
      A wrapper for any external learning content to be transmitted across a SIF Zone.
#   allOfA:
    $ref: '#/definitions/AbstractContentPackage'
  # //////////////////////////////// data object /////////////////////////////
  ContentCatalogCollection:
    type: object
    properties:
      ContentCatalog:
        type: array
        items:
          $ref: '#/definitions/ContentCatalog'
  ContentCatalog:
    required:
    - "ContentObject"
    - "RefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>A GUID that identifies an instance of this object. This RefId is a “transient” value; that is, it SHOULD be generated by the provider at the time the object is provided in a Response message. This value MUST NOT be used in a later Request for the object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      ContentObject:
        type: object
        description: >-
          <p>The learning object. </p>
        $ref: '#/definitions/ContentObject'
      Status:
        type: string
        description: >-
          <p>Describes availability status of resource, e.g. "checked out."</p>
      Title:
        type: string
        description: >-
          <p>Title of the resource, e.g., "The Civil War …"</p>
      Description:
        type: string
        description: >-
          <p>Description of the resource, e.g., "This textbook is intended for grade 4 social studies students and addresses..."</p>
      Author:
        type: string
        description: >-
          <p>Name of individual, organization or company that created the resource</p>
      LanguageCode:
        type: string
        description: >-
          <p>The language used by the content to communicate to the Student</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      GradeLevels:
        type: object
        description: >-
          <p>A common element used to specify the collection of grade levels supported.</p>
        $ref: '#/definitions/GradeLevels'
      SubjectAreas:
        type: object
        description: >-
          <p>A list of subject areas.</p>
        $ref: '#/definitions/SubjectAreaList'
      MediaTypes:
        type: object
        description: >-
          <p>Resource media types</p>
        $ref: '#/definitions/MediaTypeList'
      LearningStandards:
        type: object
        description: >-
          <p>This element contains information related to curriculum standards statements "standards" or "benchmarks" or the like within the document.</p>
        $ref: '#/definitions/LearningStandardList'
      InstructionalLevel:
        type: object
        $ref: '#/definitions/ContentCatalogInstructionalLevel'
      TechnicalRequirements:
        type: object
        description: >-
          <p>Operating system, network, and other technical requirements for the activity, if applicable.</p>
        $ref: '#/definitions/TechnicalRequirements'
      Duration:
        type: object
        description: >-
          <p>Time required to complete the activity.</p>
        $ref: '#/definitions/Duration'
      CurriculumHierarchyList:
        type: object
        $ref: '#/definitions/CurriculumHierarchyList'
      Prerequisites:
        type: object
        description: >-
          <p>Skills or competencies the student must have to engage in activity.</p>
        $ref: '#/definitions/PrerequisiteList'
      Adaptations:
        type: string
        description: >-
          <p>Adaptations necessary for target students (508)</p>
      Size:
        type: string
        description: >-
          <p>The size of the learning content objects.</p>
      Cost:
        type: object
        description: >-
          <p>The price of the object requested</p>
        $ref: '#/definitions/MonetaryAmount'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      This object contains information related to learning resources that can be searched for and retrieved from content repositories.
  # //////////////////////////////// data object /////////////////////////////
  PersonRoleAssociationCollection:
    type: object
    properties:
      PersonRoleAssociation:
        type: array
        items:
          $ref: '#/definitions/PersonRoleAssociation'
  PersonRoleAssociation:
    required:
    - "AssociatedRoleRefId"
    - "AuthoritativeSource"
    - "EntryDate"
    - "ExitDate"
    - "PersonRefId"
    - "RefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The RefId of the PersonRoleAssociation object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      PersonRefId:
        type: object
        description: >-
          <p>The GUID of the person.</p>
        $ref: '#/definitions/IdRef'
      AssociatedRoleRefId:
        type: object
        description: >-
          <p>The RefId of the *Personal SIF_Object representing this Person's role .</p>
        $ref: '#/definitions/AssociatedRoleRefId'
      EntryDate:
        type: string
        format: date
        description: >-
          <p>Effective start date of the association.</p>
      ExitDate:
        type: string
        format: date
        description: >-
          <p>Effective end date of the association.</p>
      AuthoritativeSource:
        type: string
        description: >-
          <p>Body or organization creating this association.</p>
      Creator:
        type: object
        description: >-
          <p>Name of the Creator of this association.</p>
        $ref: '#/definitions/TypedCreator2'
      CreationDate:
        type: string
        format: date
        description: >-
          <p>Creation date of the relationship.</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object contains personal information about individuals to allow them to be tracked and information collected in role specific objects (e.g., StudentPersonal and StaffPersonal) to be related. In a future major release, the architecture may allow this to be streamlined..</p>
  # //////////////////////////////// data object /////////////////////////////
  ResponseToInterventionCollection:
    type: object
    properties:
      ResponseToIntervention:
        type: array
        items:
          $ref: '#/definitions/ResponseToIntervention'
  ResponseToIntervention:
    required:
    - "Interventions"
    - "RefId"
    - "SchoolInfoRefId"
    - "StaffPersonalRefId"
    - "StudentPersonalRefId"
    - "StudentPlacementRefId"
    - "SubjectArea"
    - "Tier"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies a particular Response to Intervention.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      StudentPersonalRefId:
        type: object
        description: >-
          <p>The Id (GUID) of the student to whom this intervention is being administered.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SchoolInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) of the school to which this intervention applies.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      StaffPersonalRefId:
        type: object
        description: >-
          <p>The Id (GUID) of the staff member who is administering this intervention.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      StudentPlacementRefId:
        type: object
        description: >-
          <p>The Id (GUID) that references the StudentPlacement Object that contains information that describes a specific instructional, related or transitional service that has been prescribed or recommended in the program plan developed for a student who has been placed in an individualized special program.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      RTILocalId:
        type: object
        description: >-
          <p>A local ID that may be used to identify this intervention for the student.</p>
        $ref: '#/definitions/LocalId'
      LocationWhereInterventionDelivered:
        type: string
        description: >-
          <p>This is where the actual intervention would take place. For example, if at a tutoring provider, then the tutoring organization would be named.</p>
      InterventionProviderNames:
        type: object
        description: >-
          <p>A list of persons providing the intervention.</p>
        $ref: '#/definitions/InterventionProviderNameList'
      Tier:
        type: number
        description: >-
          <p>The specific tier of intervention.</p>
      Interventions:
        type: object
        description: >-
          <p>The list of interventions applied here.</p>
        $ref: '#/definitions/InterventionList'
      SubjectArea:
        type: object
        description: >-
          <p>The subject for which this intervention is intended.</p>
        $ref: '#/definitions/SubjectArea'
      LearningStandardItems:
        type: object
        description: >-
          <p>List of LearningStandardItems.</p>
        $ref: '#/definitions/LearningStandardItemRefIdList'
      LearningObjectives:
        type: object
        description: >-
          <p>The specific learning objective(s) being addressed by this intervention.</p>
        $ref: '#/definitions/LearningObjectiveList'
      Measurements:
        type: object
        $ref: '#/definitions/ResponseToInterventionMeasurementList'
      Baselines:
        type: object
        description: >-
          <p>List of pre-assessment data used to evaluate the student on the learning objective.</p>
        $ref: '#/definitions/BaselineList'
      Targets:
        type: object
        description: >-
          <p>List of specific end aims.</p>
        $ref: '#/definitions/TargetList'
      EntryDate:
        type: string
        format: date
        description: >-
          <p>When the intervention begins.</p>
      ProjectedExitDate:
        type: string
        format: date
        description: >-
          <p>When the intervention is anticipated to end.</p>
      ExitDate:
        type: string
        format: date
        description: >-
          <p>Date of when the intervention actually ended.</p>
      FrequencyTime:
        type: object
        description: >-
          <p>The frequency of the intervention.</p>
        $ref: '#/definitions/InterventionFrequencyTime'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> Response to Intervention (RTI) is a multi-tier approach to the early identification and assistance of students who are having learning and/or behavioral needs. The process includes intervention, frequent progress measurement, and research-based instructional interventions for students. This object represents the information that describes the Response to Intervention. Multiple ResponsetoIntervention objects may be created for an individual student. </p>
  # //////////////////////////////// data object /////////////////////////////
  RTIResultsCollection:
    type: object
    properties:
      RTIResults:
        type: array
        items:
          $ref: '#/definitions/RTIResults'
  RTIResults:
    required:
    - "RefId"
    - "ResponseToInterventionRefId"
    - "StudentPersonalRefId"
    - "StudentPlacementRefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies the results of a particular Response to Intervention.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      StudentPersonalRefId:
        type: object
        description: >-
          <p>The Id (GUID) of the student being administered the intervention..</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      StudentPlacementRefId:
        type: object
        description: >-
          <p>The Id (GUID) that references the StudentPlacement Object that contains information that describes a specific instructional, related or transitional service that has been prescribed or recommended in the program plan developed for a student who has been placed in an individualized special program.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      ResponseToInterventionRefId:
        type: object
        description: >-
          <p>The Id (GUID) of the reference to the ResponseToIntervention that has been assigned for this individual learner.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      RTILocalId:
        type: object
        description: >-
          <p>A local ID that may be used to identify this intervention for the student.</p>
        $ref: '#/definitions/LocalId'
      Intervention:
        type: string
        description: >-
          <p>Naming of the intervention.</p>
      PerformanceIndicators:
        type: object
        description: >-
          <p>The specific measurement goals at the end of the intervention that each student should reach.</p>
        $ref: '#/definitions/PerformanceIndicatorList'
      Measurements:
        type: object
        description: >-
          <p>The specific measurement goals at the end of the intervention that each student should reach.</p>
        $ref: '#/definitions/ResponseToInterventionMeasurementList'
      Baselines:
        type: object
        description: >-
          <p>List of pre-assessment data used to evaluate the student on the learning objective.</p>
        $ref: '#/definitions/BaselineList'
      Targets:
        type: object
        description: >-
          <p>List of specific end aims.</p>
        $ref: '#/definitions/TargetList'
      Results:
        type: object
        $ref: '#/definitions/ResultList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>Response to Intervention (RTI) is a multi-tier approach to the early identification and assistance of students who are having learning and/or behavioral needs. This object records the individual learner information for an assigned ResponseToIntervention.</p>
  # //////////////////////////////// data object /////////////////////////////
  LearningStandardAssociationCollection:
    type: object
    properties:
      LearningStandardAssociation:
        type: array
        items:
          $ref: '#/definitions/LearningStandardAssociation'
  LearningStandardAssociation:
    required:
    - "AuthoritativeSource"
    - "Creator"
    - "LearningStandardRefId"
    - "ObjectType"
    - "RefId"
    - "StartDate"
    - "TargetObjects"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies this LearningStandardAssociation.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      RefURI:
        type: string
        format: uri
        description: >-
          <p>A URI that establishes uniqueness.</p>
      LearningStandardRefId:
        type: object
        description: >-
          A RefId that identifies a Learning Standard.
        $ref: '#/definitions/IdRef'
      ObjectType:
        description: >-
          <p>Declares whether the this RefId references a LearningStandardItem or a LearningStandardDocument</p>
        oneOf:
        - const: "LearningStandardItem"
          title: LearningStandardItem
        - const: "LearningStandardDocument"
          title: LearningStandardDocument
        xml:
          attribute: true
      TargetObjects:
        type: object
        description: >-
          List of target objects for the learning standard linkage.
        $ref: '#/definitions/TargetObjectList'
      StartDate:
        type: string
        format: date
        description: >-
          Start date of the learning standard association.
      EndDate:
        type: string
        format: date
        description: >-
          End date of the learning standard association.
      AuthoritativeSource:
        type: string
        description: >-
          Body or organization creating this association.
      Creator:
        type: object
        description: >-
          Name of the Creator of the relationship.
        $ref: '#/definitions/TypedCreator'
      CreationDate:
        type: string
        format: date
        description: >-
          Creation date of the relationship.
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      This object associates learning standards with particular learning resources.
  # //////////////////////////////// data object /////////////////////////////
  LibraryPatronStatusCollection:
    type: object
    properties:
      LibraryPatronStatus:
        type: array
        items:
          $ref: '#/definitions/LibraryPatronStatus'
  LibraryPatronStatus:
    required:
    - "ElectronicIdList"
    - "FineAmount"
    - "LibraryType"
    - "NumberOfCheckouts"
    - "NumberOfFines"
    - "NumberOfOverdues"
    - "RefId"
    - "SIF_RefId"
    - "SIF_RefObject"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>A GUID that identifies an instance of this object. This RefId is a “transient” value; that is, it SHOULD be generated by the provider at the time the object is provided in a Response message. This value MUST NOT be used in a later Request for the object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      LibraryType:
        type: string
        description: >-
          <p>A library-defined language-independent value that refers to a specific patron type.</p>
        xml:
          attribute: true
      SIF_RefId:
        type: object
        description: >-
          <p>The SIF wide unique identifier of a student or teacher.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SIF_RefObject:
        type: string
        description: >-
          <p>The type of patron mapped to a SIF supported object. Library automation products work with patrons who could be students or teachers.</p>
        xml:
          attribute: true
      SIF_RefObjectCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      ElectronicIdList:
        type: object
        description: >-
          <p>List of electronic identifiers associated with the patron.</p>
        $ref: '#/definitions/ElectronicIdList'
      TransactionList:
        type: object
        description: >-
          <p>List of transactions.</p>
        $ref: '#/definitions/LibraryTransactionList'
      MessageList:
        type: object
        description: >-
          <p>List of messages for/regarding the patron.</p>
        $ref: '#/definitions/LibraryMessageList'
      NumberOfCheckouts:
        type: integer
        description: >-
          <p>The total number of items that this patron currently has checked out including overdue items.</p>
      NumberOfOverdues:
        type: integer
        description: >-
          <p>The total number of checkouts that are currently overdue.</p>
      NumberOfFines:
        type: integer
        description: >-
          <p>The total number of fines currently assessed to this patron.</p>
      FineAmount:
        type: object
        description: >-
          <p>The total monetary amount of the fines that this patron currently owes the library expressed as a positive number.</p>
        $ref: '#/definitions/MonetaryAmount'
      NumberOfRefunds:
        type: integer
        description: >-
          <p>The total number of refunds currently credited to this patron.</p>
      RefundAmount:
        type: object
        description: >-
          <p>The total monetary amount of the refunds that the library currently owes the patron expressed as a positive number.</p>
        $ref: '#/definitions/MonetaryAmount'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object reports the current library status for the requested student or staff member.</p>
  # //////////////////////////////// data object /////////////////////////////
  AddressCollection:
    type: object
    properties:
      Address:
        type: array
        items:
          $ref: '#/definitions/Address'
  Address:
    required:
    - "City"
    - "RefId"
    - "Street"
    type: object
    properties:
      RefId:
        type: object
        $ref: '#/definitions/gRefId'
        xml:
          attribute: true
      GridLocation:
        type: object
        $ref: '#/definitions/GridLocation'
      AddressType:
        type: string
        description: >-
          <p>The type or category of this address. For example, mailing, physical, permanent, etc.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      LocalId:
        type: object
        $ref: '#/definitions/gLocalId'
      Street:
        type: object
        $ref: '#/definitions/gStreet'
      City:
        type: string
      Subregion:
        type: object
        $ref: '#/definitions/AddressSubregion'
      StateProvince:
        type: object
        $ref: '#/definitions/AddressStateProvince'
      Country:
        type: object
        $ref: '#/definitions/AddressCountry'
      PostalCode:
        type: string
        description: >-
          <p>A number that identifies each postal delivery area in a country used as a portion of an address</p>
    description: >-
      <p>This object contains address data.</p>
  # //////////////////////////////// data object /////////////////////////////
  StudentProgramAssociationCollection:
    type: object
    properties:
      StudentProgramAssociation:
        type: array
        items:
          $ref: '#/definitions/StudentProgramAssociation'
  StudentProgramAssociation:
    required:
    - "ProgramRefId"
    - "RefId"
    - "SchoolYear"
    - "StudentRefId"
    type: object
    properties:
      RefId:
        type: object
        $ref: '#/definitions/gRefId'
        xml:
          attribute: true
      StudentRefId:
        type: object
        description: >-
          <p>The Id (UUID) of the student to whom this information is linked.</p>
        $ref: '#/definitions/gRefIdPointer'
      ProgramRefId:
        type: object
        description: >-
          <p>The Id (GUID) of the program to which this enrollment applies.</p>
        $ref: '#/definitions/gRefIdPointer'
      SchoolYear:
        description: >-
          <p>School year for which this enrollment is applicable, expressed as the four-digit year in which the school year ends (e.g. 2007 for the 2006-07 school year). StudentSchoolEnrollment instances must not span multiple school years.</p>
      EntryDate:
        type: string
        format: date
        description: >-
          <p>The date from when this enrollment is valid.</p>
      EntryType:
        type: string
        description: >-
          <p>Code indicating the type of entry for this enrollment.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      YearGroup:
        type: object
        $ref: '#/definitions/StudentProgramAssociationYearGroup'
      ExitDate:
        type: string
        format: date
        description: >-
          <p>The last school calendar day of this enrollment. If the student has exited the school or the enrollment has a RecordClosureReason, ExitDate must have a value.</p>
      ExitStatus:
        type: object
        $ref: '#/definitions/StudentProgramAssociationExitStatus'
      ExitType:
        type: object
        $ref: '#/definitions/StudentProgramAssociationExitType'
      FTE:
        type: object
        description: >-
          <p>Full-time equivalent numeric value of the student's program load during this enrollment, expressed in decimal form, where 1.00 represents a full-time enrollment.</p>
        $ref: '#/definitions/gFractionDecimal'
      FTPTStatus:
        type: object
        description: >-
          <p>An indication of whether the student is enrolled full time or part time.</p>
        $ref: '#/definitions/gFullTimeStatus'
      PlacementType:
        type: object
        $ref: '#/definitions/StudentProgramAssociationPlacementType'
      ManagingSchoolLocalId:
        type: object
        description: >-
          <p>Managing school for this student in the program. Overrides the value in program object.</p>
        $ref: '#/definitions/gLocalId'
      ManagingSchoolRefId:
        type: object
        description: >-
          <p>SIF RefId for the managing school. Overrides the value in the program object.</p>
        $ref: '#/definitions/gRefIdPointer'
      FundingSourceList:
        type: object
        description: >-
          <p>Student-specific funding sources for the student in the program.</p>
        $ref: '#/definitions/fundingSource'
    description: >-
      <p>Links a student to participation in a program.</p>
  # //////////////////////////////// data object /////////////////////////////
  StudentActivityInfoCollection:
    type: object
    properties:
      StudentActivityInfo:
        type: array
        items:
          $ref: '#/definitions/StudentActivityInfo'
  StudentActivityInfo:
    required:
    - "RefId"
    - "StudentActivityType"
    - "Title"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies the instance of the object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      Title:
        type: string
        description: >-
          Name of the co-curricular or extra-curricular activity.
      Description:
        type: string
        description: >-
          The description of the co-curricular or extra-curricular activity.
      StudentActivityType:
        type: object
        description: >-
          Information regarding the co-curricular or extra-curricular activity.
        $ref: '#/definitions/StudentActivityType'
      StudentActivityLevel:
        type: string
        description: >-
          A description of the separation of level in the activity (e.g., <code>Varsity</code>, <code>Junior Varsity</code>, <code>Honors</code>).
      GradeLevels:
        type: object
        description: >-
          Collection of grade levels applicable to this co-curricular or extra-curricular activity.
        $ref: '#/definitions/GradeLevels'
      CurricularStatus:
        type: string
        description: >-
          An indication of the degree to which an activity is related to a student's curriculum.
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      Location:
        type: object
        description: >-
          Location where the activity takes place.
        $ref: '#/definitions/Location'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>Co-curricular or extra-curricular activities (e.g., student organizations, intramural and interscholastic athletes, publications, band, orchestra, and service activities) in which students may participate.</p>
  # //////////////////////////////// data object /////////////////////////////
  StudentActivityParticipationCollection:
    type: object
    properties:
      StudentActivityParticipation:
        type: array
        items:
          $ref: '#/definitions/StudentActivityParticipation'
  StudentActivityParticipation:
    required:
    - "RefId"
    - "SchoolYear"
    - "StudentActivityInfoRefId"
    - "StudentPersonalRefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>GUID that uniquely identifies this instance of the object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      StudentPersonalRefId:
        type: object
        description: >-
          GUID that identifies the student participating in the activity.
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      StudentActivityInfoRefId:
        type: object
        description: >-
          GUID that identifies the activity in which the student participates.
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SchoolYear:
        type: object
        description: >-
          School year for which the information is applicable, expressed as the four-digit year in which the school year ends (e.g. <code>2009</code> for the 2008-09 school year).
        $ref: '#/definitions/SchoolYear'
        xml:
          attribute: true
      ParticipationComment:
        type: string
        description: >-
          Comment related to the student's participation in the activity.
      StartDate:
        type: string
        format: date
        description: >-
          This is the date which the activity participation is valid (inclusive).
      EndDate:
        type: string
        format: date
        description: >-
          This is the date through which the activity participation is valid (inclusive). If element is supported by the publisher/responder, should contain a date if the student withdraws from the activity before the end of the school year.
      Role:
        type: string
        description: >-
          Specific role the student plays in the activity (e.g., band leader, student body president).
      RecognitionList:
        type: object
        description: >-
          List of awards and other types of recognition given to the student for this activity.
        $ref: '#/definitions/RecognitionList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>The co-curricular or extra-curricular activity in which the student participates.</p>
  # //////////////////////////////// data object /////////////////////////////
  DisciplineIncidentCollection:
    type: object
    properties:
      DisciplineIncident:
        type: array
        items:
          $ref: '#/definitions/DisciplineIncident'
  DisciplineIncident:
    required:
    - "AgencyReporting"
    - "IncidentCategory"
    - "IncidentDate"
    - "IncidentLocation"
    - "IncidentNumber"
    - "IncidentReporter"
    - "IncidentTime"
    - "OffenderList"
    - "RefId"
    - "SIF_RefObject"
    - "SchoolYear"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The unique identifier (GUID) of this discipline incident.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      SchoolYear:
        type: object
        description: >-
          <p>School year in which the incident occurred, and for which the information is applicable, expressed as the four-digit year in which the school year ends (e.g., "2007" for the 2006-07 school year).</p>
        $ref: '#/definitions/SchoolYear'
        xml:
          attribute: true
      AgencyReporting:
        type: object
        description: >-
          <p>The Id (GUID) of the school or LEA reporting the incident, usually the school in which the incident occurred.</p>
        $ref: '#/definitions/IdRef'
      SIF_RefObject:
        description: >-
          <p>The name of the SIF object to which the GUID relates.</p>
        oneOf:
        - const: "SchoolInfo"
          title: SchoolInfo
        - const: "LEAInfo"
          title: LEAInfo
        xml:
          attribute: true
      IncidentNumber:
        type: string
        description: >-
          <p>The locally-defined unique identifier (within the school or school district) to identify this specific incident or occurrence.</p>
      IncidentDate:
        type: string
        format: date
        description: >-
          <p>The date when the incident occurred.</p>
      IncidentTime:
        type: object
        description: >-
          <p>The time when the incident occurred.</p>
        $ref: '#/definitions/IncidentTime'
      IncidentLocation:
        type: object
        description: >-
          <p>The locally-defined identifier or description of the location where the incident occurred.</p>
        $ref: '#/definitions/IncidentLocation'
      IncidentLocationRefId:
        type: object
        $ref: '#/definitions/DisciplineIncidentIncidentLocationRefId'
      IncidentCost:
        type: string
        description: >-
          <p> If the incident resulted in a quantifiable monetary loss for any entity involved, identify and record the value of that loss. Cost may be reported by specific monetary amount or range. </p>
      IncidentReporter:
        type: object
        description: >-
          <p>Information regarding the individual who reported the incident.</p>
        $ref: '#/definitions/IncidentReporter'
      RelatedToList:
        type: object
        description: >-
          <p>List of categories to which the incident is related.</p>
        $ref: '#/definitions/RelatedToList'
      WeaponTypeList:
        type: object
        description: >-
          <p>List of weapons involved in the incident. If the incident involves weapons, the element must have a value.</p> <p>Each weapon used in the incident is identified by a WeaponType entry. When multiple weapons of a single type are used, each weapon has a separate entry in this list.</p> <p>Weapons used by individual offenders are also reported in WeaponTypeList entries associated to the offender.</p>
        $ref: '#/definitions/WeaponTypeList'
      IncidentCategory:
        type: object
        description: >-
          <p>The category or description for this incident.</p>
        $ref: '#/definitions/IncidentCategoryContainer'
      OffenderList:
        type: object
        description: >-
          <p>List of offenders.</p>
        $ref: '#/definitions/OffenderList'
      VictimList:
        type: object
        description: >-
          <p>List of victim(s) if the incident is directed toward specific persons or their property.</p>
        $ref: '#/definitions/VictimList'
      IncidentDescription:
        type: string
        description: >-
          <p>A long text description of full details and a report of what occurred.</p>
      IncidentActionList:
        type: object
        description: >-
          <p>List of actions taken on the incident, regardless of actions relating to individual offenders.</p>
        $ref: '#/definitions/IncidentActionList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object provides information on incidents involving violence, weapons, drugs, and other safety and discipline issues.</p>
  # //////////////////////////////// data object /////////////////////////////
  CalendarSummaryCollection:
    type: object
    properties:
      CalendarSummary:
        type: array
        items:
          $ref: '#/definitions/CalendarSummary'
  CalendarSummary:
    required:
    - "DaysInSession"
    - "LocalId"
    - "RefId"
    - "SchoolInfoRefId"
    - "SchoolYear"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The Id (GUID) of the calendar to which this information relates.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      SchoolInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) of the school for which this calendar information is being reported.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SchoolYear:
        type: object
        description: >-
          <p>School year for which the information is applicable, expressed as the four-digit year in which the school year ends (e.g., "2007" for the 2006-07 school year).</p>
        $ref: '#/definitions/SchoolYear'
        xml:
          attribute: true
      LocalId:
        type: object
        description: >-
          <p>The locally assigned identifier for this calendar.</p>
        $ref: '#/definitions/LocalId'
      Description:
        type: string
        description: >-
          <p>Textual description of the school calendar.</p>
      DaysInSession:
        type: integer
        description: >-
          <p>The total number of days that the school was or is anticipated to be in session during the school year. Also included are days on which the education institution facility is closed and the student body as a whole is engaged in planned activities off-campus under the guidance and direction of staff members.</p>
      StartDate:
        type: string
        format: date
        description: >-
          <p>The first calendar date, whether or not instruction was provided. If both CalendarSummary and CalendarDate objects are supported, StartDate must be the date of the first chronological instance of CalendarDate for the school's calendar.</p>
      EndDate:
        type: string
        format: date
        description: >-
          <p>The last calendar date, whether or not instruction was provided. If both CalendarSummary and CalendarDate objects are supported, EndDate must be the last chronological instance of CalendarDate for the school's calendar.</p>
      FirstInstructionDate:
        type: string
        format: date
        description: >-
          <p>The first day of student instruction.</p>
      LastInstructionDate:
        type: string
        format: date
        description: >-
          <p>The last day of student instruction (including days or times that students are present for purposes of testing and/or evaluation, but not including whole or part-days whose sole purposes is for distribution of report cards).</p>
      GraduationDate:
        type: object
        description: >-
          <p>Date of graduation ceremony.</p>
        $ref: '#/definitions/GraduationDate'
      InstructionalMinutes:
        type: integer
        description: >-
          <p>The total number of instructional minutes for this calendar for the school year.</p>
      MinutesPerDay:
        type: integer
        description: >-
          <p>The number of minutes in the day in which the school is normally in session.</p>
      GradeLevels:
        type: object
        description: >-
          <p>Collection of grade levels applicable to this school calendar.</p>
        $ref: '#/definitions/GradeLevels'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object provides a summary of a school's calendar information for a given school year. A school may have more than one calendar per school year (e.g., one calendar for Kindergarten students, one for special education students, one for seniors, or one for each calendar track), and each may have different days in session, start and end dates, minutes per day, instructional minutes, etc.</p>
  # //////////////////////////////// data object /////////////////////////////
  CalendarDateCollection:
    type: object
    properties:
      CalendarDate:
        type: array
        items:
          $ref: '#/definitions/CalendarDate'
  CalendarDate:
    required:
    - "CalendarDateType"
    - "CalendarSummaryRefId"
    - "Date"
    - "RefId"
    - "SchoolInfoRefId"
    - "SchoolYear"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>A GUID that identifies an instance of this object. This RefId is new for 2.7M and MUST be supported like other objects that have a RefId (i.e. it is the key for the object). The alternate keys MUST continue to be supported.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      Date:
        type: string
        format: date
        description: >-
          <p>A specific school day that occurs within the school year.</p>
        xml:
          attribute: true
      CalendarSummaryRefId:
        type: object
        description: >-
          <p>The Id (GUID) of the calendar summary in which this calendar date is.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SchoolInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) of the school for which this calendar information is being reported.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SchoolYear:
        type: object
        description: >-
          <p>School year for which the information is applicable, expressed as the four-digit year in which the school year ends (e.g., "2007" for the 2006-07 school year).</p>
        $ref: '#/definitions/SchoolYear'
        xml:
          attribute: true
      CalendarDateType:
        type: object
        description: >-
          <p>Calendar date type information.</p>
        $ref: '#/definitions/CalendarDateInfo'
      CalendarDateNumber:
        type: integer
        description: >-
          <p>Order in which the calendar date falls within the school calendar.</p>
      StudentAttendance:
        type: object
        description: >-
          <p>Information describing how the day relates to student attendance.</p>
        $ref: '#/definitions/AttendanceInfo'
      TeacherAttendance:
        type: object
        description: >-
          <p>Information describing how the day relates to teacher attendance.</p>
        $ref: '#/definitions/AttendanceInfo'
      AdministratorAttendance:
        type: object
        description: >-
          <p>Information describing how the day relates to administrator attendance.</p>
        $ref: '#/definitions/AttendanceInfo'
      BellScheduleDayList:
        type: object
        description: >-
          <p>A list of the bell schedules and the timetable day from that bell schedule to be used for the calendar date</p>
        $ref: '#/definitions/BellScheduleDayList'
      InstructionalDeliveryModeList:
        type: object
        description: >-
          <p>The various instructional delivery modes offered on this day.</p>
        $ref: '#/definitions/InstructionalDeliveryModeList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object defines information related to a school calendar day in a given school calendar year. If both CalendarDate and CalendarSummary objects are supported, there must be an instance of this object for each date between CalendarSummary StartDate and EndDate, inclusive.</p>
  # //////////////////////////////// data object /////////////////////////////
  StudentAttendanceSummaryCollection:
    type: object
    properties:
      StudentAttendanceSummary:
        type: array
        items:
          $ref: '#/definitions/StudentAttendanceSummary'
  StudentAttendanceSummary:
    required:
    - "DaysAttended"
    - "DaysInMembership"
    - "EndDate"
    - "EndDay"
    - "ExcusedAbsences"
    - "RefId"
    - "Resident"
    - "SchoolInfoRefId"
    - "SchoolYear"
    - "StartDate"
    - "StartDay"
    - "StudentPersonalRefId"
    - "UnexcusedAbsences"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>A GUID that identifies an instance of this object. This RefId is a “transient” value; that is, it SHOULD be generated by the provider at the time the object is provided in a Response message. This value MUST NOT be used in a later Request for the object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      StudentPersonalRefId:
        type: object
        description: >-
          <p>The Id (GUID) of the student for whom this attendance information is being reported.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SchoolInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) of the school for which this attendance information is being reported.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SchoolYear:
        type: object
        description: >-
          <p>School year for which the information is applicable.</p>
        $ref: '#/definitions/SchoolYear'
        xml:
          attribute: true
      StartDate:
        type: string
        format: date
        description: >-
          <p>The starting date on which the information in this object instance is applicable.</p>
      StartDay:
        type: integer
        description: >-
          <p>Number of the first school day to which this object instance applies.</p>
      EndDate:
        type: string
        format: date
        description: >-
          <p>The ending date on which the information in this object instance is applicable.</p>
      EndDay:
        type: integer
        description: >-
          <p>Number of the last school day to which this object instance applies.</p>
      Resident:
        type: string
        description: >-
          <p>An indication as to whether or not the student's legal residence was within the boundaries of the school during the time between the StartDate and EndDate, inclusive.</p> <p>Note: No SIF_Query SIF_Condition support is required for this element.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      FTE:
        type: number
        description: >-
          <p>Full time equivalent numeric value of the student's course load during the time between the StartDate and EndDate, inclusive. Expressed in decimal form, where 1.00 represents a full time enrollment.</p> <p> Deprecated in favor of using the StudentSchoolEnrollmentRefId element below. </p>
      DaysAttended:
        type: number
        description: >-
          <p>The number of days the student attended school when school was in session between the StartDate and EndDate, inclusive.</p> <p>Note: No SIF_Query SIF_Condition support is required for this element.</p>
      ExcusedAbsences:
        type: number
        description: >-
          <p>The number of days the student was absent from school with a valid excuse when school was in session between the StartDate and EndDate, inclusive.</p> <p>Note: No SIF_Query SIF_Condition support is required for this element.</p>
      UnexcusedAbsences:
        type: number
        description: >-
          <p>The number of days the student was absent from school without a valid excuse when school was in session between the StartDate and EndDate, inclusive.</p> <p>Note: No SIF_Query SIF_Condition support is required for this element.</p>
      DaysTardy:
        type: number
        description: >-
          <p>The number of days the student was tardy when school was in session between the StartDate and EndDate, inclusive.</p>
      DaysInMembership:
        type: number
        description: >-
          <p>The number of days the student was present plus the number of days the student was absent when school was in session during the period between the StartDate and EndDate, inclusive.</p> <p>Note: No SIF_Query SIF_Condition support is required for this element.</p>
      InstructionalDeliveryModeList:
        type: object
        description: >-
          <p>The various modalities of instruction employed, during the period being summarized.</p>
        $ref: '#/definitions/InstructionalDeliveryModeList'
      ExpectationsMets:
        type: number
        description: >-
          <p>The number of days the student met expectations to be considered fully present.</p>
      ExpectationsNotMets:
        type: number
        description: >-
          <p>The number of days the student did not met expectations to be considered fully present.</p>
      StudentSchoolEnrollmentRefId:
        type: object
        description: >-
          <p>RefId (GUID) of the StudentSchoolEnrollment object instance that corresponds to this object instance.</p>
        $ref: '#/definitions/IdRef'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object provides a summary of a student's daily attendance and membership information for a given school during the time period between the StartDate and EndDate, inclusive. As such, there may be multiple instances of this object for a student in a school over the course of a school year or reporting period.</p>
  # //////////////////////////////// data object /////////////////////////////
  AttendanceCodeInfoCollection:
    type: object
    properties:
      AttendanceCodeInfo:
        type: array
        items:
          $ref: '#/definitions/AttendanceCodeInfo'
  AttendanceCodeInfo:
    required:
    - "AttendanceCode"
    - "AttendanceStatus"
    - "AttendanceType"
    - "RefId"
    - "SchoolInfoRefId"
    - "UsedForDailyAttendance"
    - "UsedForPeriodAttendance"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies this AttendanceCodeInfo entity.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      SchoolInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) that identifies the school where the attendance code is used.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      AttendanceCode:
        type: string
        description: >-
          <p>Locally defined code for attendance.</p>
      AttendanceType:
        type: string
        description: >-
          <p>Type of attendance code.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      AttendanceStatus:
        type: object
        $ref: '#/definitions/AttendanceCodeInfoAttendanceStatus'
      Description:
        type: string
        description: >-
          <p>The text description of the attendance code.</p>
      AbsenceValue:
        type: number
        description: >-
          <p>The amount of absence represented by AttendanceCode, up to three decimal places.</p>
      UsedForDailyAttendance:
        type: object
        $ref: '#/definitions/AttendanceCodeInfoUsedForDailyAttendance'
      UsedForPeriodAttendance:
        type: object
        $ref: '#/definitions/AttendanceCodeInfoUsedForPeriodAttendance'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> This object provides information about a particular attendance code, allows applications to synchronize each other's attendance code tables, or provides a dynamic list of attendance codes. </p>
  # //////////////////////////////// data object /////////////////////////////
  RoomInfoCollection:
    type: object
    properties:
      RoomInfo:
        type: array
        items:
          $ref: '#/definitions/RoomInfo'
  RoomInfo:
    required:
    - "RefId"
    - "RoomNumber"
    - "SchoolInfoRefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>GUID that identifies this room.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      SchoolInfoRefId:
        type: object
        description: >-
          <p>GUID that identifies the school that this room belongs to.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      RoomNumber:
        type: string
        description: >-
          <p>Room number as presented to the user/application.</p>
      StaffList:
        type: object
        $ref: '#/definitions/StaffList'
      Description:
        type: string
        description: >-
          <p> Friendly name that can be assigned to the room (e.g. <code>Staff Cafeteria</code>). </p>
      Building:
        type: string
        description: >-
          <p>Extra building information. In the future Building could become its own object in which case this element will need to be changed to a RefId. Currently it is only required as a free text field.</p>
      HomeroomNumber:
        type: string
        description: >-
          <p>When a room is designated as a homeroom it may have a different number. Usually blank when room is not a homeroom.</p>
      Size:
        type: number
        description: >-
          <p>Size in square feet.</p>
      Capacity:
        type: integer
        description: >-
          <p>Number of persons (usually students) that this room can hold.</p>
      PhoneNumber:
        type: object
        description: >-
          <p>Phone number for the room</p>
        $ref: '#/definitions/PhoneNumber'
      RoomTypeRefId:
        type: object
        description: >-
          <p>GUID that identifies the room type assigned to this room.</p>
        $ref: '#/definitions/IdRef'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> This object contains all of the information about a school's room. This object may contain a reference to a room type so that it may represent anything from a gym, cafeteria, to a standard classroom. The StaffList element usually contains the homeroom teacher. </p>
  # //////////////////////////////// data object /////////////////////////////
  RoomTypeCollection:
    type: object
    properties:
      RoomType:
        type: array
        items:
          $ref: '#/definitions/RoomType'
  RoomType:
    required:
    - "Description"
    - "RefId"
    - "SchoolInfoRefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>GUID that identifies this room type.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      SchoolInfoRefId:
        type: object
        description: >-
          <p>GUID that identifies the school that this room type belongs to.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      Description:
        type: string
        description: >-
          <p>Description of the room type.</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object identifies the type of room, i.e. gym, cafeteria, standard classroom, etc.</p>
  # //////////////////////////////// data object /////////////////////////////
  SchoolCourseInfoCollection:
    type: object
    properties:
      SchoolCourseInfo:
        type: array
        items:
          $ref: '#/definitions/SchoolCourseInfo'
  SchoolCourseInfo:
    required:
    - "CourseCode"
    - "CourseTitle"
    - "RefId"
    - "SchoolInfoRefId"
    - "SchoolYear"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies the school course.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      SchoolInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) that identifies the school where the course is offered.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SchoolYear:
        type: object
        description: >-
          <p> School year for which the information is applicable, expressed as the four-digit year in which the school year ends (e.g. <code>2007</code> for the 2006-07 school year). </p>
        $ref: '#/definitions/SchoolYear'
        xml:
          attribute: true
      CourseCode:
        type: object
        description: >-
          <p>School-defined local code for the course.</p>
        $ref: '#/definitions/CourseCode'
      StateCourseCode:
        type: object
        description: >-
          <p>State-defined standard course code used to report information about courses.</p>
        $ref: '#/definitions/StateCourseCode'
      DistrictCourseCode:
        type: object
        description: >-
          <p>The corresponding district course code.</p>
        $ref: '#/definitions/DistrictCourseCode'
      SubjectAreaList:
        type: object
        description: >-
          <p>Subject matter areas.</p>
        $ref: '#/definitions/SubjectAreaList'
      CourseTitle:
        type: object
        description: >-
          <p>Title of the course.</p>
        $ref: '#/definitions/CourseTitle'
      Description:
        type: string
        description: >-
          <p>Textual description of the course.</p>
      InstructionalLevel:
        type: object
        description: >-
          <p>An indication of the general nature and difficulty of instruction provided.</p>
        $ref: '#/definitions/InstructionalLevel'
      CourseCredits:
        type: object
        description: >-
          <p>The number of credits awarded upon course completion.</p>
        $ref: '#/definitions/CourseCredits'
      CoreAcademicCourse:
        type: string
        description: >-
          <p>Does the course meet the state definition of a core academic course?</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      GraduationRequirement:
        type: object
        $ref: '#/definitions/SchoolCourseInfoGraduationRequirement'
      Department:
        type: string
        description: >-
          <p>Department with jurisdiction over this course.</p>
      SCEDCode:
        type: object
        description: >-
          <p>Course code from the School Codes for the Exchange of Data that describes the course content.</p> <p> NOTE: SCED codes currently only apply to secondary courses. This element may be sent with <code>xsi:nil="true"</code> or omitted for elementary courses. </p>
        $ref: '#/definitions/SCEDCode'
      DualCredit:
        type: object
        $ref: '#/definitions/SchoolCourseInfoDualCredit'
      CTEConcentrator:
        type: object
        $ref: '#/definitions/SchoolCourseInfoCTEConcentrator'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object is for course information.</p>
  # //////////////////////////////// data object /////////////////////////////
  SchoolInfoCollection:
    type: object
    properties:
      SchoolInfo:
        type: array
        items:
          $ref: '#/definitions/SchoolInfo'
  SchoolInfo:
    required:
    - "OperationalStatusDate"
    - "RefId"
    - "SIF_RefObject"
    - "SchoolName"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The GUID that identifies this school.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      LocalId:
        type: object
        description: >-
          <p>The locally-assigned identifier for this school.</p>
        $ref: '#/definitions/LocalId'
      StateProvinceId:
        type: object
        description: >-
          <p>The state-assigned identifier for this school.</p>
        $ref: '#/definitions/StateProvinceId'
      StateProvinceIdSystem:
        type: string
        description: >-
          <p>A coding scheme that is used for identification and record-keeping purposes by schools, social services, or other agencies to refer to an organization.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      NCESId:
        type: object
        description: >-
          <p>The NCES-assigned identifier for this school.</p>
        $ref: '#/definitions/NCESId'
      SchoolName:
        type: string
        description: >-
          <p>Name of school.</p>
      LEAInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) that references the school district of which this school is a member.</p>
        $ref: '#/definitions/IdRef'
      OtherLEA:
        type: object
        description: >-
          <p>The Id (GUID) of another related education agency, such as a regional service agency.</p>
        $ref: '#/definitions/IdRef'
      SIF_RefObject:
        description: >-
          <p>The name of the object reference.</p>
        oneOf:
        - const: "LEAInfo"
          title: LEAInfo
        xml:
          attribute: true
      SchoolType:
        type: object
        $ref: '#/definitions/SchoolInfoSchoolType'
      SchoolFocusList:
        type: object
        $ref: '#/definitions/SchoolFocusList'
      SchoolURL:
        type: object
        description: >-
          <p>URL for the school.</p>
        $ref: '#/definitions/SchoolURL'
      SchoolDesignationList:
        type: object
        description: >-
          <p>A list of designations of the kind of groups creating the school.</p>
        $ref: '#/definitions/SchoolDesignationList'
      PrincipalInfo:
        type: object
        description: >-
          <p>Information about the school's principal.</p>
        $ref: '#/definitions/PrincipalInfo'
      SchoolContactList:
        type: object
        $ref: '#/definitions/SchoolContactList'
      AddressList:
        type: object
        description: >-
          <p>The school's addresses.</p>
        $ref: '#/definitions/AddressList'
      AddressRefIdList:
        type: object
        description: >-
          <p>References to separate potentially reusable, shared, or pre-verified addresses.</p>
