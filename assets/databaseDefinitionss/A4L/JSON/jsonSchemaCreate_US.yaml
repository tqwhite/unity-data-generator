  # //////////////////////////////// data object /////////////////////////////
  SectionInfoCollection:
    type: object
    properties:
      SectionInfo:
        type: array
        items:
          $ref: '#/definitions/SectionInfo'
  SectionInfo:
    required:
    - "LocalId"
    - "RefId"
    - "ScheduleInfoList"
    - "SchoolCourseInfoRefId"
    - "SchoolYear"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies this section entity.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      SchoolCourseInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) that identifies the course being taught in this section.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SchoolYear:
        type: object
        description: >-
          <p> School year for which the information is applicable, expressed as the four-digit year in which the school year ends (e.g. <code>2007</code> for the 2006-07 school year). </p>
        $ref: '#/definitions/SchoolYear'
        xml:
          attribute: true
      LocalId:
        type: object
        description: >-
          <p>The locally-assigned identifier for this course section.</p>
        $ref: '#/definitions/LocalId'
      Description:
        type: string
        description: >-
          <p>Description of the course section.</p>
      ScheduleInfoList:
        type: object
        $ref: '#/definitions/ScheduleInfoList'
      MediumOfInstruction:
        type: object
        description: >-
          <p>Medium through which the student receives instructional communication from the teacher.</p> <p>Note: this element has been deprecated—use InstructionalDeliveryModeList.</p>
        $ref: '#/definitions/MediumOfInstruction'
      InstructionalDeliveryModeList:
        type: object
        description: >-
          <p>The various instructional delivery modes offered for this section.</p>
        $ref: '#/definitions/InstructionalDeliveryModeList'
      LanguageOfInstruction:
        type: object
        description: >-
          <p>Language in which the section is taught.</p>
        $ref: '#/definitions/LanguageOfInstruction'
      LocationOfInstruction:
        type: object
        description: >-
          <p>Description of the location in which the section is taught.</p>
        $ref: '#/definitions/LocationOfInstruction'
      SummerSchool:
        type: string
        description: >-
          <p>Is this a summer school assignment?</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      SchoolCourseInfoOverride:
        type: object
        description: >-
          <p>Optional overrides of the course information for this section.</p>
        $ref: '#/definitions/SchoolCourseInfoOverride'
      CourseSectionCode:
        type: string
        description: >-
          <p>A section code that is linked to a course. This should be a unique identifier within the school year and course (i.e. the class instance number for a course). For example, Algebra I: Section 23 is different from English II: Section 23. </p>
      SectionCode:
        type: string
        description: >-
          <p>A unique identifier of the section for the school year and across courses (i.e. unique across all courses). For example, Algebra I sections range from 00122 to 00140 and English II courses range from 00141 to 00152.</p>
      CountForAttendance:
        type: object
        $ref: '#/definitions/SectionInfoCountForAttendance'
      BellScheduleRefId:
        type: object
        description: >-
          <p>The GUID of the bell schedule used by this section.</p>
        $ref: '#/definitions/IdRef'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object provides information about the section—the specific time period a session of the course meets.</p>
  # //////////////////////////////// data object /////////////////////////////
