      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object contains information about a school district or other Local Educational Agency (LEA).</p>
  # //////////////////////////////// data object /////////////////////////////
  StaffAssignmentCollection:
    type: object
    properties:
      StaffAssignment:
        type: array
        items:
          $ref: '#/definitions/StaffAssignment'
  StaffAssignment:
    required:
    - "PrimaryAssignment"
    - "RefId"
    - "SchoolInfoRefId"
    - "SchoolYear"
    - "StaffPersonalRefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The GUID that uniquely identifies a particular staff assignment.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      SchoolInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) that identifies the school where the staff member is assigned.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SchoolYear:
        type: object
        description: >-
          <p> School year for which the information is applicable, expressed as the four-digit year in which the school year ends (e.g., <code>2007</code> for the 2006-07 school year). </p>
        $ref: '#/definitions/SchoolYear'
        xml:
          attribute: true
      StaffPersonalRefId:
        type: object
        description: >-
          <p>Id (GUID) of this staff member, as represented in the StaffPersonal object. </p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      Description:
        type: string
        description: >-
          <p>Short assignment description</p>
      PrimaryAssignment:
        type: string
        description: >-
          <p> Is this the staff member's primary assignment? Note: There must be one and only one instance of the object with a <code>Yes</code> value in this element per school year. </p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      JobStartDate:
        type: string
        format: date
        description: >-
          <p>This is the date from which the staff assignment is valid (inclusive).</p>
      JobEndDate:
        type: string
        format: date
        description: >-
          <p>This is the date through which the staff assignment is valid (inclusive).</p>
      JobFTE:
        type: number
        description: >-
          <p>Full-time job equivalent ratio for this assignment. (Format is x.xx; an employee who is full-time and who is 50% of their time on this assignment would be represented as 0.50)</p>
      JobFunction:
        type: object
        description: >-
          <p>The purpose of the activities as related to students</p>
        $ref: '#/definitions/JobFunction'
      TeachingAssignment:
        type: object
        description: >-
          <p>The teacher field taught by the individual</p>
        $ref: '#/definitions/TeachingAssignment'
      GradeLevels:
        type: object
        description: >-
          <p>An indication of the grade level(s) the individual is assigned</p>
        $ref: '#/definitions/GradeLevels'
      ItinerantTeacher:
        type: object
        $ref: '#/definitions/StaffAssignmentItinerantTeacher'
      InstructionalLevel:
        type: object
        description: >-
          <p>An indication of the general nature of instruction provided throughout a course.</p>
        $ref: '#/definitions/InstructionalLevel'
      TeacherInexperiencedStatus:
        type: object
        $ref: '#/definitions/TeacherInexperiencedStatus'
      TeacherOutOfFieldStatus:
        type: object
        $ref: '#/definitions/TeacherOutOfFieldStatus'
      EmployeePersonalRefId:
        type: object
        description: >-
          <p>A GUID referencing an EmployeePersonal object to be able to establish a link between HR employee objects and SIS staff objects.</p>
        $ref: '#/definitions/IdRef'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> This object defines information related to a staff member's assignment(s); commonly, this will be a school assignment. </p>
  # //////////////////////////////// data object /////////////////////////////
  BellScheduleCollection:
    type: object
    properties:
      BellSchedule:
        type: array
        items:
          $ref: '#/definitions/BellSchedule'
  BellSchedule:
    required:
    - "BellPeriodList"
    - "BellScheduleName"
    - "RefId"
    - "SchoolInfoRefId"
    - "SchoolYear"
    - "TimetableDayList"
    - "TimetablePeriodList"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          The Id (GUID) that uniquely identifies an instance of the object.
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      SchoolInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies the school to which this bell schedule information applies</p>
        $ref: '#/definitions/IdRef'
      SchoolYear:
        type: object
        description: >-
