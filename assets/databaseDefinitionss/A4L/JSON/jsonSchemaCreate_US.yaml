          <p>The subject area code (i.e., the first two digits of the course classification code).</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      OtherCodeList:
        type: object
        $ref: '#/definitions/OtherCodeList'

  # ////////////////////////////// another type ///////////////////////////////
  MsgId:
