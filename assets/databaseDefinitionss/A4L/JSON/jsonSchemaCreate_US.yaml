      StatePovertyDesignation:
        type: object
        $ref: '#/definitions/SchoolInfoStatePovertyDesignation'
      NationalSchoolLunchProgramStatus:
        type: object
        $ref: '#/definitions/SchoolInfoNationalSchoolLunchProgramStatus'
      SchoolCharter:
