  StudentRecordPackage:
    required:
    - "RefId"
    - "SIF_RefId"
    - "SIF_RefObject"
    type: object
    description: >-
      <p>Wraps content or a record not defined by SIF but that is part of a student's records.</p> <p> This object is designed to be a dual-purpose object. It can be linked to a <code>StudentRecordExchange</code> object for record exchange purposes. There may also be Zones where systems can provide this information for record exchange systems or general informational purposes, in which case the object can be linked directly to <code>StudentPersonal</code>. </p> <p> Note: With SIF Implementation Specification version 2.4 the choice element depicted in the diagram below has changed. In the XSD files, the choice element used to be rendered as a sequence of optional elements. Now, in the XSD files, the choice element is rendered as an xs:choice. This may cause problems with agents that treat the choice element as two optional elements rather than a choice of one and only one of the choices. </p>
