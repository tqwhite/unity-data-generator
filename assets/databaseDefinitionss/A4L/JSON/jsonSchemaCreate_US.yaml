          attribute: true
      SIF_RefId:
        type: object
        description: >-
          <p> The GUID of an associated object, either <code>StudentRecordExchange</code> or <code>StudentPersonal</code>. </p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      SIF_RefObject:
        type: string
        description: >-
          <p> The associated object type. </p>
        xml:
          attribute: true
