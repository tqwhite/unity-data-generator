      iepEligibility:
        type: object
        $ref: '#/definitions/iepEligibility'
      iepPlan:
        type: object
        $ref: '#/definitions/iepPlan'
    description: >-
      <p> Information to support Special Education students transferring into a new educational context. Specifically, this model supports these use cases: Use Case 1 (Day Zero): An administrator is able to quickly look at the incoming information to decide where to place the student on the first day. Use Case 2 (Ongoing IEP): A committee on the receiving school quickly understands the needs and services of a student in a way that allows it to take the actions necessary for the student to have the best outcome. Use Case 3 (State Reporting): Data analysts at the receiving school build a complete student profile supporting their reporting and resource management needs. </p> <p> Developed for A4L by TQ White II Central Minnesota Educational Research and Development Council tqwhite@erdc.k12.mn.us 10/17/17 Significant contributions by Jill Parkes, Quality Information Partners Megan Gangl, Central Minnesota Educational Research and Development Council John Lovell, Access 4 Learning Community </p>
