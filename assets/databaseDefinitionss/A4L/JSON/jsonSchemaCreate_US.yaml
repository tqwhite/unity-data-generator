        type: string
        format: date
        description: >-
          <p>The date this record was prepared.</p>
      StudentPersonalData:
        type: object
        description: >-
          <p>Collects elements of interest from StudentPersonal.</p>
        $ref: '#/definitions/StudentPersonalData'
