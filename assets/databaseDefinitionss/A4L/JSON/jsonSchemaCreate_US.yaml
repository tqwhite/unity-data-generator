        type: object
        $ref: '#/definitions/OtherCodeList'

  # ///////////////////////////////// list ////////////////////////////
  SpanGaps:
    description: >-
      A container element for holding multiple possible span gaps.
    type: object
    properties:
      SpanGap:
        type: array
        items:
          $ref: '#/definitions/SpanGap'

  # ///////////////////////////////// list ////////////////////////////
  TimeElements:
    type: object
    properties:
      TimeElement:
        type: array
        items:
          $ref: '#/definitions/TimeElement'

  # ////////////////////////////// default sequence ///////////////////////////////
  TimeElement:
    description: >-
      <p>A common metadata element designed to contain time data, both self-defined and by type.</p>
    type: object
    required:
    - "Code"
    - "IsCurrent"
    - "Name"
    - "Type"
    - "Value"
    properties:
      Type:
        type: string
        description: >-
          <p> This element is designed to contain the time period attached to an object. Very long periods (school year, quarter, etc.) and very small periods (second, millisecond, etc.) can be defined. This element provides a scoping description of the time metadata enclosed. </p> <p> Because the educational environment varies so greatly we are including here a suggested but not prescriptive list of values. Although there may be unique needs for values not covered here—and we may have missed a major one—a best practice would be to utilize the examples here to enhance interoperability. </p>
      Code:
        type: string
        description: >-
          This element provides a place for the application to send structured data (code values, unique identifier, timestamps). This code value can, depending upon the use case agreement between agents, be used to qualify the data in the <code>Value</code> element.
      Name:
        type: string
        description: >-
          Contains a human-readable description of the value in <code>Value</code>.
      Value:
        type: string
        description: >-
          Contains the human-readable value.
      StartDateTime:
        type: string
        format: date-time
      EndDateTime:
        type: string
        format: date-time
      SpanGaps:
        type: object
        description: >-
          A container element for holding multiple possible span gaps.
        $ref: '#/definitions/SpanGaps'
      IsCurrent:
        type: boolean
        description: >-
          This element allows for the system to tag an object as being explicitly current. Although the baseline assumption in SIF is that objects are always current (default value is typically <code>true</code>), there are use cases when that is not the case.

  # //////////////////////// xs:* with attrs /////////////////////////////////////
  BinaryData:
    type: object
    properties:
      value:
      - description: >-
          <p>Contains the base64Binary encoding of binary or text data not encoded in UTF-8.</p>
      MIMEType:
        type: string
        description: >-
          <p> MIME type to indicate the content type. </p>
        xml:
          attribute: true
      FileName:
        type: string
        description: >-
          <p> Optional file name to indicate the file from which the content originated, or to suggest a name to use when saving the content. </p>
        xml:
          attribute: true
      Description:
        type: string
        description: >-
