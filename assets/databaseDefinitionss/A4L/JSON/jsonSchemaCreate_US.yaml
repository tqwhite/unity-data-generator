definitions:
  # //////////////////////////////// data object /////////////////////////////
  SEAInfoCollection:
    type: object
    properties:
      SEAInfo:
        type: array
        items:
          $ref: '#/definitions/SEAInfo'
  SEAInfo:
    required:
    - "CSSOContact"
    - "RefId"
    - "SEAName"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The GUID of the SEA whose information this is.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      LocalId:
        type: object
        description: >-
          <p>The locally-assigned identifier for this SEA.</p>
        $ref: '#/definitions/LocalId'
      NCESId:
        type: object
        description: >-
          <p>The NCES-assigned identifier for this SEA.</p>
        $ref: '#/definitions/NCESId'
      SEAName:
        type: string
        description: >-
          <p>The full legally accepted name of the SEA.</p>
      SEAURL:
        type: string
        format: uri
        description: >-
          <p>URL for the SEA.</p>
      CSSOContact:
        type: object
        description: >-
          Chief State School Officer contact information.
        $ref: '#/definitions/ContactInfo'
      SEAContactList:
        type: object
        description: >-
          Information on contact persons for this SEA.
        $ref: '#/definitions/SEAContactList'
      PhoneNumberList:
        type: object
        description: >-
          The SEA's phone number(s).
        $ref: '#/definitions/PhoneNumberList'
      AddressList:
        type: object
        description: >-
          The SEA's address(es).
        $ref: '#/definitions/AddressList'
      OperationalStatus:
        type: object
        description: >-
          This element is deprecated as of SIF Data Model Implementation Specification v2.5. This element applies to LEAs but not to SEAs.
        $ref: '#/definitions/OperationalStatus'
      EDENInfo:
        type: object
        description: >-
          Container element for EDEN-specific information.
        $ref: '#/definitions/EDENInfo'
      CTEGraduationRateInclusion:
        type: string
        description: >-
          <p>An indication of how CTE concentrators are included in the state's computation of its graduation rate.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object is designed to facilitate the transfer of State Education Agency (SEA) directory information to the Department of Education (USED) through the Education Data Exchange Network (EDEN).</p>
  # //////////////////////////////// data object /////////////////////////////
  StudentLEARelationshipCollection:
    type: object
    properties:
      StudentLEARelationship:
        type: array
        items:
          $ref: '#/definitions/StudentLEARelationship'
  StudentLEARelationship:
    required:
    - "EntryDate"
    - "LEAInfoRefId"
    - "LEARelationshipType"
    - "MembershipType"
    - "RefId"
    - "SchoolYear"
    - "StudentPersonalRefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The unique identifier for a particular affiliation between a student and a LEA.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      StudentPersonalRefId:
        type: object
        description: >-
          <p> The SIF RefId of the <code>StudentPersonal</code> object to which this instance of <code>StudentLEARelationship</code> refers. </p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      LEAInfoRefId:
        type: object
        description: >-
          <p> The SIF RefId of the <code>LEAInfo</code> object to which this instance of <code>StudentLEARelationship</code> refers. </p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SchoolYear:
        type: object
        description: >-
          <p> Contains the SIF school year to which this instance of <code>StudentLEARelationship</code> applies. <code>StudentLEARelationship</code> must not span multiple school years. </p>
        $ref: '#/definitions/SchoolYear'
        xml:
          attribute: true
      MembershipType:
        type: string
        description: >-
          <p> The type of this affiliation as it relates to the LEA identified in <code>LEAInfoRefId</code>. </p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      LEARelationshipType:
        type: object
        description: >-
          <p>An instance of the OrganizationRelationshipType common element that describes the details of the student's affiliation with the LEA.</p>
        $ref: '#/definitions/OrganizationRelationship'
      EntryDate:
        type: string
        format: date
        description: >-
          <p>The date from when this affiliation is valid.</p>
      EntryType:
        type: object
        $ref: '#/definitions/StudentEntryType'
      ExitDate:
        type: string
        format: date
        description: >-
          <p>The last school calendar day (membership day) the student was affiliated with the LEA (inclusive).</p> <p> The conditional characteristic of this element is defined such that if the student has exited the LEA, then <code>ExitDate</code> must have a value. </p>
      ExitType:
        type: object
        $ref: '#/definitions/StudentExitType'
      ExitStatus:
        type: object
        $ref: '#/definitions/StudentExitStatus'
      NonResidentAttendReason:
        type: object
        $ref: '#/definitions/StudentLEARelationshipNonResidentAttendReason'
      GradeLevel:
        type: object
        description: >-
          <p>The grade or academic level of the student.</p>
        $ref: '#/definitions/GradeLevel'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> The purpose of the <code>StudentLEARelationship</code> object is to represent the current information available regarding a single student's relationship/affiliation to a single LEA for a specific school year as of the time a <code>SIF_Event</code> or <code>SIF_Response</code> is generated by the system of record. This object is not designed to operate on a historical/longitudinal basis in the default context. </p> <p><code>StudentLEARelationship</code> instances must not span multiple school years. </p> <p> Only one instance of the <code>StudentLEARelationship</code> object with <code>MembershipType=Home</code> may exist for a specific time interval between <code>EntryDate</code> and <code>ExitDate</code> (inclusive) for a given student, LEA, and school year. </p> <p> Multiple instances of the <code>StudentLEARelationship</code> object with <code>MembershipType=Concurrent</code> may exist for a specific time interval between <code>EntryDate</code> and <code>ExitDate</code> (inclusive) for a given student, LEA, and school year. </p> <p> Multiple instances of <code>StudentLEARelationship</code> will occur for specific or overlapping time intervals if a student has affiliations with multiple LEA's. This will most likely be detected during aggregate data collection from multiple LEA's. Since <code>StudentLEARelationship/@RefId</code> and <code>StudentLEARelationship/@StudentPersonalRefId</code> are zone-specific, external mechanisms (e.g. student locator) would be required to correlate multiple instances of a single student affiliating with multiple LEA's. </p>
  # //////////////////////////////// data object /////////////////////////////
  SEAAccountabilityCollection:
    type: object
    properties:
      SEAAccountability:
        type: array
        items:
          $ref: '#/definitions/SEAAccountability'
  SEAAccountability:
    required:
    - "RefId"
    - "SEAInfoRefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies the State Education Agency.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      SEAInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) that identifies the SEA where accountability is being tracked.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      HighSchoolGraduationRateIndicatorStatus:
        type: string
        description: >-
          <p>An indication of whether the school or district met the High School Graduation Rate requirement in accordance with state definition for the purposes of determining AYP.</p>
