        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object contains HR/payroll employee information used to define how to pay an employee per pay cycle.</p>
  # //////////////////////////////// data object /////////////////////////////
  LocationInfoCollection:
    type: object
    properties:
      LocationInfo:
        type: array
        items:
          $ref: '#/definitions/LocationInfo'
  LocationInfo:
    required:
    - "LocalId"
    - "LocationType"
    - "Name"
