        description: >-
          <p>A GUID that identifies an instance of this object. This RefId is new for 2.7M and MUST be supported like other objects that have a RefId (i.e. it is the key for the object). The alternate keys MUST continue to be supported.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      StudentPersonalRefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies the StudentPersonal object that this item refers to.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SectionInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies the SectionInfo object that this item refers to.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      TermInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) that identifies the marking period that the following marks are recorded in.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SchoolInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies the School that these Mark Values apply to.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      IsFinal:
        type: boolean
        description: >-
          <p>Indicates if the grades are "Final" from the perspective of the teacher or school. Does not mean that change events will not occur for this item.</p>
      MarkList:
        type: object
        description: >-
          <p>A list of marks received for this student in this section. For each Mark entry, at least one of the sub-elements must be specified.</p>
        $ref: '#/definitions/StudentSectionMarkList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object contains the marks entered for a student in a class section for a specific marking period.</p>
  # //////////////////////////////// data object /////////////////////////////
  GradingCategoryCollection:
    type: object
    properties:
      GradingCategory:
        type: array
        items:
          $ref: '#/definitions/GradingCategory'
  GradingCategory:
    required:
    - "Description"
    - "RefId"
    - "SchoolInfoRefId"
    - "SectionInfoRefId"
    - "TermInfoRefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>GUID that identifies a grading category.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      SectionInfoRefId:
        type: object
        description: >-
          <p>The GUID for the SectionInfo object that this category is used for grading in.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      TermInfoRefId:
        type: object
        description: >-
          <p>The GUID for the TermInfo object that defines the marking period that the category was created in.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SchoolInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies the School that these Mark Values apply to.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      Description:
        type: string
        description: >-
          <p>The name/short description of the category.</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object provides information about a particular grading category to provide grouping and type information for assignments.</p>
  # //////////////////////////////// data object /////////////////////////////
  GradingAssignmentCollection:
    type: object
    properties:
      GradingAssignment:
        type: array
        items:
          $ref: '#/definitions/GradingAssignment'
  GradingAssignment:
    required:
    - "Description"
    - "GradingCategoryRefId"
    - "PointsPossible"
    - "RefId"
    - "SchoolInfoRefId"
    - "SectionInfoRefId"
    - "TermInfoRefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>A GUID that identifies an instance of this object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      SectionInfoRefId:
        type: object
        description: >-
          <p>The GUID for the SectionInfo object.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      TermInfoRefId:
        type: object
        description: >-
          <p>The GUID for the TermInfo object that defines the marking period that the assignment was created in.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SchoolInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies the School that these Mark Values apply to.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      GradingCategoryRefId:
        type: object
        description: >-
          <p>The GUID for the GradingCategory that this assignment is part of.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      Description:
        type: string
        description: >-
          <p>The text-based description of the assignment.</p>
      PointsPossible:
        type: integer
        description: >-
          <p>The points possible on the assignment.</p>
      CreateDate:
        type: string
        format: date
        description: >-
          <p>Creation date of the assignment.</p>
      DueDate:
        type: string
        format: date
        description: >-
          <p>Date the assignment is due.</p>
      Weight:
        type: number
        description: >-
          <p>The weight of the assignment.</p>
      DetailedDescription:
        type: object
        description: >-
          <p> This element defines the assignment. If the <code>Type</code> attribute is <code>URL</code>, this is the location of the document that describes the assignment. If <code>Type</code> is <code>PDF</code>, this element will contain the Base64 encoding of the entire document. </p>
        $ref: '#/definitions/DocumentSource'
      LearningStandardItemList:
        type: object
        description: >-
          <p>References to LearningStandardItems or LearningStandardDocuments directly.</p>
        $ref: '#/definitions/LearningStandardItemList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object provides information about a particular assignment, allows applications to synchronize each other's assignment tables, gathers the definition for a GradingAssignmentScore object, etc.</p>
  # //////////////////////////////// data object /////////////////////////////
  GradingAssignmentScoreCollection:
    type: object
    properties:
      GradingAssignmentScore:
        type: array
        items:
          $ref: '#/definitions/GradingAssignmentScore'
  GradingAssignmentScore:
    required:
    - "GradingAssignmentRefId"
    - "RefId"
    - "SchoolInfoRefId"
    - "SectionInfoRefId"
    - "StudentPersonalRefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>A GUID that identifies an instance of this object. This RefId is new for 2.7M and MUST be supported like other objects that have a RefId (i.e. it is the key for the object). The alternate keys MUST continue to be supported.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      StudentPersonalRefId:
        type: object
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SectionInfoRefId:
        type: object
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SchoolInfoRefId:
        type: object
        description: >-
          <p>The GUID that specifies the school this score was recorded at.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      GradingAssignmentRefId:
        type: object
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      ScorePoints:
        type: integer
        description: >-
          <p>The score represented as points. Conditionally required that one or more of ScorePoints, ScorePointsFloat, ScorePercent, ScoreLetter or ScoreEmptyReason be present.</p>
      ScorePointsFloat:
        description: >-
          <p>The score represented as points and partial points. Conditionally required that one or more of ScorePoints, ScorePointsFloat, ScorePercent, ScoreLetter or ScoreEmptyReason be present.</p>
      ScorePercent:
        type: number
        description: >-
          <p>The score represented as a percent. Conditionally required that one or more of ScorePoints, ScorePointsFloat, ScorePercent, ScoreLetter or ScoreEmptyReason be present.</p>
      ScoreLetter:
        type: string
        description: >-
          <p>The score represented as a letter grade. Conditionally required that one or more of ScorePoints, ScorePointsFloat, ScorePercent, ScoreLetter or ScoreEmptyReason be present.</p>
      ScoreEmptyReason:
        type: string
        description: >-
          <p>Code that represents why the assignment is not scored using any of the other methods. Conditionally required that one or more of ScorePoints, ScorePointsFloat, ScorePercent, ScoreLetter or ScoreEmptyReason be present.</p>
      ScoreDescription:
        type: string
        description: >-
          <p>Text description of the score.</p>
      LearningStandardItemList:
        type: object
        description: >-
          <p>References to LearningStandardItems or LearningStandardDocuments directly.</p>
        $ref: '#/definitions/LearningStandardItemList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object provides score information about a particular assignment.</p>
  # //////////////////////////////// data object /////////////////////////////
  StudentPeriodAttendanceCollection:
    type: object
    properties:
      StudentPeriodAttendance:
        type: array
        items:
          $ref: '#/definitions/StudentPeriodAttendance'
  StudentPeriodAttendance:
    required:
    - "AttendanceCode"
    - "AuditInfo"
    - "Date"
    - "RefId"
    - "SchoolInfoRefId"
    - "SectionInfoRefId"
    - "StudentPersonalRefId"
    type: object
    properties:
      RefId:
        type: object
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      StudentPersonalRefId:
        type: object
        description: >-
          <p>The GUID of the student that this attendance applies to.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SectionInfoRefId:
        type: object
        description: >-
          <p>The GUID of the section that this attendance applies to.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SchoolInfoRefId:
        type: object
        description: >-
          <p>The school where the attendance was recorded. Somewhat redundant, needed for requests.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      Date:
        type: string
        format: date
        description: >-
          <p>The date of the attendance event.</p>
        xml:
          attribute: true
      TimetablePeriod:
        type: string
        description: >-
          <p>The period within which attendance is being reported, e.g. "4D". Conditional on the SectionInfo object having MeetingTime elements. If one or more are defined for the Section, this element is required.</p>
      TimeIn:
        description: >-
          <p>The time the student entered or returned to this class.</p>
      TimeOut:
        description: >-
          <p>The time the student left this class.</p>
      AttendanceCode:
        type: object
        description: >-
          <p>The local attendance code.</p>
        $ref: '#/definitions/AttendanceCode'
      AuditInfo:
        type: object
        description: >-
          <p>An audit trail to help determine who entered this attendance event and when.</p>
        $ref: '#/definitions/StudentAttendanceAuditInfo'
      AttendanceComment:
        type: string
        description: >-
          <p>This element contains the comments that are relevant to this attendance record.</p>
      InstructionalDeliveryMode:
        type: object
        description: >-
          <p>How instruction was delivered.</p>
        $ref: '#/definitions/InstructionalDeliveryMode'
      ExpectationsMet:
        type: boolean
        description: >-
          <p>If true, he student met the expectations required by the organization marking attendance to be considered fully present.</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> This object provides attendance for a student in the context of a SectionInfo object. This object is used by all agents in a zone that provide period attendance, but don't have the logic to determine whether or not they have sufficient rights to override attendance from another user or system. Agents that represent a system that can validate attendance based on, among other things, its source, should subscribe to StudentPeriodAttendance events to collect "suggested" attendance changes from the zone, and should then publish "accepted" attendance changes as OfficialStudentPeriodAttendance events. A rejected change would result in an event that reverts the system that generated the rejected event back to its previous state or to some other state that represents the correct "official" attendance. </p>
  # //////////////////////////////// data object /////////////////////////////
  OfficialStudentPeriodAttendanceCollection:
    type: object
    properties:
      OfficialStudentPeriodAttendance:
        type: array
        items:
          $ref: '#/definitions/OfficialStudentPeriodAttendance'
  OfficialStudentPeriodAttendance:
    type: object
    description: >-
      <p> This object provides attendance for a student in the context of a SectionInfo object. It is used to represent the final/official attendance that has been assigned to a student. Only one agent in a zone should generate events for this object. That agent is responsible for receiving and validating all StudentPeriodAttendance events and for generating a corresponding OfficialStudentPeriodAttendance event once any unofficial events have been processed. </p>
#   allOfA:
    $ref: '#/definitions/StudentPeriodAttendance'
  # //////////////////////////////// data object /////////////////////////////
  StudentGradeCollection:
    type: object
    properties:
      StudentGrade:
        type: array
        items:
          $ref: '#/definitions/StudentGrade'
  StudentGrade:
    required:
    - "Grade"
    - "RefId"
    - "SchoolInfoRefId"
    - "SchoolYear"
    - "SectionInfoRefId"
    - "StudentPersonalRefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p> The Id (GUID) that uniquely identifies this object. </p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      StudentPersonalRefId:
        type: object
        description: >-
          <p> The Id (GUID) that uniquely identifies the <code>StudentPersonal</code> object that this item refers to. </p>
        $ref: '#/definitions/IdRef'
      SectionInfoRefId:
        type: object
        description: >-
          <p> The Id (GUID) that uniquely identifies the <code>SectionInfo</code> object that this item refers to. </p>
        $ref: '#/definitions/IdRef'
      SchoolInfoRefId:
        type: object
        description: >-
          <p>The Id (GUID) that uniquely identifies the school that these values apply to.</p>
        $ref: '#/definitions/IdRef'
      SchoolYear:
        type: object
        description: >-
          <p> School year for which this information is applicable, expressed as the four-digit year in which the school year ends (e.g., <code>2008</code> for the 2007-08 school year). </p>
        $ref: '#/definitions/SchoolYear'
      Grade:
        type: object
        description: >-
          This is the one grade given for this student and section. At least one numeric, percentage or letter must be provided as defined in the fields below. If <code>Grade/Numeric</code> is entered, <code>Grade/OutOf</code>, <code>Grade/Low</code> and <code>Grade/High</code> must also be entered.
        $ref: '#/definitions/StudentGradeGrade'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object contains the final grade for a student in a section.</p>
  # //////////////////////////////// data object /////////////////////////////
  BillingCollection:
    type: object
    properties:
      Billing:
        type: array
        items:
          $ref: '#/definitions/Billing'
  Billing:
    required:
    - "BilledAmount"
    - "BilledEntity"
    - "BillingDate"
    - "RefId"
    - "SIF_RefObject"
    - "TransactionDescription"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>GUID for this transaction. The application that owns this object is responsible for generating this unique Id.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      BilledEntity:
        type: object
        description: >-
          <p>Id of the entity being billed for this billing activity (e.g., student, employee, organization).</p>
        $ref: '#/definitions/IdRef'
      SIF_RefObject:
        description: >-
          <p> SIF object referenced by <code>BilledEntity</code>. </p>
        oneOf:
        - const: "StudentPersonal"
          title: StudentPersonal
        - const: "StaffPersonal"
          title: StaffPersonal
        - const: "VendorInfo"
          title: VendorInfo
        - const: "Purchasing"
          title: Purchasing
        xml:
          attribute: true
      BillingDate:
        type: string
        format: date
        description: >-
          <p>Date of the transaction.</p>
      TransactionDescription:
        type: string
        description: >-
          <p>Description of the transaction.</p>
      BilledAmount:
        type: object
        description: >-
          <p>Amount to be billed.</p>
        $ref: '#/definitions/MonetaryAmount'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object contains an amount to be billed to an outside entity.</p>
  # //////////////////////////////// data object /////////////////////////////
  PaymentCollection:
    type: object
    properties:
      Payment:
        type: array
        items:
          $ref: '#/definitions/Payment'
  Payment:
    required:
    - "BillingRefId"
    - "ReceivedAmount"
    - "ReceivedDate"
    - "ReceivedTransactionId"
    - "RefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>GUID for this transaction. The application that owns this object is responsible for generating this unique Id.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      BillingRefId:
        type: object
        description: >-
          <p>A pointer back to the Billing object.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      ReceivedDate:
        type: string
        format: date
        description: >-
          <p>Date payment was received.</p>
      ReceivedAmount:
        type: object
        description: >-
          <p>Amount received.</p>
        $ref: '#/definitions/MonetaryAmount'
      ReceivedTransactionId:
        type: string
        description: >-
          <p>Memo transaction Id from other vendor software.</p>
      TransactionDescription:
        type: string
        description: >-
          <p>Description of the transaction.</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object complements the Billing object, and contains information about the payment of a Billing object.</p>
  # //////////////////////////////// data object /////////////////////////////
  EmployeeAssignmentCollection:
    type: object
    properties:
      EmployeeAssignment:
        type: array
        items:
          $ref: '#/definitions/EmployeeAssignment'
  EmployeeAssignment:
    required:
    - "Description"
    - "EmployeePersonalRefId"
    - "PrimaryAssignment"
    - "RefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The GUID that uniquely identifies a particular HR staff assignment.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      EmployeePersonalRefId:
        type: object
        description: >-
          <p>This GUID referencing the parent EmployeePersonal object</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      Description:
        type: string
        description: >-
          <p>Short assignment description</p>
      PrimaryAssignment:
        type: string
        description: >-
          <p> Is this the staff member's primary assignment? There must be one and only one instance of the object with <code>Yes</code> in this value per school year. </p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      LocationInfoRefId:
        type: object
        description: >-
          <p> This is an optional element so the placement of the employee within the agency can be tracked as needed. The GUID references the LocationInfo object. </p>
        $ref: '#/definitions/IdRef'
      JobStartDate:
        type: string
        format: date
        description: >-
          <p>This is the date from which the staff assignment is valid (inclusive).</p>
      JobEndDate:
        type: string
        format: date
        description: >-
          <p>This is the date through which the staff assignment is valid (inclusive). Present if the JobStartDate is entered and a JobEndDate is available.</p>
      JobFTE:
        type: number
        description: >-
          <p>Full-time job equivalent ratio for this assignment. (Format is x.xx; an employee who is full-time and who spends 50% of their time on this assignment would be represented as 0.50)</p>
      JobClassification:
        type: object
        description: >-
          <p>The specific group of duties or responsibilities of position.</p>
        $ref: '#/definitions/JobClassification'
      ProgramType:
        type: object
        description: >-
          <p>The type of instructional or non-instructional program.</p>
        $ref: '#/definitions/EmployeeAssignmentProgram'
      FundingSource:
        type: object
        description: >-
          <p>Provider of funds for the program or service.</p>
        $ref: '#/definitions/OldFundingSource'
      SpecialEducation:
        type: object
        description: >-
          <p>For tracking common special eduction effort.</p>
        $ref: '#/definitions/SpecialEduction'
      TeacherInexperiencedStatus:
        type: object
        $ref: '#/definitions/TeacherInexperiencedStatus'
      TeacherOutOfFieldStatus:
        type: object
        $ref: '#/definitions/TeacherOutOfFieldStatus'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> This object defines information related to an employee assignment as it pertains to the human resource needed to track employee assignment for employee reporting and financial funding tracking. The staff assignment record will hold more detail of the actual assignment. There are multiple records for each assignment and/or location. </p>
  # //////////////////////////////// data object /////////////////////////////
  EmployeeContractCollection:
    type: object
    properties:
      EmployeeContract:
        type: array
        items:
          $ref: '#/definitions/EmployeeContract'
  EmployeeContract:
    required:
    - "BaseSalary"
    - "ContractEndDate"
    - "ContractStartDate"
    - "EmployeePersonalRefId"
    - "RefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The GUID of the employee contract information.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      EmployeePersonalRefId:
        type: object
        description: >-
          <p>The GUID that refers to the EmployeePersonal object.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      BaseSalary:
        type: object
        description: >-
          <p>Base salary of employee for this contract</p>
        $ref: '#/definitions/MonetaryAmount'
      ContractStartDate:
        type: string
        format: date
        description: >-
          <p>Contractual start date.</p>
      ContractEndDate:
        type: string
        format: date
        description: >-
          <p>Contractual ending date.</p>
      ContractTerm:
        type: string
        description: >-
          <p>Contractual Term in school years</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      ContractDays:
        type: number
        description: >-
          <p>Number of days in service for contract total</p>
      AssignmentDays:
        type: number
        description: >-
          <p>Number of days per year employee is expected to work in this assignment</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object contains HR contract information related to employees.</p>
  # //////////////////////////////// data object /////////////////////////////
  EmploymentRecordCollection:
    type: object
    properties:
      EmploymentRecord:
        type: array
        items:
          $ref: '#/definitions/EmploymentRecord'
  EmploymentRecord:
    required:
    - "LEAInfoRefId"
    - "RefId"
    - "SIF_RefObject"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>A GUID that identifies an instance of this object. This RefId is new for 2.7M and MUST be supported like other objects that have a RefId (i.e. it is the key for the object). The alternate keys MUST continue to be supported.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      SIF_RefId:
        type: object
        description: >-
          <p>The GUID can either refer to the EmployeePersonal or StaffPersonal object.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      SIF_RefObject:
        type: string
        xml:
          attribute: true
      SIF_RefObjectCodeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      LEAInfoRefId:
        type: object
        description: >-
          <p> The GUID reference to the LEAInfo object representing the LEA that employs the staff member. </p>
        $ref: '#/definitions/IdRef'
      Active:
        type: boolean
        description: >-
          <p>Staff is currently active and/or employed.</p>
      FullTimeStatus:
        type: string
        description: >-
          <p>Full-time status of employee.</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      HireDate:
        type: string
        format: date
        description: >-
          <p>Date the employee was hired.</p>
      TerminationDate:
        type: string
        format: date
        description: >-
          <p>Date the employee resigned. Present if a HireDate is entered and a TerminationDate is available.</p>
      TotalYearsExperience:
        type: integer
        description: >-
          <p>Total number of years of prior experience.</p>
      PositionTitle:
        type: string
        description: >-
          <p>Employee's current position title.</p>
      PositionNumber:
        type: string
        description: >-
          <p>Employee's level or category assigned by employer.</p>
      SeniorityDate:
        type: string
        format: date
        description: >-
          <p>Date employee has seniority.</p>
      TenureDate:
        type: string
        format: date
        description: >-
          <p>Date employee is tenured.</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object contains a snapshot (view) of employment information for an employee.</p>
  # //////////////////////////////// data object /////////////////////////////
  EmployeePersonalCollection:
    type: object
    properties:
      EmployeePersonal:
        type: array
        items:
          $ref: '#/definitions/EmployeePersonal'
  EmployeePersonal:
    required:
    - "Name"
    - "RefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>The GUID that uniquely identifies this employee.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      StateProvinceId:
        type: object
        description: >-
          <p>The state-assigned identifier for this staff member.</p>
        $ref: '#/definitions/StateProvinceId'
      OtherIdList:
        type: object
        description: >-
          <p>List all "other" Ids associated with the employee.</p>
        $ref: '#/definitions/EmployeePersonalOtherIdList'
      Name:
        type: object
        description: >-
          <p>Name of employee.</p>
        $ref: '#/definitions/NameOfRecord'
      Demographics:
        type: object
        description: >-
          <p>This element contains information related to employee demographics.</p>
        $ref: '#/definitions/Demographics'
      AddressList:
        type: object
        description: >-
          <p>The employee's address(es).</p>
        $ref: '#/definitions/AddressList'
      PhoneNumberList:
        type: object
        description: >-
          <p>The employee's phone number(s).</p>
        $ref: '#/definitions/PhoneNumberList'
      EmailList:
        type: object
        description: >-
          <p>The employee's e-mail address(es).</p>
        $ref: '#/definitions/EmailList'
      BenefitEligible:
        type: object
        description: >-
          <p>Indicator if this employee qualifies for benefits.</p>
          <ul>
          </ul>
        $ref: '#/definitions/GenericYesNo'
      ReemployedRetiree:
        type: object
        description: >-
          <p>Indicates this employee is also retired.</p>
          <ul>
          </ul>
        $ref: '#/definitions/GenericYesNo'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object contains basic HR information for employees.</p>
  # //////////////////////////////// data object /////////////////////////////
  EmployeePictureCollection:
    type: object
    properties:
      EmployeePicture:
        type: array
        items:
          $ref: '#/definitions/EmployeePicture'
  EmployeePicture:
    required:
    - "EmployeePersonalRefId"
    - "PictureSource"
    - "RefId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>A GUID that identifies an instance of this object. This RefId is new for 2.7M and MUST be supported like other objects that have a RefId (i.e. it is the key for the object). The alternate keys MUST continue to be supported.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      EmployeePersonalRefId:
        type: object
        description: >-
          <p>This is the GUID of the Employee whose picture this is.</p>
        $ref: '#/definitions/IdRef'
        xml:
          attribute: true
      PictureSource:
        type: object
        description: >-
          <p> This element defines the picture. If the Type attribute is URL, this is the location of the picture in [JPEG] format; if Type is JPEG, this is the [JPEG] image data encoded using the Base64 Content-Transfer-Encoding defined in Section 6.8 of [RFC 2045]. </p>
        $ref: '#/definitions/PictureSource'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object contains information about an employee's picture.</p>
  # //////////////////////////////// data object /////////////////////////////
  FinancialAnnualCollection:
    type: object
    properties:
      FinancialAnnual:
        type: array
        items:
          $ref: '#/definitions/FinancialAnnual'
  FinancialAnnual:
    required:
    - "AnnualItems"
    - "FiscalYear"
    - "RefId"
    - "ReportDate"
    - "StateProvinceId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>A GUID that identifies an instance of this object. This RefId is a “transient” value; that is, it SHOULD be generated by the provider at the time the object is provided in a Response message. This value MUST NOT be used in a later Request for the object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      ReportDate:
        type: string
        format: date
        description: >-
          <p>Date on which snapshot was generated.</p>
      StateProvinceId:
        type: object
        description: >-
          <p>State assigned reporting Id for district or agency</p>
        $ref: '#/definitions/StateProvinceId'
      FiscalYear:
        description: >-
          <p>Fiscal year of summary account</p><p>(e.g. the 2003-2004 fiscal year will be denoted as 2004)</p>
      AnnualItems:
        type: object
        $ref: '#/definitions/AnnualItemList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> This object contains information about account code annual financial totals, summarized by major and/or minor account code breaks. </p>
  # //////////////////////////////// data object /////////////////////////////
  FinancialBudgetCollection:
    type: object
    properties:
      FinancialBudget:
        type: array
        items:
          $ref: '#/definitions/FinancialBudget'
  FinancialBudget:
    required:
    - "BudgetAccounts"
    - "FiscalYear"
    - "RefId"
    - "ReportDate"
    - "StateProvinceId"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>A GUID that identifies an instance of this object. This RefId is a “transient” value; that is, it SHOULD be generated by the provider at the time the object is provided in a Response message. This value MUST NOT be used in a later Request for the object.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      ReportDate:
        type: string
        format: date
        description: >-
          <p>Date on which snapshot was generated.</p>
      StateProvinceId:
        type: object
        description: >-
          <p>State-assigned identifier for this location</p>
        $ref: '#/definitions/StateProvinceId'
      FiscalYear:
        description: >-
          <p>Fiscal Year of summary account</p> <p>(e.g. the 2003-2004 fiscal year will be denoted as 2004)</p>
      BudgetAccounts:
        type: object
        description: >-
          <p>Information about budget accounts being submitted.</p>
        $ref: '#/definitions/BudgetAccountList'
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p> This object contains information about account code budget totals, summarized by major and/or minor account code breaks. It is a snapshot object used to allow a district to report summarized financial budgetary information to their state as required. </p>
  # //////////////////////////////// data object /////////////////////////////
  TimeWorkedCollection:
    type: object
    properties:
      TimeWorked:
        type: array
        items:
          $ref: '#/definitions/TimeWorked'
  TimeWorked:
    required:
    - "EmployeePersonalRefId"
    - "LocationInfoRefId"
    - "OvertimeHours"
    - "PayPeriod"
    - "RefId"
    - "RegularHours"
    type: object
    properties:
      RefId:
        type: object
        description: >-
          <p>GUID for this object. The application that owns this object is responsible for generating this unique Id.</p>
        $ref: '#/definitions/RefId'
        xml:
          attribute: true
      EmployeePersonalRefId:
        type: object
        description: >-
          <p>References associated EmployeePersonal object.</p>
        $ref: '#/definitions/IdRef'
      LocationInfoRefId:
        type: object
        description: >-
          <p>Site where employee actually worked. References LocationInfo object.</p>
        $ref: '#/definitions/IdRef'
