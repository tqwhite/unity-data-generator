  StudentGradeGrade:
    description: >-
      This is the one grade given for this student and section. At least one numeric, percentage or letter must be provided as defined in the fields below. If <code>Numeric</code> is entered, <code>OutOf</code>, <code>Low</code> and <code>High</code> must also be entered.
    type: object
    properties:
      Percentage:
        type: number
        description: >-
          The grade percentage for this grade (0.00-100.00).
      Numeric:
        type: number
        description: >-
          The raw numeric value for this grade. If this is provided, the <code>OutOf</code>, <code>Low</code> and <code>High</code> must be entered.
      OutOf:
        type: number
        description: >-
          This is the high value equivalent to 100% without extra points or extra credit (e.g. if a student received 3.5 out of 4, 4 would be the <code>Grade/OutOf</code> value and 3.5 would be the <code>Grade/Numeric</code> value).
      Low:
        type: number
        description: >-
          Lowest grade value in the range for the numeric grade.
      High:
        type: number
        description: >-
          Highest grade value in the range for the numeric grade. NOTE: This could be higher than the <code>Grade/OutOf</code> value.
      Letter:
        type: string
        description: >-
          The letter grade value for this grade. If this is provided, the numeric value or percentage value must also be entered in order to provide a numeric value for the grade to be utilized in any computations.
      Narrative:
        type: string
        description: >-
          The free form text narrative for this grade.

