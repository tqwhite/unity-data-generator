        xml:
          attribute: true
      FoodserviceItemUnitRefId:
        type: object
        description: >-
          <p>GUID that identifies related item portion</p>
        $ref: '#/definitions/IdRef'
      ItemPortionQuantity:
        type: number
        description: >-
          <p>Quantity of item portion (number of units)</p>
      ItemPortionType:
        type: string
        description: >-
          <p>Type of item unit</p>
      Codeset:
        type: string
        description: >-
          <p>A unique indicator (usually a URL) that points to the codeset used.</p>
        xml:
          attribute: true
      Description:
        type: string
        description: >-
          <p>Optional description of amount</p>
      SIF_Metadata:
        type: object
        $ref: '#/definitions/SIF_Metadata'
      SIF_ExtendedElements:
        type: object
        $ref: '#/definitions/SIF_ExtendedElements'
    description: >-
      <p>This object describes a certain amount for a specific item unit.</p> <p> Note that this version of the object does not contain any elements that define item pricing. This task is left for future development. </p>
  # //////////////////////////////// data object /////////////////////////////
